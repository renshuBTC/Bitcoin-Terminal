<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BITCOINTERMINAL.NET (URPD POC v2)</title>
<link rel="preconnect" href="https://bitview.space" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap">
<script src="https://unpkg.com/lightweight-charts@5.0.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0a0a0a; color: #d4d4d4;
    font-family: 'Source Code Pro', Consolas, monospace; font-size: 13px; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  #toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 14px;
    background: #111; border-bottom: 1px solid #222; flex-wrap: wrap; }
  #toolbar .brand { color: #ff8c00; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
  #toolbar .spacer { flex: 1; }
  #toolbar input[type="date"], #toolbar select { background: #1a1a1a; color: #d4d4d4;
    border: 1px solid #2a2a2a; padding: 4px 8px; font-family: inherit; font-size: 12px; }
  #toolbar label { color: #888; font-size: 11px; }
  #toolbar input[type="checkbox"] { vertical-align: middle; }

  /* Two-chart vertical layout: BTC price on top (60%), URPD histogram below (40%) */
  #chart-stack { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #chart-top-wrap { flex: 0 0 60%; position: relative; min-height: 0; border-bottom: 1px solid #222; }
  #chart-bottom-wrap { flex: 1; position: relative; min-height: 0; }
  #chart-top, #chart-bottom { width: 100%; height: 100%; }

  #status { position: absolute; bottom: 6px; left: 14px; color: #666;
    font-size: 11px; pointer-events: none; }

  /* Stats overlay (bottom-left of price chart, matching live site convention) */
  #info { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.85);
    border: 1px solid #222; padding: 8px 10px; font-size: 11px; line-height: 1.55;
    pointer-events: none; min-width: 240px; z-index: 5; }
  #info .label { color: #888; }
  #info .value { color: #fff; }
  #info .profit { color: #2ecc71; }
  #info .loss { color: #ff5c5c; }
  #info .date { color: #ff8c00; font-weight: 700; margin-bottom: 3px; }

  /* Histogram pane label */
  #hist-title { position: absolute; top: 6px; left: 12px; color: #888;
    font-size: 11px; pointer-events: none; z-index: 5; }
  #hist-title .pcol { color: #2ecc71; }
  #hist-title .lcol { color: #e74c3c; }
</style>
</head>
<body>

<div id="app">
  <div id="toolbar">
    <span class="brand">BITCOINTERMINAL.NET</span>
    <span style="color:#666">| URPD POC (v2 — vertical histogram)</span>
    <span class="spacer"></span>
    <label>Weight:</label>
    <select id="weight-select">
      <option value="btc" selected>BTC (supply)</option>
      <option value="usd">USD (realised cap)</option>
    </select>
    <label>Date:</label>
    <input type="date" id="date-input" value="2024-12-15" min="2009-01-09">
    <label><input type="checkbox" id="scrub-toggle" checked> Scrub on hover</label>
  </div>

  <div id="chart-stack">
    <div id="chart-top-wrap">
      <div id="chart-top"></div>
      <div id="info"></div>
    </div>
    <div id="chart-bottom-wrap">
      <div id="chart-bottom"></div>
      <div id="hist-title">URPD: <span id="hist-title-date">—</span> &nbsp;|&nbsp;
        <span class="pcol">in profit</span> / <span class="lcol">in loss</span> by cost basis</div>
      <div id="status">Loading…</div>
    </div>
  </div>
</div>

<script>
"use strict";

const BASE = "https://bitview.space";
const PRICE_EPOCH_DATE = new Date(2009, 0, 3);

const THEME = {
  background: "#0a0a0a", text: "#d4d4d4", grid: "rgba(255,255,255,0.05)", border: "#222",
  crosshair: "rgba(255,140,0,0.5)", priceLine: "rgba(255,255,255,0.85)",
  spot: "#ff8c00", profit: "#2ecc71", loss: "#e74c3c",
};

// ───────────────────────────────────────────────────────────────────────────
// Common chart options
// ───────────────────────────────────────────────────────────────────────────
function commonChartOpts() {
  return {
    layout: {
      background: { type: "solid", color: THEME.background },
      textColor: THEME.text,
      fontFamily: "'Source Code Pro', Consolas, monospace",
      fontSize: 11,
    },
    grid: { vertLines: { color: THEME.grid }, horzLines: { color: THEME.grid } },
    rightPriceScale: { borderColor: THEME.border },
    timeScale: { borderColor: THEME.border, timeVisible: false, secondsVisible: false },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: THEME.crosshair, width: 1, style: LightweightCharts.LineStyle.Dotted },
      horzLine: { color: THEME.crosshair, width: 1, style: LightweightCharts.LineStyle.Dotted },
    },
  };
}

// ───────────────────────────────────────────────────────────────────────────
// Top chart: BTC price (date X, log price Y)
// ───────────────────────────────────────────────────────────────────────────
const topContainer = document.getElementById("chart-top");
const topChart = LightweightCharts.createChart(topContainer, Object.assign(commonChartOpts(), {
  rightPriceScale: { borderColor: THEME.border, mode: LightweightCharts.PriceScaleMode.Logarithmic, autoScale: true },
  timeScale: { borderColor: THEME.border, timeVisible: false, secondsVisible: false, rightOffset: 12, barSpacing: 2 },
}));

// ───────────────────────────────────────────────────────────────────────────
// Bottom chart: URPD histogram (cost basis X, supply Y)
// LWC's X axis is hardcoded "time" — we abuse it: time = bin price_floor.
// Custom tickMarkFormatter renders dollar amounts on the X axis.
// ───────────────────────────────────────────────────────────────────────────
const bottomContainer = document.getElementById("chart-bottom");
const bottomChart = LightweightCharts.createChart(bottomContainer, Object.assign(commonChartOpts(), {
  rightPriceScale: { borderColor: THEME.border, autoScale: true, scaleMargins: { top: 0.05, bottom: 0.05 } },
  timeScale: {
    borderColor: THEME.border,
    timeVisible: false,
    secondsVisible: false,
    rightOffset: 0,
    barSpacing: 4,
    // Time-axis labels: display the encoded "time" value as a USD price
    tickMarkFormatter: (time) => {
      const v = typeof time === "number" ? time : 0;
      if (v >= 1_000_000) return `$${(v/1_000_000).toFixed(1)}M`;
      if (v >= 1_000)     return `$${Math.round(v/1_000)}K`;
      if (v >= 1)         return `$${v.toFixed(0)}`;
      return `$${v.toFixed(2)}`;
    },
  },
  // Pretty crosshair label for the X axis too
  localization: {
    priceFormatter: (price) => price >= 1e6 ? `${(price/1e6).toFixed(2)}M` : Math.round(price).toLocaleString(),
    timeFormatter: (time) => {
      const v = typeof time === "number" ? time : 0;
      return `cost basis $${Math.round(v).toLocaleString()}`;
    },
  },
}));

// ───────────────────────────────────────────────────────────────────────────
// Resize handling
// ───────────────────────────────────────────────────────────────────────────
function syncSizes() {
  topChart.applyOptions({ width: topContainer.clientWidth, height: topContainer.clientHeight });
  bottomChart.applyOptions({ width: bottomContainer.clientWidth, height: bottomContainer.clientHeight });
}
window.addEventListener("resize", syncSizes);
syncSizes();

// ───────────────────────────────────────────────────────────────────────────
// State
// ───────────────────────────────────────────────────────────────────────────
let priceSeries = null;
let histSeries = null;
let spotPriceLine = null;
let priceArray = null;
let priceDateStrs = null;
const urpdCache = new Map();
const inflight = new Map();

const statusEl = document.getElementById("status");
const infoEl = document.getElementById("info");
const histTitleDateEl = document.getElementById("hist-title-date");
const dateInput = document.getElementById("date-input");
const weightSelect = document.getElementById("weight-select");
const scrubToggle = document.getElementById("scrub-toggle");

// ───────────────────────────────────────────────────────────────────────────
// Data helpers
// ───────────────────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error("fetch " + url + " → " + r.status);
  return r.json();
}
function indexToDateStr(i) {
  const d = new Date(PRICE_EPOCH_DATE);
  d.setDate(d.getDate() + i);
  return d.toISOString().slice(0, 10);
}
function getSpotForDate(dateStr) {
  if (!priceDateStrs) return null;
  const idx = priceDateStrs.indexOf(dateStr);
  if (idx < 0) return null;
  return priceArray[idx];
}
async function getURPD(dateStr) {
  if (urpdCache.has(dateStr)) return urpdCache.get(dateStr);
  if (inflight.has(dateStr)) return inflight.get(dateStr);
  const p = (async () => {
    const resp = await fetchJSON(BASE + "/api/urpd/all/" + dateStr);
    urpdCache.set(dateStr, resp);
    inflight.delete(dateStr);
    return resp;
  })();
  inflight.set(dateStr, p);
  return p;
}

// ───────────────────────────────────────────────────────────────────────────
// Render bottom histogram for given date
// ───────────────────────────────────────────────────────────────────────────
async function renderURPD(dateStr) {
  let resp;
  try { resp = await getURPD(dateStr); }
  catch (e) {
    statusEl.textContent = `URPD ${dateStr} failed: ${e.message}`;
    return;
  }
  if (!resp.buckets || resp.buckets.length === 0) {
    statusEl.textContent = `URPD ${dateStr}: no buckets`;
    return;
  }

  const spot = getSpotForDate(dateStr) || 0;
  const weightField = weightSelect.value === "usd" ? "realized_cap" : "supply";

  // ───────────────────────────────────────────────────────────────────
  // Aggregate raw bins → ~500 fixed-width buckets between min and max
  // observed price_floor. The BRK API returns 10K–20K raw bins; rendering
  // that many as histogram bars produces sub-pixel aliasing where most
  // bars become invisible. The live site does this aggregation client-
  // side too (the "Bins" input on the toolbar).
  // ───────────────────────────────────────────────────────────────────
  const TARGET_BINS = 500;

  let minPrice = Infinity, maxPrice = -Infinity;
  let totalRaw = 0;
  for (const b of resp.buckets) {
    if (!b[weightField] || b[weightField] <= 0) continue;
    if (b.price_floor < minPrice) minPrice = b.price_floor;
    if (b.price_floor > maxPrice) maxPrice = b.price_floor;
    totalRaw += b[weightField];
  }
  if (!isFinite(minPrice) || !isFinite(maxPrice) || maxPrice <= minPrice) {
    statusEl.textContent = `URPD ${dateStr}: no usable bins`;
    return;
  }
  // Guard log scale: clamp lower bound to $1 so we don't show meaningless sub-cent bins
  if (minPrice < 1) minPrice = 1;

  const binWidth = (maxPrice - minPrice) / TARGET_BINS;
  const agg = new Array(TARGET_BINS).fill(0).map((_, i) => ({
    price_floor: minPrice + i * binWidth,
    weight: 0,
  }));
  for (const b of resp.buckets) {
    const w = b[weightField];
    if (!w || w <= 0) continue;
    if (b.price_floor < minPrice) continue;
    let idx = Math.floor((b.price_floor - minPrice) / binWidth);
    if (idx >= TARGET_BINS) idx = TARGET_BINS - 1;
    if (idx < 0) continue;
    agg[idx].weight += w;
  }

  // Build LWC data points + collect P/L stats from the aggregated bins
  const dataPoints = [];
  let total = 0, profit = 0, loss = 0;
  let lastTime = -Infinity;
  for (const a of agg) {
    if (a.weight <= 0) continue;
    let t = a.price_floor;
    if (t <= lastTime) t = lastTime + 0.0001;
    lastTime = t;
    total += a.weight;
    const inProfit = a.price_floor <= spot;
    if (inProfit) profit += a.weight; else loss += a.weight;
    dataPoints.push({
      time: t,
      value: a.weight,
      color: inProfit ? THEME.profit : THEME.loss,
    });
  }

  console.log(`URPD ${dateStr}: raw bins=${resp.buckets.length}, agg bins=${dataPoints.length}, ` +
    `price range=$${minPrice.toFixed(0)}-$${maxPrice.toFixed(0)}, total=${total.toFixed(0)}`);

  // Replace histogram series cleanly
  if (histSeries) bottomChart.removeSeries(histSeries);
  histSeries = bottomChart.addSeries(LightweightCharts.HistogramSeries, {
    priceFormat: { type: "volume" }, // K/M/B suffixes on Y-axis
    priceLineVisible: false,
    lastValueVisible: false,
    title: weightField === "supply" ? "BTC supply" : "USD realised cap",
  });
  histSeries.setData(dataPoints);

  // Show the full distribution range
  bottomChart.timeScale().fitContent();

  // Spot horizontal line on top chart's price series
  if (priceSeries) {
    if (spotPriceLine) priceSeries.removePriceLine(spotPriceLine);
    spotPriceLine = priceSeries.createPriceLine({
      price: spot,
      color: THEME.spot,
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true,
      title: `spot ${dateStr}`,
    });
  }

  // Vertical "spot" line on the bottom histogram (a price line on the histogram series).
  // We achieve a vertical line by adding a separate single-bar series; LWC doesn't have
  // a native "vertical line at time T" overlay, but we can fake it with a tall bar.
  // (Skipped for cleanness — the green/red color split already conveys the boundary.)

  // Stats panel update
  const fmtCount = (n) => weightField === "supply"
    ? `${(n/1e6).toFixed(2)}M BTC`
    : `$${(n/1e9).toFixed(2)}B`;
  const pctProfit = total > 0 ? (100 * profit / total) : 0;

  infoEl.innerHTML =
    `<div class="date">${dateStr}</div>` +
    `<div><span class="label">Spot</span> &nbsp;<span class="value">$${spot.toLocaleString("en-US",{maximumFractionDigits:0})}</span></div>` +
    `<div><span class="label">Weight</span> &nbsp;<span class="value">${weightField === "supply" ? "BTC supply" : "USD realised"}</span></div>` +
    `<div><span class="label">Total</span> &nbsp;<span class="value">${fmtCount(total)}</span></div>` +
    `<div><span class="label">Bins</span> &nbsp;<span class="value">${dataPoints.length}</span></div>` +
    `<div><span class="profit">In Profit ${pctProfit.toFixed(1)}% (${fmtCount(profit)})</span></div>` +
    `<div><span class="loss">In Loss ${(100-pctProfit).toFixed(1)}% (${fmtCount(loss)})</span></div>`;

  histTitleDateEl.textContent = dateStr;
  statusEl.textContent = `URPD ${dateStr}: ${dataPoints.length} bins (cached: ${urpdCache.size})`;
}

// ───────────────────────────────────────────────────────────────────────────
// Boot price line
// ───────────────────────────────────────────────────────────────────────────
async function loadPriceLine() {
  statusEl.textContent = "Loading BTC price…";
  const resp = await fetchJSON(BASE + "/api/series/price_close/day1");
  priceArray = resp.data || resp;
  priceDateStrs = new Array(priceArray.length);
  for (let i = 0; i < priceArray.length; i++) priceDateStrs[i] = indexToDateStr(i);

  const points = [];
  for (let i = 0; i < priceArray.length; i++) {
    const v = priceArray[i];
    if (typeof v === "number" && v > 0) points.push({ time: priceDateStrs[i], value: v });
  }
  priceSeries = topChart.addSeries(LightweightCharts.LineSeries, {
    color: THEME.priceLine, lineWidth: 2, priceLineVisible: false, lastValueVisible: true, title: "BTC/USD",
  });
  priceSeries.setData(points);
  statusEl.textContent = `BTC price: ${points.length} pts`;
  topChart.timeScale().fitContent();
}

// ───────────────────────────────────────────────────────────────────────────
// Crosshair scrub: top chart hover → bottom histogram updates
// ───────────────────────────────────────────────────────────────────────────
let scrubTimer = null;
let lastScrubDate = null;
const SCRUB_DEBOUNCE_MS = 80;

topChart.subscribeCrosshairMove((param) => {
  if (!scrubToggle.checked) return;
  if (!param.time) return;
  let dateStr;
  if (typeof param.time === "string") dateStr = param.time;
  else if (param.time && typeof param.time === "object" && "year" in param.time) {
    const y = param.time.year, m = param.time.month, d = param.time.day;
    dateStr = `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  } else return;

  if (dateStr === lastScrubDate) return;
  lastScrubDate = dateStr;
  if (!priceDateStrs || priceDateStrs.indexOf(dateStr) < 0) return;

  if (scrubTimer) clearTimeout(scrubTimer);
  scrubTimer = setTimeout(() => {
    dateInput.value = dateStr;
    renderURPD(dateStr);
  }, SCRUB_DEBOUNCE_MS);
});

// ───────────────────────────────────────────────────────────────────────────
// UI wiring
// ───────────────────────────────────────────────────────────────────────────
dateInput.addEventListener("change", () => { renderURPD(dateInput.value); });
weightSelect.addEventListener("change", () => { renderURPD(dateInput.value); });

// ───────────────────────────────────────────────────────────────────────────
// Boot
// ───────────────────────────────────────────────────────────────────────────
(async function boot() {
  try {
    await loadPriceLine();
    await renderURPD(dateInput.value);
  } catch (e) {
    console.error("Boot failed:", e);
    statusEl.textContent = "Boot failed: " + e.message;
    statusEl.style.color = "#ff5c5c";
  }
})();
</script>
</body>
</html>
