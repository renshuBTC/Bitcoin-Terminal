<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BITCOINTERMINAL.NET (Indicator Framework)</title>
<link rel="preconnect" href="https://bitview.space" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap">
<script src="https://unpkg.com/lightweight-charts@5.0.0/dist/lightweight-charts.standalone.production.js"></script>
<!-- html2canvas for PNG export. Loaded on first click via dynamic import to avoid up-front cost. -->
<script>
window.__loadHtml2canvas = function() {
  if (window.html2canvas) return Promise.resolve(window.html2canvas);
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload = () => resolve(window.html2canvas);
    s.onerror = () => reject(new Error("html2canvas failed to load"));
    document.head.appendChild(s);
  });
};
// mp4-muxer for WebCodecs MP4 encoding (lazy-loaded on first MP4 click)
window.__loadMp4Muxer = function() {
  if (window.Mp4Muxer) return Promise.resolve(window.Mp4Muxer);
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/mp4-muxer@5.2.1/build/mp4-muxer.min.js";
    s.onload = () => resolve(window.Mp4Muxer);
    s.onerror = () => reject(new Error("mp4-muxer failed to load"));
    document.head.appendChild(s);
  });
};
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; color: #d4d4d4;
    font-family: 'Source Code Pro', Consolas, monospace; font-size: 13px; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 12px;
    background: #000; flex-wrap: wrap; }
  /* Bottom toolbar — secondary controls (date / lookback / export) */
  #bottom-toolbar { display: flex; align-items: center; gap: 12px; padding: 6px 14px;
    background: #111; border-top: 1px solid #222; flex-wrap: wrap; flex-shrink: 0;
    font-size: 11px; }
  #bottom-toolbar label { color: #888; font-size: 11px; }
  #bottom-toolbar input[type="date"], #bottom-toolbar select {
    background: #1a1a1a; color: #d4d4d4; border: 1px solid #2a2a2a;
    padding: 4px 8px; font-family: inherit; font-size: 11px; }
  #bottom-toolbar button { background: #1a1a1a; color: #d4d4d4; border: 1px solid #2a2a2a;
    padding: 4px 9px; cursor: pointer; font-family: inherit; font-size: 11px; border-radius: 2px; }
  #bottom-toolbar button:hover { border-color: #444; color: #fff; }
  #bottom-toolbar input[type="checkbox"] { vertical-align: middle; }
  #bottom-toolbar .spacer { flex: 1; }
  /* Interval dropdown (top toolbar) — same Bloomberg minimal pattern as siblings */
  #interval-wrap { position: relative; display: inline-block; }
  #btn-interval { display: inline-flex; align-items: center; gap: 6px;
    background: transparent; color: #d4d4d4; border: none;
    padding: 7px 12px; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 400;
    border-radius: 3px; transition: background-color 0.08s ease; }
  #btn-interval:hover { background: #1a1a1a; color: #fff; }
  #btn-interval .arrow { color: #666; font-size: 9px; font-weight: 400; }
  /* Indicators button — text + icon, no fill until hover */
  #btn-add { display: inline-flex; align-items: center; gap: 6px; }
  #btn-add .ind-icon { display: inline-block; vertical-align: middle; color: inherit; }
  #interval-menu { position: absolute; top: 100%; left: 0; margin-top: 4px;
    background: #111; border: 1px solid #2a2a2a; padding: 4px 0; min-width: 110px;
    z-index: 50; display: none; }
  #interval-menu.show { display: block; }
  #interval-menu .opt { padding: 6px 12px; cursor: pointer; color: #d4d4d4; font-size: 12px; }
  #interval-menu .opt:hover { background: #1a1a1a; }
  #interval-menu .opt.active { background: #ff8c00; color: #0a0a0a; font-weight: 700; }

  /* Chart type dropdown — same pattern as interval, wider menu, icon button */
  #chart-type-wrap { position: relative; display: inline-block; }
  #btn-chart-type { display: inline-flex; align-items: center; justify-content: center;
    background: transparent; color: #d4d4d4; border: none;
    padding: 7px 10px; cursor: pointer; border-radius: 3px; transition: background-color 0.08s ease; }
  #btn-chart-type svg { width: 22px; height: 22px; }
  #btn-chart-type:hover { background: #1a1a1a; color: #fff; }
  #btn-chart-type svg { display: block; }
  #chart-type-menu { position: absolute; top: 100%; left: 0; margin-top: 4px;
    background: #111; border: 1px solid #2a2a2a; padding: 4px 0; min-width: 200px;
    z-index: 50; display: none; max-height: 70vh; overflow-y: auto; }
  #chart-type-menu.show { display: block; }
  #chart-type-menu .opt { display: flex; align-items: center; gap: 10px;
    padding: 6px 12px; cursor: pointer; color: #d4d4d4; font-size: 12px; }
  #chart-type-menu .opt:hover { background: #1a1a1a; }
  #chart-type-menu .opt.active { background: #fff; color: #000; }
  #chart-type-menu .opt svg { flex-shrink: 0; }
  #chart-type-menu .divider { border-top: 1px solid #1f1f1f; margin: 4px 0; }
  #toolbar .brand { color: #ff8c00; font-weight: 700; font-size: 17px; letter-spacing: 0.5px; margin-right: 14px; }
  #toolbar .spacer { flex: 1; }
  #toolbar input[type="date"] { background: #1a1a1a; color: #d4d4d4;
    border: 1px solid #2a2a2a; padding: 4px 8px; font-family: inherit; font-size: 12px; }
  #toolbar label { color: #888; font-size: 11px; }
  #toolbar input[type="checkbox"] { vertical-align: middle; }
  /* Top toolbar buttons — Bloomberg-style: transparent until hover */
  #toolbar button { background: transparent; color: #d4d4d4; border: none;
    padding: 7px 12px; cursor: pointer; font-family: inherit; font-size: 15px; border-radius: 3px;
    transition: background-color 0.08s ease; }
  #toolbar button:hover { background: #1a1a1a; color: #fff; }
  /* No "primary" treatment in this minimal toolbar */
  #toolbar button.primary { background: transparent; color: #d4d4d4; border: none; font-weight: 400; }
  #toolbar button.primary:hover { background: #1a1a1a; color: #fff; }
  /* Undo / Redo icon buttons */
  #toolbar button.icon-btn { padding: 7px 8px; display: inline-flex; align-items: center; justify-content: center; }
  #toolbar button.icon-btn svg { display: block; }
  #toolbar button.icon-btn:disabled { color: #444; cursor: default; background: transparent; }
  #toolbar button.icon-btn:disabled:hover { background: transparent; color: #444; }
  /* Lookback button group */
  #lb-group { display: flex; gap: 0; }
  #lb-group button { padding: 5px 8px; font-size: 11px; border-radius: 0; min-width: 36px; }
  #lb-group button:not(:first-child) { border-left: none; }
  #lb-group button:first-child { border-radius: 2px 0 0 2px; }
  #lb-group button:last-child { border-radius: 0 2px 2px 0; }
  #lb-group button.active { background: #ff8c00; color: #0a0a0a; border-color: #ff8c00; font-weight: 700; }

  #chart-stack { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #chart-top-wrap { flex: 0 0 60%; position: relative; min-height: 0; border-bottom: 1px solid #222; }
  #chart-bottom-wrap { flex: 1; position: relative; min-height: 0; }
  #chart-top, #chart-bottom { width: 100%; height: 100%; }

  /* Pane label — floats INSIDE the chart at top-left, TradingView-style.
     Sits on top of the chart canvas via absolute positioning, not a header bar. */
  .pane-label { position: absolute; top: 8px; left: 12px; z-index: 4;
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    pointer-events: none;
    font-size: 15px; color: #888; max-width: calc(100% - 80px); }
  .pane-label .pane-title-row { display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pane-label .pane-title { color: #d4d4d4; font-weight: 400; letter-spacing: 0.3px;
    display: inline-flex; align-items: center; gap: 5px; }
  .pane-label .pane-title .sep { color: #555; font-weight: 400; }
  .pane-label .pane-title .source { color: #d4d4d4; }
  .pane-label .ind-badge { display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 6px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 2px; font-size: 10px; line-height: 1.3; }
  .pane-label .ind-badge .dot { width: 7px; height: 7px; border-radius: 1px; flex-shrink: 0; }
  .pane-label .ind-badge .ind-label { color: #d4d4d4; }
  /* Hover OHLC-style readout — price + change at the hovered date */
  .pane-label .hover-readout { display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; padding-left: 4px; }
  .pane-label .hover-readout .price { color: #d4d4d4; font-weight: 700; }
  .pane-label .hover-readout .change-up { color: #2ecc71; }
  .pane-label .hover-readout .change-down { color: #ff5c5c; }

  /* Per-indicator rows below the pane title — TradingView-style with hover actions. */
  .ind-rows { display: flex; flex-direction: column; gap: 2px; }
  .ind-row { display: inline-flex; align-items: center; gap: 6px; pointer-events: auto;
    font-size: 13px; line-height: 1.4; padding: 0; }
  .ind-row .swatch { width: 8px; height: 8px; border-radius: 1px; flex-shrink: 0; }
  .ind-row .name { color: #d4d4d4; }
  .ind-row.is-hidden .name, .ind-row.is-hidden .swatch { opacity: 0.4; }
  .ind-row .actions { display: none; gap: 2px; margin-left: 4px; align-items: center; }
  .ind-row:hover .actions { display: inline-flex; }
  .ind-row .act-btn { background: rgba(20,20,20,0.85); border: 1px solid rgba(255,255,255,0.08);
    color: #d4d4d4; cursor: pointer; padding: 2px 5px; border-radius: 2px;
    font-size: 11px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .ind-row .act-btn:hover { background: #2a2a2a; color: #fff; border-color: rgba(255,255,255,0.18); }
  .ind-row .act-btn svg { display: block; }

  #status { position: absolute; bottom: 6px; left: 14px; color: #666; font-size: 11px; pointer-events: none; }

  /* Stats stack — one box per URPD-style indicator, stacked vertically.
     Pushed down to avoid overlapping the floating .pane-label at the very top. */
  #stats-stack { position: absolute; top: 32px; left: 8px; display: flex;
    flex-direction: column; gap: 6px; z-index: 5; pointer-events: none; max-height: calc(100% - 48px); overflow-y: auto; }
  .stat-box { background: rgba(0,0,0,0.85); border: 1px solid #222;
    padding: 6px 8px; font-size: 11px; line-height: 1.5; min-width: 220px; }
  .stat-box .label { color: #888; }
  .stat-box .value { color: #fff; }
  .stat-box .profit { color: #2ecc71; }
  .stat-box .loss { color: #ff5c5c; }
  .stat-box .title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .stat-box .title-row .swatch { width: 8px; height: 8px; border-radius: 1px; }
  .stat-box .title-row .name { color: #ff8c00; font-weight: 700; flex: 1; }
  .stat-box .title-row .date { color: #d4d4d4; font-size: 10px; }

  /* Indicator panel — right side */
  #ind-panel { position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.85); border: 1px solid #222; padding: 6px 8px;
    font-size: 11px; min-width: 240px; z-index: 5; }
  #ind-panel .ip-title { color: #ff8c00; font-weight: 700; margin-bottom: 4px; }
  #ind-panel .ip-row { display: flex; align-items: center; gap: 6px; padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05); }
  #ind-panel .ip-row:last-child { border-bottom: none; }
  #ind-panel .ip-swatch { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }
  #ind-panel .ip-name { flex: 1; color: #d4d4d4; }
  #ind-panel .ip-pane { color: #666; font-size: 10px; }
  #ind-panel .ip-x, #ind-panel .ip-cog { background: none; border: none; color: #888; cursor: pointer;
    font-family: inherit; font-size: 12px; padding: 0 3px; }
  #ind-panel .ip-x:hover { color: #ff5c5c; }
  #ind-panel .ip-cog:hover { color: #ff8c00; }

  /* ─────────────────────────────────────────────────────────────────────
   * Mobile responsiveness — viewports ≤768px wide.
   * Goals: toolbar fits on multiple wrapped lines without overflow,
   * touch-friendly hit targets, stat boxes don't dominate the chart,
   * indicator panel relocates so it doesn't cover the histogram.
   * ───────────────────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    body { font-size: 12px; }
    #toolbar { padding: 6px 8px; gap: 6px; }
    #toolbar .brand { font-size: 12px; }
    #toolbar button, #toolbar select, #toolbar input[type="date"] { font-size: 11px; padding: 6px 8px; }
    #lb-group button { min-width: 30px; padding: 5px 4px; }
    /* Top chart shrinks slightly so the histogram has more room */
    #chart-top-wrap { flex: 0 0 50%; }
    /* Stat boxes: smaller, scroll if many */
    #stats-stack { top: 6px; left: 6px; max-width: calc(100% - 12px); gap: 4px; }
    .stat-box { font-size: 10px; padding: 5px 6px; min-width: 0; max-width: 100%; }
    /* Indicator panel becomes a horizontal strip at the bottom-right */
    #ind-panel { right: 4px; top: auto; bottom: 4px; min-width: 0; max-width: 60%;
      max-height: 40%; overflow-y: auto; padding: 4px 6px; font-size: 10px; }
    #ind-panel .ip-pane { display: none; } /* hide the "top"/"bottom" tag to save width */
    #status { font-size: 10px; }
    /* Modal: full-width on mobile */
    #modal { min-width: 0; width: calc(100vw - 24px); padding: 12px; }
  }
  @media (max-width: 480px) {
    /* Smallest phones: even tighter */
    #toolbar { padding: 4px 6px; gap: 4px; }
    #toolbar button, #toolbar select { font-size: 10px; padding: 5px 6px; }
    /* On tiny screens, indicator panel covers the bottom; show only count */
    #ind-panel { max-height: 30%; }
  }

  /* Add-indicator modal */
  #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: none; align-items: center; justify-content: center; }
  #modal-bg.show { display: flex; }
  #modal { background: #111; border: 1px solid #2a2a2a; min-width: 460px; max-width: 90vw;
    max-height: 80vh; display: flex; flex-direction: column; }
  /* Modal header — title + X close button */
  #modal .modal-header { display: flex; align-items: center; padding: 14px 18px 10px;
    border-bottom: 1px solid #1f1f1f; flex-shrink: 0; }
  #modal h3 { color: #d4d4d4; font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
    margin: 0; flex: 1; }
  #modal .modal-x { background: none; border: none; color: #888; font-size: 20px;
    cursor: pointer; padding: 0 4px; line-height: 1; }
  #modal .modal-x:hover { color: #fff; }
  /* Modal search bar */
  #modal .modal-search { padding: 10px 18px; border-bottom: 1px solid #1f1f1f; flex-shrink: 0;
    position: relative; }
  #modal .modal-search input { width: 100%; background: #0a0a0a; color: #d4d4d4;
    border: 1px solid #2a2a2a; padding: 8px 10px 8px 32px; font-family: inherit; font-size: 13px;
    border-radius: 2px; }
  #modal .modal-search input::placeholder { color: #888; }
  #modal .modal-search .search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
    color: #888; font-size: 13px; pointer-events: none; line-height: 1; }
  /* Modal scrollable body */
  #modal .modal-body { padding: 8px 0; overflow-y: auto; flex: 1; min-height: 200px; }
  #modal .section-title { color: #888; font-size: 10px; padding: 8px 18px 4px;
    text-transform: uppercase; letter-spacing: 0.5px; }
  #modal .ind-option { display: flex; align-items: center; gap: 10px; padding: 7px 18px;
    cursor: pointer; }
  #modal .ind-option:hover { background: #1a1a1a; }
  #modal .ind-option .swatch { width: 8px; height: 8px; border-radius: 1px; flex-shrink: 0; }
  #modal .ind-option .name { color: #d4d4d4; flex: 1; font-size: 13px; }
  #modal .ind-option .pane-tag { color: #555; font-size: 10px; }
  /* Edit-mode (Configure) — keep existing actions row */
  #modal .section { padding: 0 18px; margin-bottom: 10px; }
  #modal .actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px;
    border-top: 1px solid #1f1f1f; flex-shrink: 0; }
  #modal button { background: #1a1a1a; color: #d4d4d4; border: 1px solid #2a2a2a;
    padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
  #modal button:hover { border-color: #444; }
  #modal button.primary { background: #ff8c00; color: #0a0a0a; border-color: #ff8c00; font-weight: 700; }
  #modal label { color: #888; font-size: 11px; display: block; margin-bottom: 3px; }
  #modal select, #modal input[type="text"] { background: #0a0a0a; color: #d4d4d4;
    border: 1px solid #2a2a2a; padding: 5px 8px; font-family: inherit; font-size: 12px; width: 100%; }
</style>
</head>
<body>

<div id="app">
  <div id="toolbar">
    <span class="brand">BITCOINTERMINAL.NET</span>
    <div id="interval-wrap" title="Time interval">
      <button id="btn-interval"><span id="interval-label">D</span><span class="arrow">▾</span></button>
      <div id="interval-menu">
        <div class="opt active" data-interval="1d">1 day</div>
        <div class="opt" data-interval="1w">1 week</div>
        <div class="opt" data-interval="1m">1 month</div>
      </div>
    </div>
    <div id="chart-type-wrap" title="Chart type">
      <button id="btn-chart-type"><span id="chart-type-icon-slot"></span></button>
      <div id="chart-type-menu"></div>
    </div>
    <button id="btn-add" class="primary"><svg class="ind-icon" width="17" height="17" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 13 L5 8 L8 10 L11 4 L14 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="2" cy="13" r="1.2" fill="currentColor"/><circle cx="5" cy="8" r="1.2" fill="currentColor"/><circle cx="8" cy="10" r="1.2" fill="currentColor"/><circle cx="11" cy="4" r="1.2" fill="currentColor"/><circle cx="14" cy="7" r="1.2" fill="currentColor"/></svg>&nbsp;Indicators</button>
    <button id="btn-undo" class="icon-btn" title="Undo (Ctrl+Z)" disabled><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 7v6h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button id="btn-redo" class="icon-btn" title="Redo (Ctrl+Y)" disabled><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 7v6h-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <span class="spacer"></span>
  </div>

  <div id="chart-stack">
    <div id="chart-top-wrap">
      <div id="chart-top"></div>
      <div class="pane-label" id="header-top">
        <div class="pane-title-row">
          <span class="pane-title">
            <span>BITCOIN</span><span class="sep">/</span><span>USD</span>
            <span class="sep">·</span><span>D</span>
            <span class="sep">·</span><span class="source">BITCOIN RESEARCH KIT</span>
          </span>
          <span class="hover-readout" id="hover-top"></span>
        </div>
        <div class="ind-rows" id="ind-rows-top"></div>
      </div>
    </div>
    <div id="chart-bottom-wrap">
      <div id="chart-bottom"></div>
      <div class="pane-label" id="header-bottom">
        <div class="pane-title-row">
          <span class="pane-title">
            <span id="header-bottom-title">REALIZED PRICE DISTRIBUTION</span>
            <span class="sep">·</span><span id="header-bottom-date" style="color:#ff8c00">—</span>
          </span>
        </div>
        <div class="ind-rows" id="ind-rows-bottom"></div>
      </div>
      <div id="stats-stack"></div>
      <div id="ind-panel">
        <div class="ip-title">INDICATORS</div>
        <div id="ip-list"></div>
      </div>
      <div id="status">Loading…</div>
    </div>
  </div>

  <div id="bottom-toolbar">
    <div id="lb-group" title="Lookback window for the price chart">
      <button data-lb="365">1Y</button>
      <button data-lb="1825">5Y</button>
      <button data-lb="3650">10Y</button>
      <button data-lb="all" class="active">ALL</button>
    </div>
    <span style="color:#444">|</span>
    <label>Date:</label>
    <input type="date" id="date-input" value="2024-12-15" min="2009-01-09">
    <select id="cycle-select" title="Jump to a cycle top or bottom">
      <option value="">CYCLE TOP/BTM…</option>
      <option value="2011-06-08">Cycle 1 Top — 2011-06-08</option>
      <option value="2011-11-18">Cycle 1 Bottom — 2011-11-18</option>
      <option value="2013-11-29">Cycle 2 Top — 2013-11-29</option>
      <option value="2015-01-14">Cycle 2 Bottom — 2015-01-14</option>
      <option value="2017-12-17">Cycle 3 Top — 2017-12-17</option>
      <option value="2018-12-15">Cycle 3 Bottom — 2018-12-15</option>
      <option value="2021-11-10">Cycle 4 Top — 2021-11-10</option>
      <option value="2022-11-21">Cycle 4 Bottom — 2022-11-21</option>
      <option value="2025-10-06">Cycle 5 Top — 2025-10-06</option>
    </select>
    <label><input type="checkbox" id="scrub-toggle" checked> Scrub on hover</label>
    <span class="spacer"></span>
    <button id="btn-copy-link" title="Copy a sharable link to this chart configuration">Copy Link</button>
    <button id="btn-png" title="Download a PNG snapshot of the current chart">📷 PNG</button>
    <button id="btn-mp4" title="Animate through a date range and export as MP4">▶ MP4</button>
  </div>
</div>

<div id="modal-bg"><div id="modal"></div></div>

<script>
"use strict";

const BASE = "https://bitview.space";
const PRICE_EPOCH_DATE = new Date(2009, 0, 3);

const THEME = {
  background: "#000", text: "#d4d4d4", grid: "rgba(255,255,255,0.05)", border: "#222",
  crosshair: "rgba(255,140,0,0.5)", priceLine: "rgba(255,255,255,0.85)",
  spot: "#ff8c00", profit: "#2ecc71", loss: "#e74c3c",
  cyan: "#00d4ff", lth: "#3aa3ff", sth: "#ff5c8a", magenta: "#d94fff", yellow: "#ffd34f",
};

// ───────────────────────────────────────────────────────────────────────────
// Charts
// ───────────────────────────────────────────────────────────────────────────
const topContainer = document.getElementById("chart-top");
const bottomContainer = document.getElementById("chart-bottom");

function commonChartOpts() {
  return {
    layout: { background: { type: "solid", color: THEME.background }, textColor: THEME.text,
      fontFamily: "'Source Code Pro', Consolas, monospace", fontSize: 11 },
    grid: { vertLines: { color: THEME.grid }, horzLines: { color: THEME.grid } },
    rightPriceScale: { borderColor: THEME.border },
    timeScale: { borderColor: THEME.border, timeVisible: false, secondsVisible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: THEME.crosshair, width: 1, style: LightweightCharts.LineStyle.Dotted },
      horzLine: { color: THEME.crosshair, width: 1, style: LightweightCharts.LineStyle.Dotted } },
  };
}

const topChart = LightweightCharts.createChart(topContainer, Object.assign(commonChartOpts(), {
  rightPriceScale: { borderColor: THEME.border, mode: LightweightCharts.PriceScaleMode.Logarithmic, autoScale: true },
  timeScale: { borderColor: THEME.border, timeVisible: false, secondsVisible: false, rightOffset: 12, barSpacing: 2 },
}));

const bottomChart = LightweightCharts.createChart(bottomContainer, Object.assign(commonChartOpts(), {
  rightPriceScale: { borderColor: THEME.border, autoScale: true, scaleMargins: { top: 0.05, bottom: 0.05 } },
  timeScale: {
    borderColor: THEME.border, timeVisible: false, secondsVisible: false,
    rightOffset: 0, barSpacing: 4,
    tickMarkFormatter: (time) => {
      const v = typeof time === "number" ? time : 0;
      if (v >= 1_000_000) return `$${(v/1_000_000).toFixed(1)}M`;
      if (v >= 1_000)     return `$${Math.round(v/1_000)}K`;
      if (v >= 1)         return `$${v.toFixed(0)}`;
      return `$${v.toFixed(2)}`;
    },
  },
  localization: {
    priceFormatter: (price) => price >= 1e6 ? `${(price/1e6).toFixed(2)}M` : Math.round(price).toLocaleString(),
    timeFormatter: (time) => `cost basis $${Math.round(time).toLocaleString()}`,
  },
}));

function syncSizes() {
  topChart.applyOptions({ width: topContainer.clientWidth, height: topContainer.clientHeight });
  bottomChart.applyOptions({ width: bottomContainer.clientWidth, height: bottomContainer.clientHeight });
}
window.addEventListener("resize", syncSizes);
// Orientation change on mobile: fires after the visual viewport has settled
window.addEventListener("orientationchange", () => setTimeout(syncSizes, 200));
syncSizes();

// ───────────────────────────────────────────────────────────────────────────
// Data layer
// ───────────────────────────────────────────────────────────────────────────
let priceArray = null;
let priceDateStrs = null;
const urpdCache = new Map();
const inflight = new Map();

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error("fetch " + url + " → " + r.status);
  return r.json();
}
function indexToDateStr(i) {
  const d = new Date(PRICE_EPOCH_DATE);
  d.setDate(d.getDate() + i);
  return d.toISOString().slice(0, 10);
}
function getSpotForDate(dateStr) {
  if (!priceDateStrs) return null;
  const idx = priceDateStrs.indexOf(dateStr);
  if (idx < 0) return null;
  return priceArray[idx];
}
async function getURPDCohort(dateStr, cohort /* "all" | "lth" | "sth" */) {
  const key = cohort + ":" + dateStr;
  if (urpdCache.has(key)) return urpdCache.get(key);
  if (inflight.has(key)) return inflight.get(key);
  const p = (async () => {
    const resp = await fetchJSON(BASE + "/api/urpd/" + cohort + "/" + dateStr);
    urpdCache.set(key, resp);
    inflight.delete(key);
    return resp;
  })();
  inflight.set(key, p);
  return p;
}
const getURPD = (d) => getURPDCohort(d, "all"); // back-compat shorthand

// Yesterday's date string (used by SOPD which is the daily URPD diff)
function prevDateStrOf(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

// Bin-level diff: SOPD = URPD(today) − URPD(yesterday), preserving spending at
// raw price_floor resolution before any aggregation. Mirrors the diffAggRaw fn
// in rp.js (task #227 — fixed bin-level cancellation).
function diffAggRaw(prevBuckets, currBuckets) {
  const prevMap = {}, currMap = {};
  prevBuckets.forEach(b => prevMap[b.price_floor] = b);
  currBuckets.forEach(b => currMap[b.price_floor] = b);
  const allPrices = new Set();
  prevBuckets.forEach(b => allPrices.add(b.price_floor));
  currBuckets.forEach(b => allPrices.add(b.price_floor));
  const result = [];
  allPrices.forEach(p => {
    const prev = prevMap[p] || { supply: 0, realized_cap: 0 };
    const curr = currMap[p] || { supply: 0, realized_cap: 0 };
    const dSup = prev.supply - curr.supply;
    const dRC  = prev.realized_cap - curr.realized_cap;
    if (dSup > 0) {
      result.push({ price_floor: p, supply: dSup, realized_cap: dRC > 0 ? dRC : dSup * p });
    }
  });
  result.sort((a, b) => a.price_floor - b.price_floor);
  return result;
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator base class — every indicator owns LWC series and a config
// ───────────────────────────────────────────────────────────────────────────
class Indicator {
  static type = "base";
  static displayName = "Base";
  static pane = "top"; // "top" or "bottom"
  static configSchema = []; // [{key, label, type, options?, default}, ...]

  constructor(config = {}) {
    this.id = "ind_" + Math.random().toString(36).slice(2, 9);
    this.config = Object.assign({}, this.defaultConfig(), config);
    this.series = [];
    this.priceLines = [];
    this.disposed = false;
    this.visible = true;
  }
  defaultConfig() {
    const out = {};
    for (const f of this.constructor.configSchema) out[f.key] = f.default;
    return out;
  }
  pane() { return this.constructor.pane; }
  chart() { return this.pane() === "top" ? topChart : bottomChart; }
  displayName() { return this.constructor.displayName; }
  swatchColor() { return this.config.color || THEME.cyan; }
  // Subclasses override
  async load() { throw new Error("not implemented"); }
  // Some indicators need to update when the date changes (URPD profile etc.)
  onDateChange(dateStr) {}
  // Toggle the rendered visibility of all owned series. Doesn't remove the
  // indicator — it can be re-shown via setVisible(true). Subclasses that draw
  // via price lines or other non-series mechanisms should override this.
  setVisible(v) {
    this.visible = !!v;
    for (const s of this.series) {
      try { s.applyOptions({ visible: this.visible }); } catch (e) {}
    }
  }
  toggleVisible() { this.setVisible(!this.visible); }
  remove() {
    if (this.disposed) return;
    for (const s of this.series) {
      try { this.chart().removeSeries(s); } catch (e) {}
    }
    // Price lines on a series die with the series
    this.series = [];
    this.priceLines = [];
    this.disposed = true;
  }
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator: BTC Price — always present, always first
// ───────────────────────────────────────────────────────────────────────────
class BTCPriceIndicator extends Indicator {
  static type = "btc_price";
  static displayName = "BTC/USD";
  static pane = "top";
  static configSchema = [];

  async load() {
    const chartType = currentChartType || "line";
    const series = createBTCPriceSeries(chartType);
    this.series.push(series);
    this._priceSeries = series;
    topChart.timeScale().fitContent();
  }
  swatchColor() { return THEME.priceLine; }
  getPriceSeries() { return this._priceSeries; }
}

// Build a series for the given chart type using the loaded daily close array.
// BRK only exposes daily closes, so OHLC types get synthesized OHLC where each
// bar's open = previous close (a minimal but valid OHLC). Heikin Ashi runs the
// standard recursive formula over the same synthesized data.
function createBTCPriceSeries(chartType) {
  const closes = priceArray;
  const dates = priceDateStrs;
  const linePts = [];
  const ohlcPts = [];
  const hasData = (i) => typeof closes[i] === "number" && closes[i] > 0;

  for (let i = 0; i < closes.length; i++) {
    if (!hasData(i)) continue;
    linePts.push({ time: dates[i], value: closes[i] });
  }
  function pushOHLC() {
    let prev = null;
    for (let i = 0; i < closes.length; i++) {
      if (!hasData(i)) continue;
      const c = closes[i];
      const o = (prev !== null) ? prev : c;
      ohlcPts.push({ time: dates[i], open: o, high: Math.max(o, c), low: Math.min(o, c), close: c });
      prev = c;
    }
  }
  function pushHA() {
    let prev = null, haPrevOpen = null, haPrevClose = null;
    for (let i = 0; i < closes.length; i++) {
      if (!hasData(i)) continue;
      const c = closes[i];
      const o = (prev !== null) ? prev : c;
      const h = Math.max(o, c), l = Math.min(o, c);
      const haClose = (o + h + l + c) / 4;
      const haOpen = (haPrevOpen === null) ? (o + c) / 2 : (haPrevOpen + haPrevClose) / 2;
      const haHigh = Math.max(h, haOpen, haClose);
      const haLow  = Math.min(l, haOpen, haClose);
      ohlcPts.push({ time: dates[i], open: haOpen, high: haHigh, low: haLow, close: haClose });
      haPrevOpen = haOpen; haPrevClose = haClose; prev = c;
    }
  }

  const baseOpts = { priceLineVisible: false, lastValueVisible: true, title: "BTC/USD" };
  let series;
  switch (chartType) {
    case "line":
      series = topChart.addSeries(LightweightCharts.LineSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, lineWidth: 2 }));
      series.setData(linePts);
      break;
    case "step":
      series = topChart.addSeries(LightweightCharts.LineSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, lineWidth: 2,
          lineType: LightweightCharts.LineType.WithSteps }));
      series.setData(linePts);
      break;
    case "line_markers": {
      series = topChart.addSeries(LightweightCharts.LineSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, lineWidth: 2 }));
      series.setData(linePts);
      // Markers every ~Nth point so we don't overwhelm the chart at 6K points
      const stride = Math.max(1, Math.floor(linePts.length / 60));
      const markers = [];
      for (let i = 0; i < linePts.length; i += stride) {
        markers.push({ time: linePts[i].time, position: "inBar",
          color: THEME.priceLine, shape: "circle", size: 0.8 });
      }
      try { series.setMarkers(markers); } catch (e) { /* v5 markers API quirks */ }
      break;
    }
    case "area":
      series = topChart.addSeries(LightweightCharts.AreaSeries,
        Object.assign({}, baseOpts, {
          lineColor: THEME.priceLine, lineWidth: 2,
          topColor: "rgba(255,255,255,0.35)", bottomColor: "rgba(255,255,255,0.02)",
        }));
      series.setData(linePts);
      break;
    case "hlc_area":
      // No native LWC HLC area series. Render as area, label clarifies behaviour.
      series = topChart.addSeries(LightweightCharts.AreaSeries,
        Object.assign({}, baseOpts, {
          title: "BTC/USD (HLC≈Area, single-value approx)",
          lineColor: THEME.cyan, lineWidth: 2,
          topColor: "rgba(0,212,255,0.30)", bottomColor: "rgba(0,212,255,0.02)",
        }));
      series.setData(linePts);
      break;
    case "baseline": {
      // Baseline at the median close so positive/negative regions are balanced
      const sorted = linePts.map(p => p.value).sort((a, b) => a - b);
      const median = sorted.length ? sorted[Math.floor(sorted.length / 2)] : 0;
      series = topChart.addSeries(LightweightCharts.BaselineSeries,
        Object.assign({}, baseOpts, {
          baseValue: { type: "price", price: median }, lineWidth: 2,
          topLineColor: THEME.profit, bottomLineColor: THEME.loss,
          topFillColor1: "rgba(46,204,113,0.30)", topFillColor2: "rgba(46,204,113,0.02)",
          bottomFillColor1: "rgba(255,92,92,0.02)", bottomFillColor2: "rgba(255,92,92,0.30)",
        }));
      series.setData(linePts);
      break;
    }
    case "columns":
      series = topChart.addSeries(LightweightCharts.HistogramSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, base: 0 }));
      series.setData(linePts);
      break;
    case "bars":
      pushOHLC();
      series = topChart.addSeries(LightweightCharts.BarSeries,
        Object.assign({}, baseOpts, {
          upColor: THEME.profit, downColor: THEME.loss, openVisible: true, thinBars: false,
        }));
      series.setData(ohlcPts);
      break;
    case "candles":
      pushOHLC();
      series = topChart.addSeries(LightweightCharts.CandlestickSeries,
        Object.assign({}, baseOpts, {
          upColor: THEME.profit, downColor: THEME.loss,
          borderUpColor: THEME.profit, borderDownColor: THEME.loss,
          wickUpColor: THEME.profit, wickDownColor: THEME.loss,
        }));
      series.setData(ohlcPts);
      break;
    case "hollow_candles":
      pushOHLC();
      series = topChart.addSeries(LightweightCharts.CandlestickSeries,
        Object.assign({}, baseOpts, {
          // Hollow up bars: transparent body, colored border
          upColor: "rgba(0,0,0,0)", downColor: THEME.loss,
          borderUpColor: THEME.profit, borderDownColor: THEME.loss,
          wickUpColor: THEME.profit, wickDownColor: THEME.loss,
        }));
      series.setData(ohlcPts);
      break;
    case "high_low":
      pushOHLC();
      series = topChart.addSeries(LightweightCharts.BarSeries,
        Object.assign({}, baseOpts, {
          upColor: THEME.priceLine, downColor: THEME.priceLine, openVisible: false, thinBars: true,
        }));
      series.setData(ohlcPts);
      break;
    case "heikin_ashi":
      pushHA();
      series = topChart.addSeries(LightweightCharts.CandlestickSeries,
        Object.assign({}, baseOpts, {
          title: "BTC/USD (Heikin Ashi)",
          upColor: THEME.profit, downColor: THEME.loss,
          borderUpColor: THEME.profit, borderDownColor: THEME.loss,
          wickUpColor: THEME.profit, wickDownColor: THEME.loss,
        }));
      series.setData(ohlcPts);
      break;
    default:
      // Fallback: line
      series = topChart.addSeries(LightweightCharts.LineSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, lineWidth: 2 }));
      series.setData(linePts);
  }
  return series;
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator: Spot Price Line — orange dashed line at current date's spot
// Tracks the global "current date" — moves with crosshair scrub.
// ───────────────────────────────────────────────────────────────────────────
class SpotPriceLineIndicator extends Indicator {
  static type = "spot_line";
  static displayName = "Spot Price Line";
  static pane = "top";
  static configSchema = [
    { key: "color", label: "Color", type: "color", default: THEME.spot },
  ];

  async load() {
    this._priceLine = null;
    this.onDateChange(currentDateStr);
  }
  swatchColor() { return this.config.color; }
  onDateChange(dateStr) {
    const spot = getSpotForDate(dateStr);
    if (!spot) return;
    const btcInd = activeIndicators.values().next().value;
    if (!btcInd || !btcInd.getPriceSeries) return;
    const series = btcInd.getPriceSeries();
    if (this._priceLine) {
      try { series.removePriceLine(this._priceLine); } catch (e) {}
    }
    this._priceLine = series.createPriceLine({
      price: spot, color: this.config.color, lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true, title: `spot ${dateStr}`,
    });
  }
  remove() {
    if (this._priceLine) {
      const btcInd = activeIndicators.values().next().value;
      if (btcInd && btcInd.getPriceSeries) {
        try { btcInd.getPriceSeries().removePriceLine(this._priceLine); } catch (e) {}
      }
    }
    super.remove();
  }
  // Spot uses a price line on the BTC series, not a series of its own.
  // Hide by zeroing line width + axis label; restore by re-creating on toggle.
  setVisible(v) {
    this.visible = !!v;
    if (!this._priceLine) return;
    try {
      if (this.visible) {
        this._priceLine.applyOptions({ lineWidth: 1, axisLabelVisible: true });
      } else {
        this._priceLine.applyOptions({ lineWidth: 0, axisLabelVisible: false });
      }
    } catch (e) {}
  }
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator: Realised Price Line (URPD mean over time)
// Uses BRK's precomputed daily series for speed.
// ───────────────────────────────────────────────────────────────────────────
// Base for any "BRK precomputed daily series" line indicator on the top chart
class TopPaneSeriesIndicator extends Indicator {
  static pane = "top";
  // Subclasses MUST override
  endpoint() { throw new Error("endpoint not implemented"); }
  seriesTitle() { return this.constructor.displayName; }

  async load() {
    let resp;
    try { resp = await fetchJSON(BASE + this.endpoint()); }
    catch (e) {
      throw new Error(`${this.constructor.displayName}: ${e.message}`);
    }
    const arr = resp.data || resp;
    const points = [];
    for (let i = 0; i < arr.length; i++) {
      const v = arr[i];
      if (typeof v === "number" && v > 0 && i < priceDateStrs.length) {
        points.push({ time: priceDateStrs[i], value: v });
      }
    }
    const series = topChart.addSeries(LightweightCharts.LineSeries, {
      color: this.config.color,
      lineWidth: this.config.lineWidth,
      priceLineVisible: false,
      lastValueVisible: true,
      title: this.seriesTitle(),
    });
    series.setData(points);
    this.series.push(series);
  }
  swatchColor() { return this.config.color; }
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator: URPD Profile (point-in-time histogram, bottom pane)
// ───────────────────────────────────────────────────────────────────────────
// ───────────────────────────────────────────────────────────────────────────
// Base class for any "point-in-time histogram" indicator on the bottom pane.
// Subclasses just override fetchBuckets(dateStr) to define the data source.
// All shared logic — aggregation, P/L color split, stats box, per-instance
// price scale, scale ownership handoff on removal — lives here.
// ───────────────────────────────────────────────────────────────────────────
class ProfileHistogramIndicator extends Indicator {
  static pane = "bottom";

  // Subclasses MUST override
  async fetchBuckets(dateStr) { throw new Error("fetchBuckets not implemented"); }

  async load() {
    this._statBox = document.createElement("div");
    this._statBox.className = "stat-box";
    this._statBox.setAttribute("data-id", this.id);
    this._statBox.innerHTML = `<div class="title-row">` +
      `<span class="swatch" style="background:${this.swatchColor()}"></span>` +
      `<span class="name">${this.displayName()}</span>` +
      `<span class="date">…</span></div>` +
      `<div style="color:#666">loading…</div>`;
    document.getElementById("stats-stack").appendChild(this._statBox);
    await this.onDateChange(currentDateStr);
  }

  async onDateChange(dateStr) {
    let buckets;
    try { buckets = await this.fetchBuckets(dateStr); }
    catch (e) {
      console.error(this.constructor.type, "fetch:", e);
      if (this._statBox) this._statBox.innerHTML = `<div class="title-row">` +
        `<span class="swatch" style="background:${this.swatchColor()}"></span>` +
        `<span class="name">${this.displayName()}</span></div>` +
        `<div style="color:#ff5c5c">err: ${e.message}</div>`;
      return;
    }
    if (!buckets || buckets.length === 0) {
      if (this._statBox) this._statBox.innerHTML = `<div class="title-row">` +
        `<span class="swatch" style="background:${this.swatchColor()}"></span>` +
        `<span class="name">${this.displayName()}</span></div>` +
        `<div style="color:#666">no data for ${dateStr}</div>`;
      return;
    }

    const spot = getSpotForDate(dateStr) || 0;
    const weightField = this.config.weight === "usd" ? "realized_cap" : "supply";
    const TARGET_BINS = this.config.bins || 500;

    // Aggregate raw bins → fixed-width buckets
    let minPrice = Infinity, maxPrice = -Infinity;
    for (const b of buckets) {
      if (!b[weightField] || b[weightField] <= 0) continue;
      if (b.price_floor < minPrice) minPrice = b.price_floor;
      if (b.price_floor > maxPrice) maxPrice = b.price_floor;
    }
    if (!isFinite(minPrice) || !isFinite(maxPrice) || maxPrice <= minPrice) return;
    if (minPrice < 1) minPrice = 1;
    const binWidth = (maxPrice - minPrice) / TARGET_BINS;
    const agg = new Array(TARGET_BINS).fill(0).map((_, i) => ({
      price: minPrice + i * binWidth, weight: 0,
    }));
    for (const b of buckets) {
      const w = b[weightField];
      if (!w || w <= 0) continue;
      if (b.price_floor < minPrice) continue;
      let idx = Math.floor((b.price_floor - minPrice) / binWidth);
      if (idx >= TARGET_BINS) idx = TARGET_BINS - 1;
      if (idx < 0) continue;
      agg[idx].weight += w;
    }

    const dataPoints = [];
    let total = 0, profit = 0, loss = 0;
    let lastTime = -Infinity;
    for (const a of agg) {
      if (a.weight <= 0) continue;
      let t = a.price;
      if (t <= lastTime) t = lastTime + 0.0001;
      lastTime = t;
      total += a.weight;
      const inProfit = a.price <= spot;
      if (inProfit) profit += a.weight; else loss += a.weight;
      dataPoints.push({ time: t, value: a.weight, color: inProfit ? THEME.profit : THEME.loss });
    }

    // Replace series; per-instance price scale (first profile claims visible right axis)
    if (this._series) {
      try { bottomChart.removeSeries(this._series); } catch (e) {}
      const idx = this.series.indexOf(this._series);
      if (idx >= 0) this.series.splice(idx, 1);
    }
    if (!_visibleScaleOwner) _visibleScaleOwner = this.id;
    const isVisibleScale = (_visibleScaleOwner === this.id);
    const scaleId = isVisibleScale ? "right" : this.id;

    this._series = bottomChart.addSeries(LightweightCharts.HistogramSeries, {
      priceScaleId: scaleId,
      priceFormat: { type: "volume" },
      priceLineVisible: false, lastValueVisible: false,
      title: weightField === "supply" ? "BTC supply" : "USD realised cap",
    });
    if (!isVisibleScale) {
      bottomChart.priceScale(scaleId).applyOptions({
        visible: false, scaleMargins: { top: 0.05, bottom: 0.05 },
      });
    }
    this._series.setData(dataPoints);
    this.series.push(this._series);
    bottomChart.timeScale().fitContent();

    // Update our stats box
    const fmtCount = (n) => weightField === "supply" ? `${(n/1e6).toFixed(2)}M BTC` : `$${(n/1e9).toFixed(2)}B`;
    const pctProfit = total > 0 ? (100 * profit / total) : 0;
    if (this._statBox) {
      this._statBox.innerHTML = `<div class="title-row">` +
        `<span class="swatch" style="background:${this.swatchColor()}"></span>` +
        `<span class="name">${this.displayName()}</span>` +
        `<span class="date">${dateStr}</span></div>` +
        `<div><span class="label">Spot</span> <span class="value">$${spot.toLocaleString("en-US",{maximumFractionDigits:0})}</span></div>` +
        `<div><span class="label">Total</span> <span class="value">${fmtCount(total)}</span> &nbsp;` +
          `<span class="label">Bins</span> <span class="value">${dataPoints.length}</span></div>` +
        `<div><span class="profit">In Profit ${pctProfit.toFixed(1)}% (${fmtCount(profit)})</span></div>` +
        `<div><span class="loss">In Loss ${(100-pctProfit).toFixed(1)}% (${fmtCount(loss)})</span></div>`;
    }
  }

  remove() {
    if (_visibleScaleOwner === this.id) {
      _visibleScaleOwner = null;
      for (const ind of activeIndicators.values()) {
        if (ind !== this && ind instanceof ProfileHistogramIndicator) {
          _visibleScaleOwner = ind.id;
          if (typeof ind.onDateChange === "function") ind.onDateChange(currentDateStr);
          break;
        }
      }
    }
    if (this._statBox && this._statBox.parentNode) this._statBox.parentNode.removeChild(this._statBox);
    this._statBox = null;
    super.remove();
  }
}

// ───────────────────────────────────────────────────────────────────────────
// AGE-band URPD: fetches all 21 cohort URPDs in parallel, colors each bar by
// the dominant cohort at that price level. Overrides onDateChange entirely so
// per-cohort breakdown survives aggregation (the base class only tracks total
// weight per agg bin).
// ───────────────────────────────────────────────────────────────────────────
class URPDAgeBandProfileIndicator extends ProfileHistogramIndicator {
  static type = "urpd_age_band";
  static displayName = "URPD Profile — Age Bands";
  static configSchema = [
    { key: "weight", label: "Weight", type: "select",
      options: [{v:"btc",l:"BTC (supply)"},{v:"usd",l:"USD (realised cap)"}], default: "btc" },
    { key: "bins", label: "Bins", type: "select",
      options: [{v:200,l:"200"},{v:500,l:"500"},{v:1000,l:"1000"}], default: 500 },
  ];

  // fetchBuckets is unused for this indicator (we override onDateChange instead)
  async fetchBuckets() { return []; }

  async onDateChange(dateStr) {
    if (this._statBox) {
      this._statBox.querySelector(".date").textContent = dateStr;
    }
    // Fetch all 21 cohorts in parallel, ignore individual failures
    const cohortResps = await Promise.all(AGE_BANDS.map(b =>
      getURPDCohort(dateStr, b.cohort).catch(() => null)
    ));
    const fetched = cohortResps.filter(r => r && r.buckets).length;
    if (fetched === 0) {
      if (this._statBox) {
        this._statBox.innerHTML = `<div class="title-row">` +
          `<span class="swatch" style="background:${this.swatchColor()}"></span>` +
          `<span class="name">${this.displayName()}</span></div>` +
          `<div style="color:#ff5c5c">no cohort data for ${dateStr}</div>`;
      }
      return;
    }

    const spot = getSpotForDate(dateStr) || 0;
    const weightField = this.config.weight === "usd" ? "realized_cap" : "supply";
    const TARGET_BINS = this.config.bins || 500;

    // Find combined min/max price across all cohorts
    let minPrice = Infinity, maxPrice = -Infinity;
    for (const resp of cohortResps) {
      if (!resp || !resp.buckets) continue;
      for (const b of resp.buckets) {
        if (!b[weightField] || b[weightField] <= 0) continue;
        if (b.price_floor < minPrice) minPrice = b.price_floor;
        if (b.price_floor > maxPrice) maxPrice = b.price_floor;
      }
    }
    if (!isFinite(minPrice) || !isFinite(maxPrice) || maxPrice <= minPrice) return;
    if (minPrice < 1) minPrice = 1;
    const binWidth = (maxPrice - minPrice) / TARGET_BINS;

    // Aggregate: per agg bin, accumulate weight per band so we can pick dominant
    const agg = new Array(TARGET_BINS).fill(0).map((_, i) => ({
      price: minPrice + i * binWidth,
      total: 0,
      perBand: new Array(AGE_BANDS.length).fill(0),
    }));
    for (let bandIdx = 0; bandIdx < AGE_BANDS.length; bandIdx++) {
      const resp = cohortResps[bandIdx];
      if (!resp || !resp.buckets) continue;
      for (const b of resp.buckets) {
        const w = b[weightField];
        if (!w || w <= 0) continue;
        if (b.price_floor < minPrice) continue;
        let idx = Math.floor((b.price_floor - minPrice) / binWidth);
        if (idx >= TARGET_BINS) idx = TARGET_BINS - 1;
        if (idx < 0) continue;
        agg[idx].total += w;
        agg[idx].perBand[bandIdx] += w;
      }
    }

    // Build LWC data points + per-band total tally for the stats box
    const dataPoints = [];
    let total = 0;
    let lastTime = -Infinity;
    const bandTotals = new Array(AGE_BANDS.length).fill(0);
    for (const a of agg) {
      if (a.total <= 0) continue;
      let t = a.price;
      if (t <= lastTime) t = lastTime + 0.0001;
      lastTime = t;
      total += a.total;
      // Find dominant band at this bin
      let maxIdx = 0, maxV = a.perBand[0];
      for (let i = 1; i < a.perBand.length; i++) {
        if (a.perBand[i] > maxV) { maxV = a.perBand[i]; maxIdx = i; }
        bandTotals[i] += a.perBand[i];
      }
      bandTotals[0] += a.perBand[0];
      dataPoints.push({ time: t, value: a.total, color: AGE_BAND_COLORS[maxIdx] });
    }

    // Replace series + own a unique price scale
    if (this._series) {
      try { bottomChart.removeSeries(this._series); } catch (e) {}
      const idx = this.series.indexOf(this._series);
      if (idx >= 0) this.series.splice(idx, 1);
    }
    if (!_visibleScaleOwner) _visibleScaleOwner = this.id;
    const isVisibleScale = (_visibleScaleOwner === this.id);
    const scaleId = isVisibleScale ? "right" : this.id;
    this._series = bottomChart.addSeries(LightweightCharts.HistogramSeries, {
      priceScaleId: scaleId,
      priceFormat: { type: "volume" },
      priceLineVisible: false, lastValueVisible: false,
      title: weightField === "supply" ? "BTC supply" : "USD realised cap",
    });
    if (!isVisibleScale) {
      bottomChart.priceScale(scaleId).applyOptions({
        visible: false, scaleMargins: { top: 0.05, bottom: 0.05 },
      });
    }
    this._series.setData(dataPoints);
    this.series.push(this._series);
    bottomChart.timeScale().fitContent();

    // Update stats box with top-3 dominant cohorts
    const fmtCount = (n) => weightField === "supply" ? `${(n/1e6).toFixed(2)}M BTC` : `$${(n/1e9).toFixed(2)}B`;
    const ranked = bandTotals.map((v, i) => ({ v, i }))
      .filter(x => x.v > 0)
      .sort((a, b) => b.v - a.v)
      .slice(0, 5);
    const topRows = ranked.map(r =>
      `<div><span style="color:${AGE_BAND_COLORS[r.i]}">█</span> ` +
      `<span class="label">${AGE_BANDS[r.i].label}</span> ` +
      `<span class="value">${fmtCount(r.v)} (${(100*r.v/total).toFixed(1)}%)</span></div>`
    ).join("");
    if (this._statBox) {
      this._statBox.innerHTML = `<div class="title-row">` +
        `<span class="swatch" style="background:${this.swatchColor()}"></span>` +
        `<span class="name">${this.displayName()}</span>` +
        `<span class="date">${dateStr}</span></div>` +
        `<div><span class="label">Cohorts loaded</span> <span class="value">${fetched}/21</span></div>` +
        `<div><span class="label">Total</span> <span class="value">${fmtCount(total)}</span> &nbsp;` +
          `<span class="label">Bins</span> <span class="value">${dataPoints.length}</span></div>` +
        `<div style="margin-top:3px;color:#888">Top cohorts (by ${weightField === "supply" ? "BTC" : "USD"}):</div>` +
        topRows;
    }
  }

  swatchColor() {
    // Show a small rainbow gradient as the indicator's swatch
    return `linear-gradient(90deg, ${AGE_BAND_COLORS[0]}, ${AGE_BAND_COLORS[10]}, ${AGE_BAND_COLORS[20]})`;
  }
  displayName() { return `URPD Age Bands (${this.config.weight.toUpperCase()})`; }
}

const activeIndicators = new Map(); // id → Indicator

function refreshIndicatorPanel() {
  const list = document.getElementById("ip-list");
  list.innerHTML = "";
  for (const [id, ind] of activeIndicators) {
    const row = document.createElement("div");
    row.className = "ip-row";
    const isBTC = ind.constructor.type === "btc_price";
    const hasConfig = ind.constructor.configSchema && ind.constructor.configSchema.length > 0;
    row.innerHTML =
      `<span class="ip-swatch" style="background:${ind.swatchColor()}"></span>` +
      `<span class="ip-name">${ind.displayName()}</span>` +
      `<span class="ip-pane">${ind.pane()}</span>` +
      (isBTC ? "" :
        (hasConfig ? `<button class="ip-cog" data-id="${id}" title="Settings">⚙</button>` : "") +
        `<button class="ip-x" data-id="${id}" title="Remove">×</button>`);
    list.appendChild(row);
  }
  refreshPaneHeaders();
  list.querySelectorAll(".ip-x").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-id");
      const ind = activeIndicators.get(id);
      if (ind) { ind.remove(); activeIndicators.delete(id); refreshIndicatorPanel(); }
    });
  });
  list.querySelectorAll(".ip-cog").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-id");
      const ind = activeIndicators.get(id);
      if (ind) openConfigModal(ind.constructor.type, ind);
    });
  });
}

// Per-pane header bars: render a colored badge for each indicator in the pane.
// For top-pane indicators, badge label is the short displayName. For bottom-pane,
// the title section also gets the current date and a guess at what kind of profile
// is being shown (URPD / SOPD / mixed).
function shortDisplayName(ind) {
  // Compress the displayName a bit so badges stay narrow
  const name = typeof ind.displayName === "function" ? ind.displayName() : ind.constructor.displayName;
  return name
    .replace(/Realised Price/gi, "RP")
    .replace(/URPD Profile/gi, "URPD")
    .replace(/SOPD Profile/gi, "SOPD")
    .replace(/URPD Age Bands/gi, "URPD Age")
    .replace(/Spot Price Line/gi, "Spot");
}
function badgeHTML(ind) {
  const swatch = ind.swatchColor();
  // Use linear-gradient swatches as background, solid colors as background too
  const dotStyle = swatch.startsWith("linear-gradient")
    ? `background:${swatch}` : `background:${swatch}`;
  return `<span class="ind-badge"><span class="dot" style="${dotStyle}"></span>` +
    `<span class="ind-label">${shortDisplayName(ind)}</span></span>`;
}
// SVG icons for the in-chart indicator-row hover action buttons.
const ICON_EYE_OPEN  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/></svg>`;
const ICON_EYE_CLOSED = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3l18 18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M10.6 6.1A10 10 0 0 1 12 6c6 0 10 7 10 7a18 18 0 0 1-3.2 3.7M6.6 6.6A18 18 0 0 0 2 13s4 7 10 7c1.5 0 2.9-.4 4.1-1" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>`;

function indRowHTML(ind) {
  const swatch = ind.swatchColor();

  const eyeIcon = ind.visible ? ICON_EYE_OPEN : ICON_EYE_CLOSED;

function refreshPaneHeaders() {
  // Bottom pane title flips based on what's loaded
  let hasURPD = false, hasSOPD = false;
  for (const ind of activeIndicators.values()) {
    if (ind.pane() !== "bottom") continue;
    const t = ind.constructor.type;
    if (t.startsWith("urpd")) hasURPD = true;
    if (t.startsWith("sopd")) hasSOPD = true;
  }
  let botTitle;
  if (hasURPD && hasSOPD) botTitle = "URPD + SOPD";
  else if (hasSOPD)        botTitle = "SOPD (1d diff)";
  else                     botTitle = "REALIZED PRICE DISTRIBUTION";
  document.getElementById("header-bottom-title").textContent = botTitle;
  document.getElementById("header-bottom-date").textContent = currentDateStr || "—";

  // Build per-indicator rows, one per pane. BTC/USD is shown in the pane title
  // itself, so we skip rendering a row for it. We also skip the Spot Price
  // Line — it's a passive helper marker that follows the crosshair date,
  // not something the user manages with hover hide/remove.
  const topRows = [], botRows = [];
  const SKIP_TYPES = new Set(["btc_price", "spot_line"]);
  for (const ind of activeIndicators.values()) {
    if (SKIP_TYPES.has(ind.constructor.type)) continue;
    const html = indRowHTML(ind);
    if (ind.pane() === "top") topRows.push(html); else botRows.push(html);
  }
  const topHost = document.getElementById("ind-rows-top");
  const botHost = document.getElementById("ind-rows-bottom");
  if (topHost) topHost.innerHTML = topRows.join("");
  if (botHost) botHost.innerHTML = botRows.join("");
}

// Delegated click handler for the in-chart per-indicator action buttons.
// We attach once at the pane-label container level and dispatch by class.
function _wireIndRowActions(rootId) {
  const root = document.getElementById(rootId);
  if (!root || root._wired) return;
  root._wired = true;
  root.addEventListener("click", async (e) => {
    const btn = e.target.closest("button.act-btn");
    if (!btn) return;
    const id = btn.getAttribute("data-id");
    const ind = activeIndicators.get(id);
    if (!ind) return;
    e.preventDefault();
    e.stopPropagation();
    if (btn.classList.contains("act-eye")) {
      ind.toggleVisible();
      // Re-render rows so swatch/name dim and the icon flips
      refreshPaneHeaders();
      saveStateToURL();
      if (typeof recordHistory === "function") recordHistory();
    } else if (btn.classList.contains("act-trash")) {
      try { ind.remove(); } catch (err) { console.warn("trash:", err); }
      activeIndicators.delete(id);
      refreshIndicatorPanel();
    }
  });
}
_wireIndRowActions("ind-rows-top");
_wireIndRowActions("ind-rows-bottom");

// ───────────────────────────────────────────────────────────────────────────
// Edit an existing indicator's config in place. Tears down its chart series
// and stats DOM, swaps in a new instance with the new config, and reloads.
// The new indicator gets a fresh id; we splice it into the same position in
// activeIndicators so panel order stays stable.
// ───────────────────────────────────────────────────────────────────────────
async function editIndicatorConfig(id, newConfig) {
  const ind = activeIndicators.get(id);
  if (!ind) return;
  const T = ind.constructor;
  // Capture insertion order so we can restore position
  const ids = [...activeIndicators.keys()];
  const idx = ids.indexOf(id);

  ind.remove();
  activeIndicators.delete(id);

  const newInd = new T(newConfig);
  // Rebuild map preserving order with new instance at the original position
  const entries = [...activeIndicators.entries()];
  entries.splice(idx, 0, [newInd.id, newInd]);
  activeIndicators.clear();
  for (const [k, v] of entries) activeIndicators.set(k, v);

  refreshIndicatorPanel();
  try {
    await newInd.load();
  } catch (e) {
    console.error("config edit failed:", e);
    document.getElementById("status").textContent = "Edit failed: " + e.message;
    activeIndicators.delete(newInd.id);
    refreshIndicatorPanel();
  }
}

function openAddModal() {
  const modal = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  const top = INDICATOR_TYPES.filter(t => t.pane === "top");
  const bot = INDICATOR_TYPES.filter(t => t.pane === "bottom");

  let html =
    `<div class="modal-header">` +
      `<h3>Indicators</h3>` +
      `<button class="modal-x" id="modal-x" title="Close">×</button>` +
    `</div>` +
    `<div class="modal-search">` +
      `<span class="search-icon">🔍</span>` +
      `<input type="text" id="modal-search-input" placeholder="Search" autocomplete="off">` +
    `</div>` +
    `<div class="modal-body" id="modal-body">`;
  if (top.length) {
    html += `<div class="section-title">Top pane — price chart</div>`;
    for (const T of top) html += renderTypeOption(T);
  }
  if (bot.length) {
    html += `<div class="section-title">Bottom pane — URPD / SOPD</div>`;
    for (const T of bot) html += renderTypeOption(T);
  }
  html += `</div>`;

  modal.innerHTML = html;
  bg.classList.add("show");

  // Wire up close
  modal.querySelector("#modal-x").addEventListener("click", () => bg.classList.remove("show"));

  // Click an option → open config modal
  modal.querySelectorAll(".ind-option").forEach(el => {
    el.addEventListener("click", () => {
      const type = el.getAttribute("data-type");
      bg.classList.remove("show");
      openConfigModal(type);
    });
  });

  // Search filter — case-insensitive substring match on the type's displayName
  const searchInput = modal.querySelector("#modal-search-input");
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();
    let lastVisibleSection = null;
    let anySectionVisible = false;
    modal.querySelectorAll("#modal-body > *").forEach(el => {
      if (el.classList.contains("section-title")) {
        // Hide section title if no following options match — handled by second pass
        el.dataset._isSection = "1";
        el.style.display = ""; // tentative
        if (lastVisibleSection) lastVisibleSection.dataset._anyVisible = anySectionVisible ? "1" : "";
        lastVisibleSection = el;
        anySectionVisible = false;
      } else if (el.classList.contains("ind-option")) {
        const name = el.querySelector(".name").textContent.toLowerCase();
        const visible = q === "" || name.includes(q);
        el.style.display = visible ? "" : "none";
        if (visible) anySectionVisible = true;
      }
    });
    // Final section's visibility
    if (lastVisibleSection) lastVisibleSection.dataset._anyVisible = anySectionVisible ? "1" : "";
    // Hide section titles that have no visible options under them
    modal.querySelectorAll("#modal-body > .section-title").forEach(el => {
      if (el.dataset._anyVisible !== "1") el.style.display = "none";
    });
  });
  // Auto-focus search input
  setTimeout(() => searchInput.focus(), 50);
}
function renderTypeOption(T) {
  const swatch = T.prototype.swatchColor ?
    (T.configSchema.find(f => f.key === "color") ? T.configSchema.find(f => f.key === "color").default : "#888")
    : "#888";
  return `<div class="ind-option" data-type="${T.type}">` +
    `<span class="swatch" style="background:${swatch}"></span>` +
    `<span class="name">${T.displayName}</span>` +
    `<span class="pane-tag">${T.pane}</span>` +
    `</div>`;
}

function openConfigModal(typeName, existingIndicator) {
  const T = INDICATOR_TYPES.find(t => t.type === typeName);
  if (!T) return;
  const isEdit = !!existingIndicator;
  const modal = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  let html =
    `<div class="modal-header">` +
      `<h3>${T.displayName} — ${isEdit ? "Edit" : "Configure"}</h3>` +
      `<button class="modal-x" id="modal-x" title="Close">×</button>` +
    `</div>` +
    `<div class="modal-body" style="padding:14px 0">`;
  if (T.configSchema.length === 0) {
    html += `<div style="color:#888;padding:0 18px">No options for this indicator.</div>`;
  }
  for (const f of T.configSchema) {
    // For edit mode, pull the current value from the existing indicator's config
    const currentVal = (isEdit && existingIndicator.config[f.key] !== undefined)
      ? existingIndicator.config[f.key]
      : f.default;
    html += `<div class="section"><label>${f.label}</label>`;
    if (f.type === "select") {
      html += `<select data-key="${f.key}">`;
      for (const opt of f.options) {
        const sel = (String(opt.v) === String(currentVal)) ? "selected" : "";
        html += `<option value="${opt.v}" ${sel}>${opt.l}</option>`;
      }
      html += `</select>`;
    } else if (f.type === "color") {
      html += `<input type="text" data-key="${f.key}" value="${currentVal}">`;
    } else {
      html += `<input type="text" data-key="${f.key}" value="${currentVal}">`;
    }
    html += `</div>`;
  }
  html += `</div><div class="actions">
    <button id="modal-cancel">Cancel</button>
    <button id="modal-apply" class="primary">${isEdit ? "Apply" : "Add"}</button>
  </div>`;
  modal.innerHTML = html;
  bg.classList.add("show");

  modal.querySelector("#modal-cancel").addEventListener("click", () => bg.classList.remove("show"));
  const xBtn = modal.querySelector("#modal-x");
  if (xBtn) xBtn.addEventListener("click", () => bg.classList.remove("show"));
  modal.querySelector("#modal-apply").addEventListener("click", async () => {
    const config = {};
    modal.querySelectorAll("[data-key]").forEach(el => {
      const k = el.getAttribute("data-key");
      let v = el.value;
      if (el.tagName === "SELECT") {
        const opt = T.configSchema.find(f => f.key === k);
        if (opt && typeof opt.default === "number") v = parseInt(v, 10);
      }
      config[k] = v;
    });
    bg.classList.remove("show");
    if (isEdit) {
      await editIndicatorConfig(existingIndicator.id, config);
      document.getElementById("status").textContent = `Updated: ${T.displayName}`;
    } else {
      const ind = new T(config);
      activeIndicators.set(ind.id, ind);
      refreshIndicatorPanel();
      try {
        await ind.load();
        document.getElementById("status").textContent = `Added: ${ind.displayName()}`;
      } catch (e) {
        console.error("Add indicator failed:", e);
        document.getElementById("status").textContent = "Failed: " + e.message;
        ind.remove();
        activeIndicators.delete(ind.id);
        refreshIndicatorPanel();
      }
    }
  });
}

let currentChartType = "line";

function setChartType(type) {
  if (!CHART_TYPES.find(t => t.v === type)) return;
  currentChartType = type;
  // Update the toolbar button icon to match the active type
  const def = CHART_TYPES.find(t => t.v === type);
  const slot = document.getElementById("chart-type-icon-slot");
  if (slot) slot.innerHTML = def.icon;
  // Update active class in menu
  document.querySelectorAll("#chart-type-menu .opt").forEach(el =>
    el.classList.toggle("active", el.getAttribute("data-type") === type));
  // Rebuild the BTC indicator's series in place (keeps URL state + panel position)
  let btcId = null;
  for (const [id, ind] of activeIndicators) {
    if (ind.constructor.type === "btc_price") { btcId = id; break; }
  }
  if (!btcId) return;
  const oldInd = activeIndicators.get(btcId);
  // Tear down only the series, keep the indicator instance
  for (const s of oldInd.series) {
    try { topChart.removeSeries(s); } catch (e) {}
  }
  oldInd.series = [];
  oldInd._priceSeries = null;
  // Re-load with the new chart type
  // After rebuild, re-apply visibility if user had hidden BTC.
  oldInd.load()
    .then(() => { if (oldInd.visible === false) oldInd.setVisible(false); })
    .catch(e => console.error("chart type swap:", e));
  document.getElementById("status").textContent = `Chart type: ${def.label}`;
}

  menu.querySelectorAll(".opt").forEach(el => {
    el.addEventListener("click", () => {

      menu.classList.remove("show");

// ───────────────────────────────────────────────────────────────────────────
// Crosshair scrub: top chart hover → currentDateStr → notify all indicators
// ───────────────────────────────────────────────────────────────────────────
let scrubTimer = null;
let lastScrubDate = null;
const SCRUB_DEBOUNCE_MS = 80;

function setCurrentDate(dateStr) {
  currentDateStr = dateStr;
  document.getElementById("date-input").value = dateStr;
  for (const ind of activeIndicators.values()) {
    try { ind.onDateChange(dateStr); } catch (e) { console.error(ind.displayName(), e); }
  }
}

const scrubToggle = document.getElementById("scrub-toggle");
const hoverTopEl = document.getElementById("hover-top");

function updateHoverReadout(dateStr) {
  if (!hoverTopEl || !priceArray || !priceDateStrs) return;
  if (!dateStr) { hoverTopEl.innerHTML = ""; return; }
  const idx = priceDateStrs.indexOf(dateStr);
  if (idx < 0) { hoverTopEl.innerHTML = ""; return; }
  const price = priceArray[idx];
  if (typeof price !== "number" || price <= 0) { hoverTopEl.innerHTML = ""; return; }
  // Change vs previous bar
  let prev = null;
  for (let i = idx - 1; i >= 0; i--) {
    if (typeof priceArray[i] === "number" && priceArray[i] > 0) { prev = priceArray[i]; break; }
  }
  let changeHTML = "";
  if (prev !== null) {
    const abs = price - prev;
    const pct = (abs / prev) * 100;
    const cls = abs >= 0 ? "change-up" : "change-down";
    const sign = abs >= 0 ? "+" : "";
    changeHTML = `<span class="${cls}">${sign}${abs.toLocaleString("en-US",{maximumFractionDigits:2})} ` +
      `(${sign}${pct.toFixed(2)}%)</span>`;
  }
  hoverTopEl.innerHTML = `<span class="price">${price.toLocaleString("en-US",{maximumFractionDigits:2})}</span>${changeHTML}`;
}

topChart.subscribeCrosshairMove((param) => {
  // Hover readout: always update (independent of scrub setting)
  let dateStr = null;
  if (param.time) {
    if (typeof param.time === "string") dateStr = param.time;
    else if (typeof param.time === "object" && "year" in param.time) {
      dateStr = `${param.time.year}-${String(param.time.month).padStart(2,"0")}-${String(param.time.day).padStart(2,"0")}`;
    }
  }
  updateHoverReadout(dateStr);

  // Scrub: only update currentDateStr if scrub is enabled
  if (!scrubToggle.checked) return;
  if (!dateStr) return;
  if (dateStr === lastScrubDate) return;
  lastScrubDate = dateStr;
  if (priceDateStrs.indexOf(dateStr) < 0) return;
  if (scrubTimer) clearTimeout(scrubTimer);
  scrubTimer = setTimeout(() => setCurrentDate(dateStr), SCRUB_DEBOUNCE_MS);
});

document.getElementById("date-input").addEventListener("change", (e) => setCurrentDate(e.target.value));
