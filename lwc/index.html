// Live clock + timezone picker (click clock to choose a timezone).
// Selection persists in localStorage. Offsets are computed live so they
// reflect daylight-saving correctly. The dropdown is grouped by UTC offset.
(function startTZClock() {
  const el = document.getElementById("utc-clock");
  const menu = document.getElementById("tz-menu");
  if (!el || !menu) return;

  // IANA zone list — one per common offset/city. Order roughly west→east so
  // when sorted by offset we get a clean (UTC-12) → (UTC+14) cascade.
  const ZONES = [
    { name: "UTC",          iana: "UTC",          fixed: true },
    { name: "Exchange",     iana: "UTC",          fixed: true }, // BTC has no exchange — defaults to UTC
    { name: "Honolulu",     iana: "Pacific/Honolulu" },
    { name: "Anchorage",    iana: "America/Anchorage" },
    { name: "Juneau",       iana: "America/Juneau" },
    { name: "Los Angeles",  iana: "America/Los_Angeles" },
    { name: "Phoenix",      iana: "America/Phoenix" },
    { name: "Vancouver",    iana: "America/Vancouver" },
    { name: "Denver",       iana: "America/Denver" },
    { name: "Mexico City",  iana: "America/Mexico_City" },
    { name: "San Salvador", iana: "America/El_Salvador" },
    { name: "Bogota",       iana: "America/Bogota" },
    { name: "Chicago",      iana: "America/Chicago" },
    { name: "Lima",         iana: "America/Lima" },
    { name: "Caracas",      iana: "America/Caracas" },
    { name: "New York",     iana: "America/New_York" },
    { name: "Santiago",     iana: "America/Santiago" },
    { name: "Toronto",      iana: "America/Toronto" },
    { name: "Buenos Aires", iana: "America/Argentina/Buenos_Aires" },
    { name: "Sao Paulo",    iana: "America/Sao_Paulo" },
    { name: "Reykjavik",    iana: "Atlantic/Reykjavik" },
    { name: "Lisbon",       iana: "Europe/Lisbon" },
    { name: "London",       iana: "Europe/London" },
    { name: "Berlin",       iana: "Europe/Berlin" },
    { name: "Paris",        iana: "Europe/Paris" },
    { name: "Madrid",       iana: "Europe/Madrid" },
    { name: "Rome",         iana: "Europe/Rome" },
    { name: "Zurich",       iana: "Europe/Zurich" },
    { name: "Athens",       iana: "Europe/Athens" },
    { name: "Cairo",        iana: "Africa/Cairo" },
    { name: "Johannesburg", iana: "Africa/Johannesburg" },
    { name: "Istanbul",     iana: "Europe/Istanbul" },
    { name: "Moscow",       iana: "Europe/Moscow" },
    { name: "Tehran",       iana: "Asia/Tehran" },
    { name: "Dubai",        iana: "Asia/Dubai" },
    { name: "Karachi",      iana: "Asia/Karachi" },
    { name: "Mumbai",       iana: "Asia/Kolkata" },
    { name: "Kathmandu",    iana: "Asia/Kathmandu" },
    { name: "Dhaka",        iana: "Asia/Dhaka" },
    { name: "Bangkok",      iana: "Asia/Bangkok" },
    { name: "Hong Kong",    iana: "Asia/Hong_Kong" },
    { name: "Shanghai",     iana: "Asia/Shanghai" },
    { name: "Singapore",    iana: "Asia/Singapore" },
    { name: "Taipei",       iana: "Asia/Taipei" },
    { name: "Tokyo",        iana: "Asia/Tokyo" },
    { name: "Seoul",        iana: "Asia/Seoul" },
    { name: "Sydney",       iana: "Australia/Sydney" },
    { name: "Auckland",     iana: "Pacific/Auckland" },
  ];

  // Compute the current UTC offset (in hours, can be fractional like 5.5)
  function getOffsetHours(iana) {
    if (iana === "UTC") return 0;
    try {
      const fmt = new Intl.DateTimeFormat("en-US", { timeZone: iana, timeZoneName: "longOffset" });
      const parts = fmt.formatToParts(new Date());
      const tz = parts.find(p => p.type === "timeZoneName");
      if (!tz) return 0;
      // longOffset returns e.g. "GMT-05:00" or "GMT+05:30"; some browsers omit minutes
      const m = tz.value.match(/(?:GMT|UTC)?([+-])(\d{1,2})(?::(\d{2}))?/);
      if (!m) return 0;
      const sign = m[1] === "+" ? 1 : -1;
      return sign * (parseInt(m[2], 10) + (m[3] ? parseInt(m[3], 10) / 60 : 0));
    } catch (e) { return 0; }
  }
  function offsetLabel(iana) {
    const o = getOffsetHours(iana);
    const sign = o >= 0 ? "+" : "-";
    const abs = Math.abs(o);
    const h = Math.floor(abs);
    const m = Math.round((abs - h) * 60);
    return m === 0 ? `UTC${sign}${h}` : `UTC${sign}${h}:${String(m).padStart(2, "0")}`;
  }

  // Format the live clock for the toolbar in the picked zone.
  function formatClock(iana, name) {
    const d = new Date();
    if (iana === "UTC") {
      const hh = String(d.getUTCHours()).padStart(2, "0");
      const mm = String(d.getUTCMinutes()).padStart(2, "0");
      const ss = String(d.getUTCSeconds()).padStart(2, "0");
      return `${hh}:${mm}:${ss} ${name === "Exchange" ? "Exchange" : "UTC"}`;
    }
    try {
      const fmt = new Intl.DateTimeFormat("en-US", {
        timeZone: iana, hour12: false,
        hour: "2-digit", minute: "2-digit", second: "2-digit",
      });
      const parts = fmt.formatToParts(d);
      const get = t => (parts.find(p => p.type === t) || { value: "00" }).value;
      const hh = get("hour"), mm = get("minute"), ss = get("second");
      const tzFmt = new Intl.DateTimeFormat("en-US", { timeZone: iana, timeZoneName: "short" });
      const tzParts = tzFmt.formatToParts(d);
      const tzName = (tzParts.find(p => p.type === "timeZoneName") || { value: "" }).value;
      return `${hh === "24" ? "00" : hh}:${mm}:${ss} ${tzName}`;
    } catch (e) {
      return d.toISOString().slice(11, 19) + " UTC";
    }
  }

  // Read/write selected zone in localStorage
  const LS_KEY = "btlwc_tz";
  let selected = "UTC";
  try { selected = localStorage.getItem(LS_KEY) || "UTC"; } catch (e) {}
  // Map "UTC|Exchange" to its zone object — Exchange shares iana=UTC but unique key
  function zoneFromKey(k) {
    return ZONES.find(z => (z.name === "Exchange" ? "Exchange" : z.iana) === k) || ZONES[0];
  }
  function keyFor(z) { return z.name === "Exchange" ? "Exchange" : z.iana; }

  // Build menu HTML once. Order: UTC, Exchange, then by offset ascending.
  function buildMenu() {
    const sorted = ZONES.slice().sort((a, b) => {
      if (a.fixed && !b.fixed) return -1;
      if (!a.fixed && b.fixed) return 1;
      if (a.fixed && b.fixed) return ZONES.indexOf(a) - ZONES.indexOf(b);
      return getOffsetHours(a.iana) - getOffsetHours(b.iana) ||
             a.name.localeCompare(b.name);
    });
    let html = "";
    let lastDivider = false;
    sorted.forEach((z, i) => {
      if (z.name === "Exchange" && !lastDivider) { /* no divider before Exchange */ }
      if (!z.fixed && lastDivider !== "afterFixed") {
        html += `<div class="divider"></div>`;
        lastDivider = "afterFixed";
      }
      const label = z.fixed ? z.name : `(${offsetLabel(z.iana)}) ${z.name}`;
      const k = keyFor(z);
      html += `<div class="opt${k === selected ? " active" : ""}" data-key="${k}">${label}</div>`;
    });
    menu.innerHTML = html;
    menu.querySelectorAll(".opt").forEach(el => {
      el.addEventListener("click", () => {
        selected = el.getAttribute("data-key");
        try { localStorage.setItem(LS_KEY, selected); } catch (e) {}
        menu.classList.remove("show");
        // Update active mark in menu
        menu.querySelectorAll(".opt").forEach(o =>
          o.classList.toggle("active", o.getAttribute("data-key") === selected));
        tick();
      });
    });
  }

  function tick() {
    const z = zoneFromKey(selected);
    el.textContent = formatClock(z.iana, z.name);
  }

  el.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!menu.classList.contains("show")) buildMenu();
    menu.classList.toggle("show");
  });
  document.addEventListener("click", (e) => {
    if (!menu.contains(e.target) && e.target !== el) menu.classList.remove("show");
  });

  tick();
  setInterval(tick, 1000);
})();

// Calendar icon button — opens the native date picker. The hidden date input
// is the one wired to setCurrentDate, so opening it via showPicker() preserves
// every existing onChange handler.
document.getElementById("btn-date-picker").addEventListener("click", () => {
  const d = document.getElementById("date-input");
  if (!d) return;
  if (typeof d.showPicker === "function") {
    try { d.showPicker(); return; } catch (e) {}
  }
  // Fallback for browsers without showPicker support
  d.style.position = "static";
  d.style.opacity = "1";
  d.style.width = "auto";
  d.style.height = "auto";
  d.style.pointerEvents = "auto";
  d.focus();
  d.click();
});

// Price-scale toggles — operate on the top chart's right price scale.
// % and log are mutually exclusive modes; auto is independent.
const PSM = LightweightCharts.PriceScaleMode || { Normal: 0, Logarithmic: 1, Percentage: 2, IndexedTo100: 3 };
let psState = { pct: false, log: false, auto: true };

function _topRightScale() { return topChart.priceScale("right"); }
function _readActualAuto() {
  // Manual price-axis drag silently sets autoScale=false in LWC; read the
  // truth from LWC instead of trusting psState so the button always toggles
  // relative to what the user actually sees.
  try {
    const o = _topRightScale().options();
    if (o && typeof o.autoScale === "boolean") return o.autoScale;
  } catch (e) {}
  return psState.auto;
}

function applyPriceScale() {
  const scale = _topRightScale();
  let mode = PSM.Normal;
  if (psState.pct) mode = PSM.Percentage;
  else if (psState.log) mode = PSM.Logarithmic;
  try { scale.applyOptions({ mode, autoScale: psState.auto }); } catch (e) { console.warn("priceScale:", e); }
  // Reflect state in the toolbar
  document.getElementById("btn-pct").classList.toggle("active", psState.pct);
  document.getElementById("btn-log").classList.toggle("active", psState.log);
  document.getElementById("btn-auto").classList.toggle("active", psState.auto);
}

document.getElementById("btn-pct").addEventListener("click", () => {
  psState.pct = !psState.pct;
  if (psState.pct) psState.log = false; // mutually exclusive
  applyPriceScale();
});
document.getElementById("btn-log").addEventListener("click", () => {
  psState.log = !psState.log;
  if (psState.log) psState.pct = false; // mutually exclusive
  applyPriceScale();
});

document.getElementById("btn-auto").addEventListener("click", () => {
  // Sync our state with what LWC actually has, then flip. This handles the
  // case where the user manually dragged the price axis (which silently
  // disables autoScale on the LWC side without telling us).
  const actual = _readActualAuto();
  const next = !actual;
  psState.auto = next;
  const scale = _topRightScale();
  try {
    if (next) {
      // Forcing a false→true transition guarantees LWC schedules an
      // immediate refit, even if its internal autoScale flag was already
      // true (e.g. the visible range already happens to match the fit).
      scale.applyOptions({ autoScale: false });
      scale.applyOptions({ autoScale: true });
    } else {
      scale.applyOptions({ autoScale: false });
    }
  } catch (e) { console.warn("auto toggle:", e); }
  document.getElementById("btn-auto").classList.toggle("active", next);
});

// Apply initial state once topChart exists
applyPriceScale();

// Export kebab menu — toggles a popover with Copy link / Save PNG / Export MP4
(function wireExportMenu() {
  const btn = document.getElementById("btn-export");
  const menu = document.getElementById("export-menu");
  if (!btn || !menu) return;
  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    menu.classList.toggle("show");
  });
  document.addEventListener("click", (e) => {
    if (!menu.contains(e.target) && e.target !== btn) menu.classList.remove("show");
  });
  // Close after picking any action
  menu.querySelectorAll("button").forEach(b => {
    b.addEventListener("click", () => menu.classList.remove("show"));
  });
})();

// ───────────────────────────────────────────────────────────────────────────
// Boot
// ───────────────────────────────────────────────────────────────────────────
(async function boot() {
  // Suppress history recording during boot — initial state is not user-driven
  _suppressHistory = true;
  try {
    document.getElementById("status").textContent = "Loading BTC price…";
    const resp = await fetchJSON(BASE + "/api/series/price_close/day1");
    priceArray = resp.data || resp;
    priceDateStrs = new Array(priceArray.length);
    for (let i = 0; i < priceArray.length; i++) priceDateStrs[i] = indexToDateStr(i);

    // BTC price is always present
    const btc = new BTCPriceIndicator();
    activeIndicators.set(btc.id, btc);
    await btc.load();

    // Try to restore from URL hash; fall back to default indicator set if none
    const savedState = loadStateFromURL();
    if (savedState) {
      const ok = await restoreState(savedState);
      document.getElementById("status").textContent = ok
        ? `Restored ${savedState.ind?.length || 0} indicators from URL`
        : "URL state empty/invalid — booted with defaults";
      if (!ok) await loadDefaults();
    } else {
      await loadDefaults();
    }
    refreshIndicatorPanel();
  } catch (e) {
    console.error("Boot failed:", e);
    document.getElementById("status").textContent = "Boot failed: " + e.message;
    document.getElementById("status").style.color = "#ff5c5c";
  } finally {
    // Seed history baseline — initial post-boot state, with empty undo/redo stacks
    _suppressHistory = false;
    _lastRecordedState = snapshotState();
    historyPast = [];
    historyFuture = [];
    refreshUndoRedoButtons();
  }

  async function loadDefaults() {
    // Default indicator set on a fresh page (no URL state to restore).
    // - SpotPriceLineIndicator is the hidden helper that drives the
    //   click-locked tracer's vertical line; it isn't user-visible in
    //   the picker (HIDDEN_FROM_PICKER) but the tracer needs it.
    // - The three Realised Price lines + URPD History give the user
    //   the same first-paint view shown in the bitcointerminal.net
    //   reference layout.
    const inds = [
      new SpotPriceLineIndicator(),
      new RealisedPriceIndicator(),
      new LTHRealisedPriceIndicator(),
      new STHRealisedPriceIndicator(),
      new URPDProfileIndicator(),
    ];
    for (const ind of inds) activeIndicators.set(ind.id, ind);
    // Parallel load — each indicator hits a different BRK endpoint, so
    // there's no benefit to awaiting them sequentially. Failures are
    // isolated per-indicator (one slow / 404 endpoint doesn't block the
    // others from rendering).
    await Promise.all(inds.map(ind => ind.load().catch(err => {
      console.warn(`default ${ind.constructor.type} load failed:`, err);
    })));
  }
})();
