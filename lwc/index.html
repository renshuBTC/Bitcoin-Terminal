// ───────────────────────────────────────────────────────────────────────────
// Stacked URPD-history base — fetches multiple cohort URPDs in parallel
// (e.g. lth+sth, or all 21 age bands) and renders one HistogramSeries per
// cohort. The series share a single price scale so their bars align in y.
//
// Stacking trick: LWC draws each HistogramSeries' bars from y=0; a series
// added LATER renders ON TOP of earlier ones. So we add the OLDEST cohort's
// cumulative-total bar first (it goes to the back of the z-stack), then add
// progressively SHORTER cumulative bars on top. The shorter top-z bars
// cover the lower portion of the back-z bar, leaving only the top stripe
// of the older cohort visible. End result reading from baseline upward:
// youngest cohort first, then progressively older cohorts on top — exactly
// "older atop younger" stacking.
// ───────────────────────────────────────────────────────────────────────────
class StackedURPDHistoryIndicator extends ProfileHistogramIndicator {
  // Subclasses override:
  cohortKeys()   { throw new Error("cohortKeys not implemented"); }   // bottom→top
  cohortLabels() { return this.cohortKeys(); }
  cohortColors() { throw new Error("cohortColors not implemented"); } // index-aligned with cohortKeys

  // Subclasses get a no-op fetchBuckets — we override onDateChange entirely
  // and don't go through the base class's single-series path.
  async fetchBuckets() { return []; }

  // Helper: dispose every series this indicator currently owns on the chart.
  _disposeStack() {
    for (const s of this.series) {
      try { bottomChart.removeSeries(s); } catch (e) {}
    }
    this.series = [];
    this._series = null;
  }

  // Helper: create one HistogramSeries on this indicator's price scale.
  // The first instance to load on the chart owns the visible right axis;
  // others get a hidden per-instance scale (same convention as the
  // existing ProfileHistogramIndicator).
  _addStackSeries(color) {
    if (!_visibleScaleOwner) _visibleScaleOwner = this.id;
    const isVisibleScale = (_visibleScaleOwner === this.id);
    const scaleId = isVisibleScale ? "right" : this.id;
    const s = bottomChart.addSeries(LightweightCharts.HistogramSeries, {
      priceScaleId: scaleId,
      priceFormat: { type: "volume" },
      priceLineVisible: false, lastValueVisible: false,
      title: "",
      color,
    });
    if (!isVisibleScale) {
      bottomChart.priceScale(scaleId).applyOptions({
        visible: false, scaleMargins: { top: 0.05, bottom: 0.05 },
      });
    }
    this.series.push(s);
    return s;
  }

  async load() {
    this._stats = null;
    // Seed with one anchor series so the right Y-axis is labelled before
    // the user double-clicks into nav mode (matches base class behaviour).
    if (this.series.length === 0) {
      const anchor = this._addStackSeries("rgba(0,0,0,0)");
      try { anchor.setData(this._emptyAnchorData()); } catch (e) {}
    }
    await this.onDateChange(currentDateStr);
  }

  async onDateChange(dateStr) {
    // Same nav-mode gate as the rest of the bottom-pane indicators.
    if (typeof _navMode !== "undefined" && !_navMode) {
      this._disposeStack();
      const anchor = this._addStackSeries("rgba(0,0,0,0)");
      try { anchor.setData(this._emptyAnchorData()); } catch (e) {}
      this._stats = null;
      return;
    }

    const keys = this.cohortKeys();
    const colors = this.cohortColors();
    const N = keys.length;
    const TARGET_BINS = this.config.bins || 600;

    // Fetch all cohort URPDs in parallel — getURPDCohort() dedupes inflight
    // requests, so siblings sharing cohorts (e.g. URPD History - Profit/Loss
    // already loaded "all") don't re-fetch.
    const responses = await Promise.all(keys.map(k =>
      getURPDCohort(dateStr, k).catch(() => null)
    ));
    if (responses.every(r => !r || !r.buckets || r.buckets.length === 0)) {
      this._disposeStack();
      const anchor = this._addStackSeries("rgba(0,0,0,0)");
      try { anchor.setData(this._emptyAnchorData()); } catch (e) {}
      this._stats = { empty: true, dateStr };
      return;
    }

    // Combined min/max across all cohorts (BTC-weighted only, per the
    // user's spec — both new indicators are explicitly BTC-weighted).
    let minPrice = Infinity, maxPrice = -Infinity;
    for (const resp of responses) {
      if (!resp || !resp.buckets) continue;
      for (const b of resp.buckets) {
        if (!b.supply || b.supply <= 0) continue;
        if (b.price_floor < minPrice) minPrice = b.price_floor;
        if (b.price_floor > maxPrice) maxPrice = b.price_floor;
      }
    }
    if (!isFinite(minPrice) || !isFinite(maxPrice) || maxPrice <= minPrice) return;
    if (minPrice < 1) minPrice = 1;
    const binWidth = (maxPrice - minPrice) / TARGET_BINS;

    // Per-cohort weight aggregation: weights[k][bin] = total BTC supply for
    // cohort k in bin b.
    const weights = [];
    const cohortTotals = new Array(N).fill(0);
    for (let k = 0; k < N; k++) {
      const arr = new Array(TARGET_BINS).fill(0);
      const resp = responses[k];
      if (resp && resp.buckets) {
        for (const b of resp.buckets) {
          if (!b.supply || b.supply <= 0) continue;
          if (b.price_floor < minPrice) continue;
          let idx = Math.floor((b.price_floor - minPrice) / binWidth);
          if (idx >= TARGET_BINS) idx = TARGET_BINS - 1;
          if (idx < 0) continue;
          arr[idx] += b.supply;
          cohortTotals[k] += b.supply;
        }
      }
      weights.push(arr);
    }

    // 5-bin moving-average smoothing per cohort, BEFORE the cumulative
    // pass. Smoothing the raw cohort arrays (rather than the cumulative
    // tops) preserves the relative cohort proportions at every bin —
    // the stacked colors still represent each cohort's local share, but
    // the visible bars read as a continuous distribution instead of
    // isolated spikes. Same SMOOTH_WINDOW = 5 the previous Plotly
    // version used (rp.js).
    for (let k = 0; k < N; k++) {
      weights[k] = _smoothBins(weights[k]);
    }

    // Cumulative bottom→top: cum[k][b] = sum of weights[0..k][b].
    const cum = [];
    for (let k = 0; k < N; k++) {
      const arr = new Array(TARGET_BINS);
      for (let b = 0; b < TARGET_BINS; b++) {
        arr[b] = (k === 0 ? 0 : cum[k-1][b]) + weights[k][b];
      }
      cum.push(arr);
    }

    // Y-cap at 99th percentile of the FULL cumulative top (i.e. the visible
    // bar height, not individual cohort weights). Avoids one outlier bin
    // flattening the rest of the histogram.
    const Y_CAP_PCT = 99;
    let yCap = null;
    {
      const tops = cum[N - 1].filter(v => v > 0).sort((a, b) => a - b);
      if (tops.length >= 5) {
        yCap = tops[Math.floor(tops.length * (Y_CAP_PCT / 100))];
      }
    }

    // Shared bin-time array — used for every series so bars align.
    const times = new Array(TARGET_BINS);
    for (let b = 0; b < TARGET_BINS; b++) times[b] = minPrice + b * binWidth;

    // Tear down whatever's currently on the chart for this indicator.
    this._disposeStack();

    let totalWeight = 0;
    for (const t of cohortTotals) totalWeight += t;

    // Render: from oldest cumulative (largest, drawn FIRST → bottom of z)
    // down to youngest (smallest, drawn LAST → top of z). The first series
    // added becomes the visible-scale owner if no other claims it.
    for (let drawIdx = 0; drawIdx < N; drawIdx++) {
      const k = N - 1 - drawIdx; // k iterates N-1, N-2, ..., 0
      const s = this._addStackSeries(colors[k]);
      const data = [{ time: 0, value: 0, color: "rgba(0,0,0,0)" }];
      for (let b = 0; b < TARGET_BINS; b++) {
        let v = cum[k][b];
        if (yCap != null && v > yCap) v = yCap;
        data.push({ time: times[b], value: v, color: colors[k] });
      }
      try { s.setData(data); } catch (e) {}
    }

    // Apply right-scale options once the visible-scale owner is created.
    if (_visibleScaleOwner === this.id) {
      try {
        bottomChart.priceScale("right").applyOptions({
          autoScale: true, scaleMargins: { top: 0.05, bottom: 0.05 },
        });
      } catch (e) {}
    }

    try {
      bottomChart.timeScale().setVisibleRange({ from: 0, to: maxPrice });
    } catch (e) {
      bottomChart.timeScale().fitContent();
    }

    // Stats — reused by the hover tooltip (same shape as the base class).
    const fmtCount = (n) => `${(n/1e6).toFixed(2)}M BTC`;
    this._stats = {
      total: totalWeight,
      cohortLabels: this.cohortLabels(),
      cohortColors: colors,
      cohortTotals,
      weightField: "supply",
      fmtCount,
      dateStr,
      yCapPct: Y_CAP_PCT, yCapValue: yCap,
      stacked: true,
    };
  }
}

// Per-pane header bars: render a colored badge for each indicator in the pane.
// For top-pane indicators, badge label is the short displayName. For bottom-pane,
// the title section also gets the current date and a guess at what kind of profile
// is being shown (URPD / SOPD / mixed).
function shortDisplayName(ind) {
  // Compress the displayName a bit so badges stay narrow
  const name = typeof ind.displayName === "function" ? ind.displayName() : ind.constructor.displayName;
  return name
    .replace(/Realised Price/gi, "RP")
    .replace(/URPD Profile/gi, "URPD")
    .replace(/SOPD Profile/gi, "SOPD")
    .replace(/URPD Age Bands/gi, "URPD Age")
    .replace(/Spot Price Line/gi, "Spot");
}
function badgeHTML(ind) {
  const swatch = ind.swatchColor();
  // Use linear-gradient swatches as background, solid colors as background too
  const dotStyle = swatch.startsWith("linear-gradient")
    ? `background:${swatch}` : `background:${swatch}`;
  return `<span class="ind-badge"><span class="dot" style="${dotStyle}"></span>` +
    `<span class="ind-label">${shortDisplayName(ind)}</span></span>`;
}
// SVG icons for the in-chart indicator-row hover action buttons.

function indRowHTML(ind) {

function refreshPaneHeaders() {
  // The bottom pane no longer has a fixed "REALIZED PRICE DISTRIBUTION"
  // header — its identity is conveyed entirely through the in-chart
  // indicator rows below (URPD Profile, SOPD Profile, etc.).
  // We still hide the entire pane-label container if there's nothing
  // bottom-pane to label.
  let hasAnyBottom = false;
  for (const ind of activeIndicators.values()) {
    if (ind.pane() === "bottom") { hasAnyBottom = true; break; }
  }
  const headerBot = document.getElementById("header-bottom");
  if (headerBot) headerBot.style.display = hasAnyBottom ? "" : "none";

  // Collapse the entire bottom-pane area (chart + divider) when no bottom-
  // pane indicator is active. The top chart's flex container then grows to
  // fill the freed vertical space, so the BTC chart isn't stuck inside a
  // 60% strip of an otherwise empty viewport. We also nudge each chart's
  // `.resize()` so LWC repaints at the new pixel dimensions immediately.
  const bottomWrap = document.getElementById("chart-bottom-wrap");
  const dividerEl = document.getElementById("chart-divider");
  const topWrap   = document.getElementById("chart-top-wrap");
  if (bottomWrap) bottomWrap.style.display = hasAnyBottom ? "" : "none";
  if (dividerEl)  dividerEl.style.display  = hasAnyBottom ? "" : "none";
  if (topWrap) {
    // When the bottom pane is hidden, let the top wrap grow freely to fill;
    // when shown, restore the configured 60% (50% on the smaller breakpoint)
    // so the user's manual divider drag still applies once they have a
    // bottom indicator again.
    topWrap.style.flex = hasAnyBottom ? "" : "1 1 auto";
  }
  // Trigger LWC repaints once the layout has settled so the chart canvases
  // match their new container heights. requestAnimationFrame waits one
  // frame for the flex reflow to commit, then `chart.resize` reads the
  // post-reflow client rect.
  requestAnimationFrame(() => {
    try {
      const tEl = document.getElementById("chart-top");
      if (tEl && topChart && topChart.resize) topChart.resize(tEl.clientWidth, tEl.clientHeight);
    } catch (e) {}
    try {
      const bEl = document.getElementById("chart-bottom");
      if (bEl && bottomChart && bottomChart.resize) bottomChart.resize(bEl.clientWidth, bEl.clientHeight);
    } catch (e) {}
  });

  // Keep the keyboard-navigation instruction always visible while a bottom-
  // pane indicator (URPD/SOPD) is loaded, so users see how to interact
  // before they ever click the chart.
  const navEl = document.getElementById("nav-instruction");
  if (navEl) {
    if (hasAnyBottom) {
      navEl.innerHTML = `To activate, double-click on BTC price chart to fix tracer · press <kbd>A</kbd>/<kbd>←</kbd> or <kbd>D</kbd>/<kbd>→</kbd> to navigate · double-click to disable`;
      navEl.classList.add("show");
    } else {
      navEl.classList.remove("show");
      navEl.innerHTML = "";
    }
  }

  // Build per-indicator rows, one per pane. BTC/USD is shown in the pane title
  // itself, so we skip rendering a row for it. We also skip the Spot Price
  // Line — it's a passive helper marker that follows the crosshair date,
  // not something the user manages with hover hide/remove.
  const topRows = [], botRows = [];
  const SKIP_TYPES = new Set(["btc_price", "spot_line"]);
  for (const ind of activeIndicators.values()) {
    if (SKIP_TYPES.has(ind.constructor.type)) continue;
    const html = indRowHTML(ind);
    if (ind.pane() === "top") topRows.push(html); else botRows.push(html);
  }
  const topHost = document.getElementById("ind-rows-top");
  const botHost = document.getElementById("ind-rows-bottom");
  if (topHost) topHost.innerHTML = topRows.join("");
  if (botHost) botHost.innerHTML = botRows.join("");
}

// Delegated click handler for the in-chart per-indicator action buttons.
// We attach once at the pane-label container level and dispatch by class.
function _wireIndRowActions(rootId) {
  const root = document.getElementById(rootId);
  if (!root || root._wired) return;
  root._wired = true;
  root.addEventListener("click", async (e) => {
    const btn = e.target.closest("button.act-btn");
    if (!btn) return;
    const id = btn.getAttribute("data-id");
    const ind = activeIndicators.get(id);
    if (!ind) return;
    e.preventDefault();
    e.stopPropagation();
    if (btn.classList.contains("act-eye")) {
      ind.toggleVisible();
      // Re-render rows so swatch/name dim and the icon flips
      refreshPaneHeaders();
      saveStateToURL();
      if (typeof recordHistory === "function") recordHistory();
    } else if (btn.classList.contains("act-trash")) {
      try { ind.remove(); } catch (err) { console.warn("trash:", err); }
      activeIndicators.delete(id);
      refreshIndicatorPanel();
    }
  });
}
_wireIndRowActions("ind-rows-top");
_wireIndRowActions("ind-rows-bottom");

// ───────────────────────────────────────────────────────────────────────────
// Edit an existing indicator's config in place. Tears down its chart series
// and stats DOM, swaps in a new instance with the new config, and reloads.
// The new indicator gets a fresh id; we splice it into the same position in
// activeIndicators so panel order stays stable.
// ───────────────────────────────────────────────────────────────────────────
async function editIndicatorConfig(id, newConfig) {
  const ind = activeIndicators.get(id);
  if (!ind) return;
  const T = ind.constructor;
  // Capture insertion order so we can restore position
  const ids = [...activeIndicators.keys()];
  const idx = ids.indexOf(id);

  ind.remove();
  activeIndicators.delete(id);

  const newInd = new T(newConfig);
  // Rebuild map preserving order with new instance at the original position
  const entries = [...activeIndicators.entries()];
  entries.splice(idx, 0, [newInd.id, newInd]);
  activeIndicators.clear();
  for (const [k, v] of entries) activeIndicators.set(k, v);

  refreshIndicatorPanel();
  try {
    await newInd.load();
  } catch (e) {
    console.error("config edit failed:", e);
    document.getElementById("status").textContent = "Edit failed: " + e.message;
    activeIndicators.delete(newInd.id);
    refreshIndicatorPanel();
  }
}

// ───────────────────────────────────────────────────────────────────────────
// Add Indicator modal
// ───────────────────────────────────────────────────────────────────────────
function openAddModal() {
  const modal = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  // Catalog: hide internal helpers (Spot Price Line is a passive crosshair
  // marker the user can't manage from the picker — same rule we apply to
  // the in-chart indicator rows).
  const HIDDEN_FROM_PICKER = new Set(["spot_line"]);
  const all = INDICATOR_TYPES.filter(t => !HIDDEN_FROM_PICKER.has(t.type));

  let html =
    `<div class="modal-header">` +
      `<h3>Indicators</h3>` +
      `<button class="modal-x" id="modal-x" title="Close">×</button>` +
    `</div>` +
    `<div class="modal-search">` +
      `<input type="text" id="modal-search-input" placeholder="Search" autocomplete="off">` +
    `</div>` +
    `<div class="modal-body" id="modal-body">`;
  for (const T of all) html += renderTypeOption(T);
  html += `</div>`;

  modal.innerHTML = html;
  bg.classList.add("show");

  // Wire up close
  modal.querySelector("#modal-x").addEventListener("click", () => bg.classList.remove("show"));

  // Click an option → add the indicator immediately with defaults.
  // The configure dialog is skipped — user can re-pick to swap or remove
  // via the in-chart hover trash button.
  // In-place rebuild of the row list — used after add/remove so the
  // "Added" / "Remove" state stays in sync without closing+reopening the
  // modal (preserves search input & scroll). The search filter is
  // re-applied via a synthetic input event after the rebuild.
  function _rerenderPickerBody() {
    const body = modal.querySelector("#modal-body");
    if (!body) return;
    body.innerHTML = all.map(renderTypeOption).join("");
    const si = modal.querySelector("#modal-search-input");
    if (si) si.dispatchEvent(new Event("input"));
  }

  // Event delegation on #modal-body so we don't have to re-attach per-row
  // listeners after a remove rebuilds the rows.
  const bodyEl = modal.querySelector("#modal-body");
  bodyEl.addEventListener("click", async (ev) => {
    const el = ev.target.closest(".ind-option");
    if (!el) return;
    const typeName = el.getAttribute("data-type");
    const T = INDICATOR_TYPES.find(t => t.type === typeName);
    if (!T) return;

    // Already-added rows: clicking removes that indicator from the chart
    // and stays in the picker so the user can immediately re-add or pick
    // something else.
    if (_indicatorTypeIsActive(typeName)) {
      let target = null;
      for (const ind of activeIndicators.values()) {
        if (ind.constructor.type === typeName) { target = ind; break; }
      }
      if (target) {
        try { target.remove(); } catch (e) { console.warn("remove:", e); }
        activeIndicators.delete(target.id);
        refreshIndicatorPanel();
        document.getElementById("status").textContent = `Removed: ${T.displayName}`;
        _rerenderPickerBody();
      }
      return;
    }

    // Cap: only one bottom-pane indicator allowed at a time. The chart
    // architecture supports just two visible panes (BTC top + URPD-style
    // bottom); adding a 2nd bottom-pane indicator would require a 3rd
    // pane, which we don't render. Refuse with a status hint so the
    // user knows to remove the current one before swapping.
    if (T.pane === "bottom") {
      let bottomCount = 0;
      for (const ind of activeIndicators.values()) {
        if (ind.pane() === "bottom") bottomCount++;
      }
      if (bottomCount >= 1) {
        bg.classList.remove("show");
        document.getElementById("status").textContent =
          `Only 2 panes allowed (1 top + 1 bottom). Remove the existing bottom indicator first.`;
        return;
      }
    }

    // Otherwise: add a fresh instance.
    bg.classList.remove("show");
    const ind = new T(/* defaults from configSchema */);
    activeIndicators.set(ind.id, ind);
    refreshIndicatorPanel();
    try {
      await ind.load();
      document.getElementById("status").textContent = `Added: ${ind.displayName()}`;
    } catch (e) {
      console.error("Add indicator failed:", e);
      document.getElementById("status").textContent = "Failed: " + e.message;
      try { ind.remove(); } catch (_) {}
      activeIndicators.delete(ind.id);
      refreshIndicatorPanel();
    }
  });

  // Search filter — case-insensitive substring match on the type's displayName
  const searchInput = modal.querySelector("#modal-search-input");
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();
    modal.querySelectorAll("#modal-body .ind-option").forEach(el => {
      const name = el.querySelector(".name").textContent.toLowerCase();
      el.style.display = (q === "" || name.includes(q)) ? "" : "none";
    });
  });
  // Auto-focus search input
  setTimeout(() => searchInput.focus(), 50);
}
// Is an indicator of this exact type already on the chart? Used to grey-out
// the picker entry and short-circuit the click handler so users can't add
// duplicates of the same indicator type.
function _indicatorTypeIsActive(typeName) {
  for (const ind of activeIndicators.values()) {
    if (ind.constructor.type === typeName) return true;
  }
  return false;
}

function renderTypeOption(T) {
  const swatch = T.prototype.swatchColor ?
    (T.configSchema.find(f => f.key === "color") ? T.configSchema.find(f => f.key === "color").default : "#888")
    : "#888";
  const isActive = _indicatorTypeIsActive(T.type);
  const cls = isActive ? "ind-option is-added" : "ind-option";
  // Two-text badge: "Added" by default, swaps to "Remove" on row hover via
  // pure CSS — keeps the click handler dead-simple (no JS title juggling).
  const tag = isActive
    ? `<span class="added-tag"><span class="t-default">Added</span><span class="t-hover">Remove</span></span>`
    : "";
  return `<div class="${cls}" data-type="${T.type}">` +
    `<span class="swatch" style="background:${swatch}"></span>` +
    `<span class="name">${T.displayName}</span>` +
    tag +
    `</div>`;
}

function openConfigModal(typeName, existingIndicator) {
  const T = INDICATOR_TYPES.find(t => t.type === typeName);
  if (!T) return;
  const isEdit = !!existingIndicator;
  const modal = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  let html =
    `<div class="modal-header">` +
      `<h3>${T.displayName} — ${isEdit ? "Edit" : "Configure"}</h3>` +
      `<button class="modal-x" id="modal-x" title="Close">×</button>` +
    `</div>` +
    `<div class="modal-body" style="padding:14px 0">`;
  if (T.configSchema.length === 0) {
    html += `<div style="color:#888;padding:0 18px">No options for this indicator.</div>`;
  }
  for (const f of T.configSchema) {
    // For edit mode, pull the current value from the existing indicator's config
    const currentVal = (isEdit && existingIndicator.config[f.key] !== undefined)
      ? existingIndicator.config[f.key]
      : f.default;
    html += `<div class="section"><label>${f.label}</label>`;
    if (f.type === "select") {
      html += `<select data-key="${f.key}">`;
      for (const opt of f.options) {
        const sel = (String(opt.v) === String(currentVal)) ? "selected" : "";
        html += `<option value="${opt.v}" ${sel}>${opt.l}</option>`;
      }
      html += `</select>`;
    } else if (f.type === "color") {
      html += `<input type="text" data-key="${f.key}" value="${currentVal}">`;
    } else {
      html += `<input type="text" data-key="${f.key}" value="${currentVal}">`;
    }
    html += `</div>`;
  }
  html += `</div><div class="actions">
    <button id="modal-cancel">Cancel</button>
    <button id="modal-apply" class="primary">${isEdit ? "Apply" : "Add"}</button>
  </div>`;
  modal.innerHTML = html;
  bg.classList.add("show");

  modal.querySelector("#modal-cancel").addEventListener("click", () => bg.classList.remove("show"));
  const xBtn = modal.querySelector("#modal-x");
  if (xBtn) xBtn.addEventListener("click", () => bg.classList.remove("show"));
  modal.querySelector("#modal-apply").addEventListener("click", async () => {
    const config = {};
    modal.querySelectorAll("[data-key]").forEach(el => {
      const k = el.getAttribute("data-key");
      let v = el.value;
      if (el.tagName === "SELECT") {
        const opt = T.configSchema.find(f => f.key === k);
        if (opt && typeof opt.default === "number") v = parseInt(v, 10);
      }
      config[k] = v;
    });
    bg.classList.remove("show");
    if (isEdit) {
      await editIndicatorConfig(existingIndicator.id, config);
      document.getElementById("status").textContent = `Updated: ${T.displayName}`;
    } else {
      const ind = new T(config);
      activeIndicators.set(ind.id, ind);
      refreshIndicatorPanel();
      try {
        await ind.load();
        document.getElementById("status").textContent = `Added: ${ind.displayName()}`;
      } catch (e) {
        console.error("Add indicator failed:", e);
        document.getElementById("status").textContent = "Failed: " + e.message;
        ind.remove();
        activeIndicators.delete(ind.id);
        refreshIndicatorPanel();
      }
    }
  });
}

document.getElementById("btn-add").addEventListener("click", openAddModal);

// ───────────────────────────────────────────────────────────────────────────
// Chart type selector — 12 series styles. BRK only has daily close, so OHLC
// types are synthesized (open=prev close). Heikin Ashi runs the standard
// recursive formula on synthesized OHLC.
// ───────────────────────────────────────────────────────────────────────────
const CHART_TYPES = [
  { v: "bars",           label: "Bars",            icon: svgBars(),         group: 1 },
  { v: "candles",        label: "Candles",         icon: svgCandles(false), group: 1 },
  { v: "hollow_candles", label: "Hollow candles",  icon: svgCandles(true),  group: 1 },
  { v: "line",           label: "Line",            icon: svgLine(false),    group: 1 },
  { v: "step",           label: "Step line",       icon: svgStep(),         group: 1 },
  { v: "area",           label: "Area",            icon: svgArea(),         group: 2 },
  { v: "baseline",       label: "Baseline",        icon: svgBaseline(),     group: 2 },
  { v: "columns",        label: "Columns",         icon: svgColumns(),      group: 3 },
  { v: "high_low",       label: "High-low",        icon: svgHighLow(),      group: 3 },
  { v: "heikin_ashi",    label: "Heikin Ashi",     icon: svgCandles(false), group: 3 },
];

let currentChartType = "line";

function setChartType(type) {
  if (!CHART_TYPES.find(t => t.v === type)) return;
  currentChartType = type;
  // Update the toolbar button icon to match the active type
  const def = CHART_TYPES.find(t => t.v === type);
  const slot = document.getElementById("chart-type-icon-slot");
  if (slot) slot.innerHTML = def.icon;
  // Update active class in menu
  document.querySelectorAll("#chart-type-menu .opt").forEach(el =>
    el.classList.toggle("active", el.getAttribute("data-type") === type));
  // Rebuild the BTC indicator's series in place (keeps URL state + panel position)
  let btcId = null;
  for (const [id, ind] of activeIndicators) {
    if (ind.constructor.type === "btc_price") { btcId = id; break; }
  }
  if (!btcId) return;
  const oldInd = activeIndicators.get(btcId);
  // Tear down only the series, keep the indicator instance
  for (const s of oldInd.series) {
    try { topChart.removeSeries(s); } catch (e) {}
  }
  oldInd.series = [];
  oldInd._priceSeries = null;
  // Re-load with the new chart type
  // After rebuild, re-apply visibility if user had hidden BTC.
  oldInd.load()
    .then(() => { if (oldInd.visible === false) oldInd.setVisible(false); })
    .catch(e => console.error("chart type swap:", e));
  document.getElementById("status").textContent = `Chart type: ${def.label}`;
}

function buildChartTypeMenu() {
  const menu = document.getElementById("chart-type-menu");
  let html = "";
  let lastGroup = null;
  for (const t of CHART_TYPES) {
    if (lastGroup !== null && t.group !== lastGroup) html += `<div class="divider"></div>`;
    html += `<div class="opt${t.v === currentChartType ? " active" : ""}" data-type="${t.v}">${t.icon}<span>${t.label}</span></div>`;
    lastGroup = t.group;
  }
  menu.innerHTML = html;
  menu.querySelectorAll(".opt").forEach(el => {
    el.addEventListener("click", () => {
      setChartType(el.getAttribute("data-type"));
      menu.classList.remove("show");
    });
  });
}

// ───────────────────────────────────────────────────────────────────────────
// Click-locked date tracer: clicking the BTC chart locks a date; keyboard
// A/← and D/→ step through dates respecting the active interval. Clicking
// the tracer line itself clears the lock. Replaces the old hover-scrub.
// ───────────────────────────────────────────────────────────────────────────
function setCurrentDate(dateStr) {
  currentDateStr = dateStr;
  document.getElementById("date-input").value = dateStr;
  for (const ind of activeIndicators.values()) {
    try { ind.onDateChange(dateStr); } catch (e) { console.error(ind.displayName(), e); }
  }
}

const hoverTopEl = document.getElementById("hover-top");

function updateHoverReadout(dateStr) {
  if (!hoverTopEl || !priceArray || !priceDateStrs) return;
  if (!dateStr) { hoverTopEl.innerHTML = ""; return; }
  const idx = priceDateStrs.indexOf(dateStr);
  if (idx < 0) { hoverTopEl.innerHTML = ""; return; }
  const price = priceArray[idx];
  if (typeof price !== "number" || price <= 0) { hoverTopEl.innerHTML = ""; return; }
  // Change vs previous bar
  let prev = null;
  for (let i = idx - 1; i >= 0; i--) {
    if (typeof priceArray[i] === "number" && priceArray[i] > 0) { prev = priceArray[i]; break; }
  }
  let changeHTML = "";
  if (prev !== null) {
    const abs = price - prev;
    const pct = (abs / prev) * 100;
    const cls = abs >= 0 ? "change-up" : "change-down";
    const sign = abs >= 0 ? "+" : "";
    changeHTML = `<span class="${cls}">${sign}${abs.toLocaleString("en-US",{maximumFractionDigits:2})} ` +
      `(${sign}${pct.toFixed(2)}%)</span>`;
  }
  hoverTopEl.innerHTML = `<span class="price">${price.toLocaleString("en-US",{maximumFractionDigits:2})}</span>${changeHTML}`;
}

topChart.subscribeCrosshairMove((param) => {
  // Hover readout: always update (decoupled from any scrub behavior)
  let dateStr = null;
  if (param.time) {
    if (typeof param.time === "string") dateStr = param.time;
    else if (typeof param.time === "object" && "year" in param.time) {
      dateStr = `${param.time.year}-${String(param.time.month).padStart(2,"0")}-${String(param.time.day).padStart(2,"0")}`;
    }
  }
  updateHoverReadout(dateStr);
  // Keep the click-locked tracer glued to the BTC price line as the chart
  // re-renders in response to any cursor movement (the crosshair handler
  // fires for almost every chart interaction).
  if (typeof updateTracerPosition === "function") updateTracerPosition();
});

// ─── Click-to-lock + keyboard nav ─────────────────────────────────────────
const dateTracerEl     = document.getElementById("date-tracer");
const navInstructionEl = document.getElementById("nav-instruction");
let _navMode        = false;
let _pathStartDateStr = null;  // date when nav mode was entered
let _pathSeries       = null;  // orange overlay LineSeries showing the traversed range

function _paramTimeToDateStr(t) {
  if (!t) return null;
  if (typeof t === "string") return t;
  if (typeof t === "object" && "year" in t) {
    return `${t.year}-${String(t.month).padStart(2,"0")}-${String(t.day).padStart(2,"0")}`;
  }
  return null;
}

function intervalDays() {
  // Interval-aware step size for keyboard nav
  if (typeof currentInterval === "string") {
    if (currentInterval === "1w") return 7;
    if (currentInterval === "1m") return 30;
  }
  return 1;
}

// Build / update the orange "traversed path" overlay on the BTC price line.
// It's a separate LineSeries that draws on top of the BTC price line, only
// over the [start..current] date range, so that segment looks orange.
function _ensurePathSeries() {
  if (_pathSeries) return _pathSeries;
  try {
    _pathSeries = topChart.addSeries(LightweightCharts.LineSeries, {
      color: "#ff8c00",
      lineWidth: 2,
      priceLineVisible: false,
      lastValueVisible: false,
      crosshairMarkerVisible: false,
      priceScaleId: "right",
    });
  } catch (e) { console.warn("path series create:", e); }
  return _pathSeries;
}
function updatePathOverlay() {
  if (!_navMode || !_pathStartDateStr || !currentDateStr) {
    if (_pathSeries) {
      try { _pathSeries.setData([]); } catch (e) {}
    }
    return;
  }
  const startIdx = priceDateStrs.indexOf(_pathStartDateStr);
  const endIdx   = priceDateStrs.indexOf(currentDateStr);
  if (startIdx < 0 || endIdx < 0) return;
  const lo = Math.min(startIdx, endIdx);
  const hi = Math.max(startIdx, endIdx);
  const series = _ensurePathSeries();
  if (!series) return;
  const points = [];
  for (let i = lo; i <= hi; i++) {
    const v = priceArray[i];
    if (typeof v === "number" && v > 0) {
      points.push({ time: priceDateStrs[i], value: v });
    }
  }
  try { series.setData(points); } catch (e) {}
}
function clearPathOverlay() {
  if (_pathSeries) {
    try { _pathSeries.setData([]); } catch (e) {}
  }
  _pathStartDateStr = null;
}

function updateTracerPosition() {
  if (!dateTracerEl) return;
  if (!_navMode || !currentDateStr) {
    dateTracerEl.classList.remove("show");
    return;
  }
  try {
    const x = topChart.timeScale().timeToCoordinate(currentDateStr);
    if (x == null) { dateTracerEl.classList.remove("show"); return; }
    // Find the BTC price at the locked date and position the dot ON the
    // price line so it slides along as the user navigates.
    const idx = priceDateStrs ? priceDateStrs.indexOf(currentDateStr) : -1;
    const price = (idx >= 0 && priceArray) ? priceArray[idx] : null;
    let y = null;
    if (price && price > 0) {
      // Try to read the BTC price series from the BTC indicator.
      let btcInd = null;
      for (const ind of activeIndicators.values()) {
        if (ind.constructor.type === "btc_price") { btcInd = ind; break; }
      }
      const series = btcInd && btcInd.getPriceSeries ? btcInd.getPriceSeries() : null;
      if (series && typeof series.priceToCoordinate === "function") {
        y = series.priceToCoordinate(price);
      }
    }
    if (y == null) { dateTracerEl.classList.remove("show"); return; }
    dateTracerEl.style.left = x + "px";
    dateTracerEl.style.top  = y + "px";
    dateTracerEl.classList.add("show");
  } catch (e) { dateTracerEl.classList.remove("show"); }
}

function showInstruction(text) {
  if (!navInstructionEl) return;
  navInstructionEl.innerHTML = text;
  navInstructionEl.classList.add("show");
}
function hideInstruction() {
  if (!navInstructionEl) return;
  navInstructionEl.classList.remove("show");
  navInstructionEl.innerHTML = "";
}

function enterNavMode(dateStr) {
  if (!dateStr || !priceDateStrs || priceDateStrs.indexOf(dateStr) < 0) return;
  _navMode = true;
  _pathStartDateStr = dateStr;        // anchor for the orange "traversed path"
  setCurrentDate(dateStr);
  updateTracerPosition();
  updatePathOverlay();
  // Instruction is rendered persistently by refreshPaneHeaders whenever a
  // URPD/SOPD profile is loaded, so we don't show it here.
}
function exitNavMode() {
  _navMode = false;
  dateTracerEl.classList.remove("show");
  clearPathOverlay();                 // remove orange traversed-path segment
  // Re-trigger each indicator's onDateChange so any indicator with a
  // nav-mode gate (URPD/SOPD histograms, in-Profit/in-Loss filtered means,
  // SpotPriceLineIndicator) takes its early-return branch — which
  // clears bars, removes the spot line, etc.
  for (const ind of activeIndicators.values()) {
    try { ind.onDateChange(currentDateStr); } catch (e) {}
  }
  // Instruction stays visible — it's not tied to nav mode anymore.
}

// Double-click on the BTC chart toggles the tracer:
//   • not locked → fix tracer at the clicked date
//   • already locked → unfix tracer (exit nav mode)
// Single click no longer locks anything; this matches the user's expectation
// that the tracer is a deliberate, "double-click to set" affordance.
topChart.subscribeDblClick((param) => {
  if (_navMode) { exitNavMode(); return; }
  if (!param || !param.time) return;
  const ds = _paramTimeToDateStr(param.time);
  if (!ds) return;
  enterNavMode(ds);
});

// Double-click on the URPD/SOPD bottom pane only clears (it has no notion
// of a date to lock to — its X-axis is price, not time).
const _chartBottomEl = document.getElementById("chart-bottom");
if (_chartBottomEl) {
  _chartBottomEl.addEventListener("dblclick", (e) => {
    if (!_navMode) return;
    e.stopPropagation();
    e.preventDefault();
    exitNavMode();
  });
}

// Keep tracer aligned when chart pans/zooms or window resizes
topChart.timeScale().subscribeVisibleTimeRangeChange(updateTracerPosition);
window.addEventListener("resize", updateTracerPosition);

// Pan the chart so the tracer stays inside the visible window. Called after
// every keyboard navigation step so navigation never leaves the dot offscreen.
// Width-preserving: never shrinks/grows the zoom, just shifts the window.
function ensureTracerInView() {
  if (!_navMode || !currentDateStr || !priceDateStrs) return;
  const targetIdx = priceDateStrs.indexOf(currentDateStr);
  if (targetIdx < 0) return;
  let logical;
  try { logical = topChart.timeScale().getVisibleLogicalRange(); } catch (e) { return; }
  if (!logical) return;
  const width = logical.to - logical.from;
  // Skip if zoom is degenerate / chart not laid out yet
  if (!(width > 5)) return;
  // Tracer comfortably inside? Don't pan.
  const margin = width * 0.12;
  if (targetIdx >= logical.from + margin && targetIdx <= logical.to - margin) return;
  // Otherwise shift the window (preserving width) so the tracer sits at
  // ~60% from the left — slightly right of center, leaving more room for
  // history-context to the left of the dot.
  const dataLen = priceDateStrs.length;
  const desiredOffsetFromLeft = width * 0.60;
  let newFrom = targetIdx - desiredOffsetFromLeft;
  let newTo = newFrom + width;
  // Clamp so we never blow past the data (and leave a small right padding).
  if (newTo > dataLen + 12) {
    const shift = newTo - (dataLen + 12);
    newFrom -= shift; newTo -= shift;
  }
  if (newFrom < 0) {
    newTo += -newFrom; newFrom = 0;
  }
  try { topChart.timeScale().setVisibleLogicalRange({ from: newFrom, to: newTo }); } catch (e) {}
}

// Keyboard navigation: A / ← back, D / → forward — ONLY active while the
// click-locked tracer is fixed (nav mode). Outside nav mode the keys do
// nothing, so the spot line and other date-driven overlays don't drift
// around when the user just happens to press a key.
document.addEventListener("keydown", (e) => {
  if (!_navMode) return;
  const tag = (e.target && e.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  if (e.ctrlKey || e.metaKey || e.altKey || e.shiftKey) return;
  let step = 0;
  if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") step = -1;
  else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") step =  1;
  else return;
  // Only consume the key if we have data to navigate over.
  if (!priceDateStrs || !currentDateStr) return;
  e.preventDefault();
  const stepDays = step * intervalDays();
  let idx = priceDateStrs.indexOf(currentDateStr);
  if (idx < 0) return;
  idx = Math.max(0, Math.min(priceDateStrs.length - 1, idx + stepDays));
  setCurrentDate(priceDateStrs[idx]);
  ensureTracerInView();   // pan chart so the dot doesn't sail off-screen
  updateTracerPosition();
  updatePathOverlay();    // extend the orange traversed-path segment
});

// ───────────────────────────────────────────────────────────────────────────
// Bottom-chart hover tooltip — shows per-indicator stats (Spot, Total, Bins,
// In Profit, In Loss) only while hovering a histogram bar. Replaces the
// always-visible side panel that lived in #stats-stack.
// ───────────────────────────────────────────────────────────────────────────
function _renderHoverStats(stack, currentDateStr) {
  // Build one stat-box per visible profile indicator with stats data
  let html = "";
  for (const ind of activeIndicators.values()) {
    if (!(ind instanceof ProfileHistogramIndicator)) continue;
    if (ind.visible === false) continue;
    const s = ind._stats;
    if (!s) continue;
    if (s.error) {
      html += `<div class="stat-box"><div class="title-row">` +
        `<span class="swatch" style="background:${ind.swatchColor()}"></span>` +
        `<span class="name">${ind.displayName()}</span></div>` +
        `<div style="color:#ff5c5c">err: ${s.error}</div></div>`;
      continue;
    }
    if (s.empty) {
      html += `<div class="stat-box"><div class="title-row">` +
        `<span class="swatch" style="background:${ind.swatchColor()}"></span>` +
        `<span class="name">${ind.displayName()}</span></div>` +
        `<div style="color:#666">no data for ${s.dateStr}</div></div>`;
      continue;
    }
    const capLine = (s.yCapPct && s.yCapValue != null)
      ? `<div><span class="label">Y-cap</span> <span class="value">p${s.yCapPct} = ${s.fmtCount(s.yCapValue)}</span></div>`
      : "";
    html += `<div class="stat-box"><div class="title-row">` +
      `<span class="swatch" style="background:${ind.swatchColor()}"></span>` +
      `<span class="name">${ind.displayName()}</span>` +
      `<span class="date">${s.dateStr}</span></div>` +
      `<div><span class="label">Spot</span> <span class="value">$${s.spot.toLocaleString("en-US",{maximumFractionDigits:0})}</span></div>` +
      `<div><span class="label">Total</span> <span class="value">${s.fmtCount(s.total)}</span> &nbsp;` +
        `<span class="label">Bins</span> <span class="value">${s.binCount}</span></div>` +
      capLine +
      `<div><span class="profit">In Profit ${s.pctProfit.toFixed(1)}% (${s.fmtCount(s.profit)})</span></div>` +
      `<div><span class="loss">In Loss ${(100-s.pctProfit).toFixed(1)}% (${s.fmtCount(s.loss)})</span></div>` +
      `</div>`;
  }
  stack.innerHTML = html;
  return html.length > 0;
}

(function wireHistogramHover() {
  const stack = document.getElementById("stats-stack");
  const bottomEl = document.getElementById("chart-bottom");
  const wrap = document.getElementById("chart-bottom-wrap");
  if (!stack || !bottomEl || !wrap) return;

  bottomChart.subscribeCrosshairMove((param) => {
    // Hide if not hovering, or no series data under the cursor
    const hasSeriesData = param && param.seriesData && param.seriesData.size > 0;
    const inside = !!(param && param.point && hasSeriesData);
    if (!inside) { stack.classList.remove("show"); return; }
    if (!_renderHoverStats(stack, currentDateStr)) {
      stack.classList.remove("show");
      return;
    }
    // Position stack near cursor inside the bottom-pane wrap. Offset so the
    // tooltip doesn't sit under the cursor itself.
    const wrapRect = wrap.getBoundingClientRect();
    const x = (param.point.x | 0) + 14;
    const y = (param.point.y | 0) + 14;
    // Defer to next frame so size is measured after innerHTML updates.
    requestAnimationFrame(() => {
      const stackW = stack.offsetWidth || 240;
      const stackH = stack.offsetHeight || 100;
      const maxX = wrapRect.width  - stackW - 6;
      const maxY = wrapRect.height - stackH - 6;
      stack.style.left = Math.max(6, Math.min(maxX, x)) + "px";
      stack.style.top  = Math.max(6, Math.min(maxY, y)) + "px";
      stack.classList.add("show");
    });
  });

  // Hide when leaving the bottom chart entirely
  bottomEl.addEventListener("mouseleave", () => stack.classList.remove("show"));
})();

document.getElementById("date-input").addEventListener("change", (e) => setCurrentDate(e.target.value));

// Cycle landmarks dropdown — jump to known cycle top/bottom dates.

// ───────────────────────────────────────────────────────────────────────────
// Lookback: controls the top chart's visible time window
// ───────────────────────────────────────────────────────────────────────────
let currentLookback = "all";

function applyLookback(lb) {
  currentLookback = lb;
  // Update active class on buttons
  document.querySelectorAll("#lb-group button").forEach(btn => {
    btn.classList.toggle("active", btn.getAttribute("data-lb") === String(lb));
  });
  if (!priceDateStrs || priceDateStrs.length === 0) return;
  const lastDate = priceDateStrs[priceDateStrs.length - 1];
  if (lb === "all" || lb === 99999) {
    topChart.timeScale().fitContent();
    return;
  }
  const days = parseInt(lb, 10);
  if (!isFinite(days) || days <= 0) { topChart.timeScale().fitContent(); return; }
  const fromDate = new Date(lastDate + "T00:00:00");
  fromDate.setDate(fromDate.getDate() - days);
  const fromStr = fromDate.toISOString().slice(0, 10);
  // Clamp from to earliest available date
  const earliest = priceDateStrs[0];
  topChart.timeScale().setVisibleRange({
    from: fromStr < earliest ? earliest : fromStr,
    to: lastDate,
  });
}

document.querySelectorAll("#lb-group button").forEach(btn => {
  btn.addEventListener("click", () => {
    const lb = btn.getAttribute("data-lb");
    applyLookback(lb === "all" ? "all" : parseInt(lb, 10));
    saveStateToURL();
  });
});

// ───────────────────────────────────────────────────────────────────────────
// URL persistence: serialize active indicators + current date to URL hash
// so the configuration is bookmarkable / shareable.
// ───────────────────────────────────────────────────────────────────────────
let _saveStateTimer = null;
function saveStateToURL() {
  // Debounce — config sliders or rapid add/remove can fire many writes
  if (_saveStateTimer) clearTimeout(_saveStateTimer);
  _saveStateTimer = setTimeout(() => {
    const state = {
      v: 2, // version, in case we need to migrate later
      d: currentDateStr,
      lb: currentLookback,
      ct: typeof currentChartType !== "undefined" ? currentChartType : undefined,
      iv: typeof currentInterval   !== "undefined" ? currentInterval   : undefined,
      ind: [...activeIndicators.values()]
        .filter(ind => ind.constructor.type !== "btc_price") // BTC is always-present, not part of state
        .map(ind => ({ t: ind.constructor.type, c: ind.config, h: ind.visible === false ? 1 : 0 })),
    };
    try {
      const hash = "#s=" + encodeURIComponent(btoa(JSON.stringify(state)));
      window.history.replaceState(null, "", window.location.pathname + window.location.search + hash);
    } catch (e) {
      console.warn("saveStateToURL failed:", e);
    }
  }, 250);
}

function loadStateFromURL() {
  const h = window.location.hash || "";
  const m = h.match(/[#&]s=([^&]+)/);
  if (!m) return null;
  try {
    return JSON.parse(atob(decodeURIComponent(m[1])));
  } catch (e) {
    console.warn("loadStateFromURL parse failed:", e);
    return null;
  }
}

async function restoreState(state) {
  if (!state || !Array.isArray(state.ind)) return false;
  if (state.d && priceDateStrs && priceDateStrs.indexOf(state.d) >= 0) {
    currentDateStr = state.d;
    document.getElementById("date-input").value = state.d;
  }
  if (state.ct) {
    try { setChartType(state.ct); } catch (e) { console.warn("restore chart type:", e); }
  }
  if (state.iv) {
    const opt = document.querySelector(`#interval-menu .opt[data-interval="${state.iv}"]`);
    if (opt) opt.click();
  }
  if (state.lb !== undefined) applyLookback(state.lb);
  let restored = 0;
  for (const i of state.ind) {
    const T = INDICATOR_TYPES.find(t => t.type === i.t);
    if (!T) { console.warn("restore: unknown indicator type", i.t); continue; }
    const ind = new T(i.c || {});
    activeIndicators.set(ind.id, ind);
    try {
      await ind.load();
      if (i.h) ind.setVisible(false);
      restored++;
    } catch (e) {
      console.error(`restore ${i.t}:`, e);
      ind.remove();
      activeIndicators.delete(ind.id);
    }
  }
  refreshIndicatorPanel();
  return restored > 0;
}

// Hook into add/remove/config flows by re-saving after each change.
// We do this by wrapping the existing refreshIndicatorPanel + onDateChange paths.
const _origRefreshPanel = refreshIndicatorPanel;
refreshIndicatorPanel = function() {
  _origRefreshPanel();
  saveStateToURL();
  recordHistory();
};

const _origSetCurrentDate = setCurrentDate;
setCurrentDate = function(dateStr) {
  _origSetCurrentDate(dateStr);
  saveStateToURL();
  // NOTE: don't recordHistory here — date changes from crosshair scrub are too noisy.
};

// ───────────────────────────────────────────────────────────────────────────
// Undo / Redo — history stack of state snapshots, replays via applyState.
// History is captured on discrete user actions (indicator add/remove/edit,
// chart type, interval, lookback). Date scrubs are NOT captured (too noisy).
// ───────────────────────────────────────────────────────────────────────────
const HISTORY_LIMIT = 100;
let historyPast = [];
let historyFuture = [];
let _suppressHistory = false;
let _lastRecordedState = null;

function snapshotState() {
  return {
    v: 2,
    d: currentDateStr,
    lb: currentLookback,
    ct: currentChartType,
    iv: currentInterval,
    ind: [...activeIndicators.values()]
      .filter(ind => ind.constructor.type !== "btc_price")
      .map(ind => ({ t: ind.constructor.type, c: ind.config, h: ind.visible === false ? 1 : 0 })),
  };
}

function _statesEqual(a, b) {
  try { return JSON.stringify(a) === JSON.stringify(b); } catch (e) { return false; }
}

function recordHistory() {
  if (_suppressHistory) return;
  const s = snapshotState();
  if (_lastRecordedState && _statesEqual(s, _lastRecordedState)) return;
  if (_lastRecordedState) {
    historyPast.push(_lastRecordedState);
    if (historyPast.length > HISTORY_LIMIT) historyPast.shift();
  }
  _lastRecordedState = s;
  historyFuture = [];
  refreshUndoRedoButtons();
}

function refreshUndoRedoButtons() {
  const u = document.getElementById("btn-undo");
  const r = document.getElementById("btn-redo");
  if (u) u.disabled = historyPast.length === 0;
  if (r) r.disabled = historyFuture.length === 0;
}

// Apply a state snapshot — tear down current indicators, rebuild from snapshot.
async function applyState(state) {
  _suppressHistory = true;
  try {
    // Remove all non-BTC indicators
    const toRemove = [...activeIndicators.values()]
      .filter(ind => ind.constructor.type !== "btc_price");
    for (const ind of toRemove) {
      try { ind.remove(); } catch (e) { console.warn("apply: remove failed", e); }
      activeIndicators.delete(ind.id);
    }
    // Chart type
    if (state.ct && state.ct !== currentChartType) {
      try { setChartType(state.ct); } catch (e) { console.warn("apply: chart type", e); }
    }
    // Interval (UI-only at this point)
    if (state.iv && state.iv !== currentInterval) {
      const opt = document.querySelector(`#interval-menu .opt[data-interval="${state.iv}"]`);
      if (opt) opt.click();
    }
    // Lookback
    if (state.lb !== undefined) {
      try { applyLookback(state.lb); } catch (e) { console.warn("apply: lookback", e); }
    }
    // Date
    if (state.d) {
      try { setCurrentDate(state.d); } catch (e) { console.warn("apply: date", e); }
    }
    // Re-add indicators in order
    for (const i of state.ind || []) {
      const T = INDICATOR_TYPES.find(t => t.type === i.t);
      if (!T) { console.warn("apply: unknown indicator", i.t); continue; }
      const ind = new T(i.c || {});
      activeIndicators.set(ind.id, ind);
      try {
        await ind.load();
        if (i.h) ind.setVisible(false);
      } catch (e) {
        console.error("apply: ind.load failed", i.t, e);
        try { ind.remove(); } catch (e2) {}
        activeIndicators.delete(ind.id);
      }
    }
    _origRefreshPanel();
  } finally {
    _suppressHistory = false;
  }
  _lastRecordedState = snapshotState();
  refreshUndoRedoButtons();
  saveStateToURL();
}

async function undo() {
  if (historyPast.length === 0) return;
  if (_lastRecordedState) historyFuture.push(_lastRecordedState);
  const prev = historyPast.pop();
  await applyState(prev);
}

async function redo() {
  if (historyFuture.length === 0) return;
  if (_lastRecordedState) historyPast.push(_lastRecordedState);
  const next = historyFuture.pop();
  await applyState(next);
}

// Wire button click handlers
document.getElementById("btn-undo").addEventListener("click", () => undo());
document.getElementById("btn-redo").addEventListener("click", () => redo());

// Keyboard shortcuts: Ctrl+Z = undo, Ctrl+Y or Ctrl+Shift+Z = redo (Cmd on macOS)
document.addEventListener("keydown", (e) => {
  // Skip when typing in inputs
  const tag = (e.target && e.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  const mod = e.ctrlKey || e.metaKey;
  if (!mod) return;
  if (e.key === "z" || e.key === "Z") {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
  } else if (e.key === "y" || e.key === "Y") {
    e.preventDefault();
    redo();
  }
});

// Hook chart-type change into history
const _origSetChartType = setChartType;
setChartType = function(type) {
  _origSetChartType(type);
  recordHistory();
};

// Hook interval menu click into history
document.querySelectorAll("#interval-menu .opt").forEach(el => {
  el.addEventListener("click", () => {
    // Wait for the existing handler to apply, then record
    setTimeout(recordHistory, 0);
  });
});

// Hook lookback button click into history
document.querySelectorAll("#lb-group button").forEach(btn => {
  btn.addEventListener("click", () => {
    setTimeout(recordHistory, 0);
  });
});

// ───────────────────────────────────────────────────────────────────────────
// MP4 export — animates through a date range, captures each frame,
// encodes via WebCodecs + mp4-muxer.
// ───────────────────────────────────────────────────────────────────────────
let _mp4Cancel = false;

async function setCurrentDateAwait(dateStr) {
  currentDateStr = dateStr;
  document.getElementById("date-input").value = dateStr;
  // Wait for every indicator to settle (URPD/SOPD/Age-band fetches)
  await Promise.all([...activeIndicators.values()].map(ind => {
    try { return Promise.resolve(ind.onDateChange(dateStr)); }
    catch (e) { return null; }
  }));
}

function buildDateList(fromStr, toStr, stepDays) {
  if (!priceDateStrs) return [];
  const fromIdx = priceDateStrs.indexOf(fromStr);
  const toIdx = priceDateStrs.indexOf(toStr);
  if (fromIdx < 0 || toIdx < 0 || toIdx < fromIdx) return [];
  const out = [];
  for (let i = fromIdx; i <= toIdx; i += stepDays) out.push(priceDateStrs[i]);
  if (out[out.length - 1] !== priceDateStrs[toIdx]) out.push(priceDateStrs[toIdx]);
  return out;
}

function openMp4Modal() {
  const modal = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  const lastDate = priceDateStrs ? priceDateStrs[priceDateStrs.length - 1] : currentDateStr;
  // Default: from 2 years ago, to latest, step 7 days, 12 fps
  const defFrom = (() => {
    if (!priceDateStrs) return currentDateStr;
    const d = new Date(lastDate + "T00:00:00"); d.setFullYear(d.getFullYear() - 2);
    const s = d.toISOString().slice(0, 10);
    const idx = priceDateStrs.indexOf(s);
    return idx >= 0 ? s : priceDateStrs[Math.max(0, priceDateStrs.length - 730)];
  })();
  modal.innerHTML = `
    <h3>▶ MP4 Export</h3>
    <div class="section"><label>From date</label>
      <input type="date" id="mp4-from" value="${defFrom}" min="${priceDateStrs ? priceDateStrs[0] : ""}" max="${lastDate}"></div>
    <div class="section"><label>To date</label>
      <input type="date" id="mp4-to" value="${lastDate}" min="${priceDateStrs ? priceDateStrs[0] : ""}" max="${lastDate}"></div>
    <div class="section"><label>Step (days per frame)</label>
      <select id="mp4-step">
        <option value="1">1 day</option>
        <option value="3">3 days</option>
        <option value="7" selected>7 days (1 week)</option>
        <option value="14">14 days</option>
        <option value="30">30 days (1 month)</option>
      </select></div>
    <div class="section"><label>Frame rate (FPS)</label>
      <select id="mp4-fps">
        <option value="6">6 fps</option>
        <option value="12" selected>12 fps</option>
        <option value="24">24 fps</option>
        <option value="30">30 fps</option>
      </select></div>
    <div id="mp4-estimate" style="color:#888;margin-bottom:8px;font-size:11px"></div>
    <div id="mp4-progress" style="display:none;margin-bottom:8px">
      <div style="background:#1a1a1a;height:6px;position:relative;overflow:hidden">
        <div id="mp4-bar" style="background:#ff8c00;height:100%;width:0%;transition:width .12s linear"></div>
      </div>
      <div id="mp4-status" style="color:#d4d4d4;font-size:11px;margin-top:4px;">Preparing…</div>
    </div>
    <div class="actions">
      <button id="modal-cancel">Cancel</button>
      <button id="mp4-start" class="primary">Start</button>
    </div>`;
  bg.classList.add("show");

  function updateEstimate() {
    const f = modal.querySelector("#mp4-from").value;
    const t = modal.querySelector("#mp4-to").value;
    const step = parseInt(modal.querySelector("#mp4-step").value, 10);
    const fps = parseInt(modal.querySelector("#mp4-fps").value, 10);
    const dates = buildDateList(f, t, step);
    const sec = (dates.length / fps).toFixed(1);
    modal.querySelector("#mp4-estimate").textContent =
      `${dates.length} frames @ ${fps} fps → ~${sec}s video. Capture may take ~${(dates.length * 0.5).toFixed(0)}s+ depending on indicators.`;
  }
  ["mp4-from","mp4-to","mp4-step","mp4-fps"].forEach(id =>
    modal.querySelector("#"+id).addEventListener("change", updateEstimate));
  updateEstimate();

  modal.querySelector("#modal-cancel").addEventListener("click", () => {
    _mp4Cancel = true;
    bg.classList.remove("show");
  });
  modal.querySelector("#mp4-start").addEventListener("click", async () => {
    const f = modal.querySelector("#mp4-from").value;
    const t = modal.querySelector("#mp4-to").value;
    const step = parseInt(modal.querySelector("#mp4-step").value, 10);
    const fps = parseInt(modal.querySelector("#mp4-fps").value, 10);
    const dates = buildDateList(f, t, step);
    if (dates.length === 0) { alert("No frames in this range."); return; }

    modal.querySelector("#mp4-start").disabled = true;
    modal.querySelector("#mp4-progress").style.display = "block";
    const bar = modal.querySelector("#mp4-bar");
    const stat = modal.querySelector("#mp4-status");
    _mp4Cancel = false;

    try {
      stat.textContent = "Loading encoder libraries…";
      const [h2c, mp4mod] = await Promise.all([
        window.__loadHtml2canvas(),
        window.__loadMp4Muxer(),
      ]);
      const Mp4Muxer = mp4mod.Muxer || mp4mod.Mp4Muxer || mp4mod;
      const ArrayBufferTarget = mp4mod.ArrayBufferTarget;
      if (!ArrayBufferTarget) throw new Error("mp4-muxer ArrayBufferTarget not available");
      if (typeof VideoEncoder === "undefined") throw new Error("WebCodecs VideoEncoder not supported in this browser");

      // Sample one frame to discover the canvas dimensions
      stat.textContent = "Capturing first frame to size the encoder…";
      await setCurrentDateAwait(dates[0]);
      const probe = await h2c(document.getElementById("chart-stack"), {
        backgroundColor: THEME.background, scale: 1, useCORS: true, logging: false,
      });
      // Round dimensions to even numbers (H.264 requires even W/H)
      const W = Math.floor(probe.width / 2) * 2;
      const H = Math.floor(probe.height / 2) * 2;

      const target = new ArrayBufferTarget();
      const muxer = new Mp4Muxer({
        target, fastStart: "in-memory",
        video: { codec: "avc", width: W, height: H, frameRate: fps },
      });
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: (e) => { console.error("encoder:", e); throw e; },
      });
      encoder.configure({
        codec: "avc1.640033", // H.264 high@5.1
        width: W, height: H,
        bitrate: 4_000_000, // 4 Mbps
        framerate: fps,
      });

      // Render & encode frame loop
      const microsPerFrame = 1_000_000 / fps;
      let frameIdx = 0;
      for (const dateStr of dates) {
        if (_mp4Cancel) throw new Error("cancelled");
        await setCurrentDateAwait(dateStr);
        // One animation frame so the DOM repaints with the new state
        await new Promise(r => requestAnimationFrame(r));
        const canvas = await h2c(document.getElementById("chart-stack"), {
          backgroundColor: THEME.background, scale: 1, useCORS: true, logging: false,
          width: W, height: H,
        });
        const frame = new VideoFrame(canvas, {
          timestamp: Math.round(frameIdx * microsPerFrame),
        });
        // Backpressure: don't enqueue too many frames at once
        while (encoder.encodeQueueSize > 5) {
          await new Promise(r => setTimeout(r, 10));
        }
        encoder.encode(frame, { keyFrame: frameIdx % fps === 0 });
        frame.close();
        frameIdx++;
        const pct = ((frameIdx / dates.length) * 100).toFixed(1);
        bar.style.width = pct + "%";
        stat.textContent = `Frame ${frameIdx}/${dates.length} (${pct}%) — ${dateStr}`;
      }

      stat.textContent = "Flushing encoder…";
      await encoder.flush();
      muxer.finalize();

      stat.textContent = "Saving file…";
      const blob = new Blob([target.buffer], { type: "video/mp4" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `bitcointerminal_${dates[0]}_to_${dates[dates.length-1]}.mp4`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);

      stat.textContent = `Saved: ${a.download} (${(blob.size/1e6).toFixed(1)} MB)`;
      modal.querySelector("#modal-cancel").textContent = "Close";
    } catch (e) {
      console.error("MP4 export failed:", e);
      stat.textContent = "Failed: " + e.message;
      stat.style.color = "#ff5c5c";
      modal.querySelector("#modal-cancel").textContent = "Close";
    }
  });
}

document.getElementById("btn-mp4").addEventListener("click", openMp4Modal);

// PNG snapshot button — uses html2canvas to rasterize chart-stack
document.getElementById("btn-png").addEventListener("click", async () => {
  const status = document.getElementById("status");

  status.style.color = "#888";
  let h2c;
  try { h2c = await window.__loadHtml2canvas(); }

    status.style.color = "#ff5c5c";

      const url = URL.createObjectURL(blob);

        .filter(ind => ind.constructor.type !== "btc_price")
        .map(ind => ind.constructor.type).join("_") || "default";

      a.download = `bitcointerminal_${currentDateStr}_${indSummary}.png`;
      document.body.appendChild(a);

      a.remove();
      URL.revokeObjectURL(url);
      status.textContent = `PNG saved: ${a.download}`;
      status.style.color = "#2ecc71";
      setTimeout(() => { status.style.color = "#666"; }, 2000);

  } catch (e) {
    console.error("PNG export failed:", e);
    status.textContent = "PNG export failed: " + e.message;
    status.style.color = "#ff5c5c";
  }
});

// ───────────────────────────────────────────────────────────────────────────
// Pane splitter — drag the divider between top/bottom charts to resize.
// Uses Pointer Events + setPointerCapture so the drag never loses tracking
// even if the cursor moves over a chart canvas or off-window. LWC's autoSize
// observes container size and re-layouts in real-time.
// ───────────────────────────────────────────────────────────────────────────
(function wirePaneDivider() {
  const divider = document.getElementById("chart-divider");
  const stack = document.getElementById("chart-stack");
  const topWrap = document.getElementById("chart-top-wrap");
  if (!divider || !stack || !topWrap) {
    console.warn("pane splitter: missing element", { divider, stack, topWrap });
    return;
  }
  const MIN_PCT = 12, MAX_PCT = 88; // keep both panes visible
  let activePointerId = null;
  let stackRect = null;

  function onPointerDown(e) {
    if (e.button !== undefined && e.button !== 0) return; // left-click only
    activePointerId = e.pointerId;
    stackRect = stack.getBoundingClientRect();
    try { divider.setPointerCapture(e.pointerId); } catch (err) {}
    divider.classList.add("is-dragging");
    document.body.classList.add("is-resizing-pane");
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (activePointerId === null || e.pointerId !== activePointerId) return;
    if (!stackRect || stackRect.height <= 0) return;
    let pct = ((e.clientY - stackRect.top) / stackRect.height) * 100;
    if (pct < MIN_PCT) pct = MIN_PCT;
    if (pct > MAX_PCT) pct = MAX_PCT;
    topWrap.style.flex = `0 0 ${pct.toFixed(2)}%`;
    // Tell LWC to re-layout immediately so the canvas tracks the new container
    // size synchronously instead of one frame later (which causes overlap).
    try {
      const topEl = document.getElementById("chart-top");
      const botEl = document.getElementById("chart-bottom");
      if (topEl && topChart    && topChart.resize)    topChart.resize(topEl.clientWidth, topEl.clientHeight);
      if (botEl && bottomChart && bottomChart.resize) bottomChart.resize(botEl.clientWidth, botEl.clientHeight);
      if (timeAxisChart && timeAxisChart.resize)      timeAxisChart.resize(timeAxisContainer.clientWidth, timeAxisContainer.clientHeight);
    } catch (err) {}
  }

  function endDrag(e) {
    if (activePointerId === null) return;
    try { divider.releasePointerCapture(activePointerId); } catch (err) {}
    activePointerId = null;
    stackRect = null;
    divider.classList.remove("is-dragging");
    document.body.classList.remove("is-resizing-pane");
  }

  divider.addEventListener("pointerdown", onPointerDown);
  divider.addEventListener("pointermove", onPointerMove);
  divider.addEventListener("pointerup", endDrag);
  divider.addEventListener("pointercancel", endDrag);
  // Belt-and-suspenders: also listen on document in case capture is lost
  document.addEventListener("pointerup", endDrag);
})();
