// ───────────────────────────────────────────────────────────────────────────
// Lookback: controls the top chart's visible time window
// ───────────────────────────────────────────────────────────────────────────
let currentLookback = "all";

function applyLookback(lb) {
  currentLookback = lb;
  // Update active class on buttons
  document.querySelectorAll("#lb-group button").forEach(btn => {
    btn.classList.toggle("active", btn.getAttribute("data-lb") === String(lb));
  });
  if (!priceDateStrs || priceDateStrs.length === 0) return;
  const lastDate = priceDateStrs[priceDateStrs.length - 1];
  if (lb === "all" || lb === 99999) {
    topChart.timeScale().fitContent();
    return;
  }
  const days = parseInt(lb, 10);
  if (!isFinite(days) || days <= 0) { topChart.timeScale().fitContent(); return; }
  const fromDate = new Date(lastDate + "T00:00:00");
  fromDate.setDate(fromDate.getDate() - days);
  const fromStr = fromDate.toISOString().slice(0, 10);
  // Clamp from to earliest available date
  const earliest = priceDateStrs[0];
  topChart.timeScale().setVisibleRange({
    from: fromStr < earliest ? earliest : fromStr,
    to: lastDate,
  });
}

document.querySelectorAll("#lb-group button").forEach(btn => {
  btn.addEventListener("click", () => {
    const lb = btn.getAttribute("data-lb");
    applyLookback(lb === "all" ? "all" : parseInt(lb, 10));
    saveStateToURL();
  });
});

// ───────────────────────────────────────────────────────────────────────────
// URL persistence: serialize active indicators + current date to URL hash
// so the configuration is bookmarkable / shareable.
// ───────────────────────────────────────────────────────────────────────────
let _saveStateTimer = null;
function saveStateToURL() {
  // Debounce — config sliders or rapid add/remove can fire many writes
  if (_saveStateTimer) clearTimeout(_saveStateTimer);
  _saveStateTimer = setTimeout(() => {
    const state = {
      v: 2, // version, in case we need to migrate later
      d: currentDateStr,
      lb: currentLookback,
      ct: typeof currentChartType !== "undefined" ? currentChartType : undefined,
      iv: typeof currentInterval   !== "undefined" ? currentInterval   : undefined,
      ind: [...activeIndicators.values()]
        .filter(ind => ind.constructor.type !== "btc_price") // BTC is always-present, not part of state
        .map(ind => ({ t: ind.constructor.type, c: ind.config, h: ind.visible === false ? 1 : 0 })),
    };
    try {
      const hash = "#s=" + encodeURIComponent(btoa(JSON.stringify(state)));
      window.history.replaceState(null, "", window.location.pathname + window.location.search + hash);
    } catch (e) {
      console.warn("saveStateToURL failed:", e);
    }
  }, 250);
}

function loadStateFromURL() {
  const h = window.location.hash || "";
  const m = h.match(/[#&]s=([^&]+)/);
  if (!m) return null;
  try {
    return JSON.parse(atob(decodeURIComponent(m[1])));
  } catch (e) {
    console.warn("loadStateFromURL parse failed:", e);
    return null;
  }
}

async function restoreState(state) {
  if (!state || !Array.isArray(state.ind)) return false;
  if (state.d && priceDateStrs && priceDateStrs.indexOf(state.d) >= 0) {
    currentDateStr = state.d;
    document.getElementById("date-input").value = state.d;
  }
  if (state.ct) {
    try { setChartType(state.ct); } catch (e) { console.warn("restore chart type:", e); }
  }
  if (state.iv) {
    const opt = document.querySelector(`#interval-menu .opt[data-interval="${state.iv}"]`);
    if (opt) opt.click();
  }
  if (state.lb !== undefined) applyLookback(state.lb);
  let restored = 0;
  for (const i of state.ind) {
    const T = INDICATOR_TYPES.find(t => t.type === i.t);
    if (!T) { console.warn("restore: unknown indicator type", i.t); continue; }
    const ind = new T(i.c || {});
    activeIndicators.set(ind.id, ind);
    try {
      await ind.load();
      if (i.h) ind.setVisible(false);
      restored++;
    } catch (e) {
      console.error(`restore ${i.t}:`, e);
      ind.remove();
      activeIndicators.delete(ind.id);
    }
  }
  refreshIndicatorPanel();
  return restored > 0;
}

// Hook into add/remove/config flows by re-saving after each change.
// We do this by wrapping the existing refreshIndicatorPanel + onDateChange paths.
const _origRefreshPanel = refreshIndicatorPanel;
refreshIndicatorPanel = function() {
  _origRefreshPanel();
  saveStateToURL();
  recordHistory();
};

const _origSetCurrentDate = setCurrentDate;
setCurrentDate = function(dateStr) {
  _origSetCurrentDate(dateStr);
  // Update the date in the bottom-pane header
  const dateSpan = document.getElementById("header-bottom-date");
  if (dateSpan) dateSpan.textContent = dateStr || "—";
  saveStateToURL();
  // NOTE: don't recordHistory here — date changes from crosshair scrub are too noisy.
};

// ───────────────────────────────────────────────────────────────────────────
// Undo / Redo — history stack of state snapshots, replays via applyState.
// History is captured on discrete user actions (indicator add/remove/edit,
// chart type, interval, lookback). Date scrubs are NOT captured (too noisy).
// ───────────────────────────────────────────────────────────────────────────
const HISTORY_LIMIT = 100;
let historyPast = [];
let historyFuture = [];
let _suppressHistory = false;
let _lastRecordedState = null;

function snapshotState() {
  return {
    v: 2,
    d: currentDateStr,
    lb: currentLookback,
    ct: currentChartType,
    iv: currentInterval,
    ind: [...activeIndicators.values()]
      .filter(ind => ind.constructor.type !== "btc_price")
      .map(ind => ({ t: ind.constructor.type, c: ind.config, h: ind.visible === false ? 1 : 0 })),
  };
}

function _statesEqual(a, b) {
  try { return JSON.stringify(a) === JSON.stringify(b); } catch (e) { return false; }
}

function recordHistory() {
  if (_suppressHistory) return;
  const s = snapshotState();
  if (_lastRecordedState && _statesEqual(s, _lastRecordedState)) return;
  if (_lastRecordedState) {
    historyPast.push(_lastRecordedState);
    if (historyPast.length > HISTORY_LIMIT) historyPast.shift();
  }
  _lastRecordedState = s;
  historyFuture = [];
  refreshUndoRedoButtons();
}

function refreshUndoRedoButtons() {
  const u = document.getElementById("btn-undo");
  const r = document.getElementById("btn-redo");
  if (u) u.disabled = historyPast.length === 0;
  if (r) r.disabled = historyFuture.length === 0;
}

// Apply a state snapshot — tear down current indicators, rebuild from snapshot.
async function applyState(state) {
  _suppressHistory = true;
  try {
    // Remove all non-BTC indicators
    const toRemove = [...activeIndicators.values()]
      .filter(ind => ind.constructor.type !== "btc_price");
    for (const ind of toRemove) {
      try { ind.remove(); } catch (e) { console.warn("apply: remove failed", e); }
      activeIndicators.delete(ind.id);
    }
    // Chart type
    if (state.ct && state.ct !== currentChartType) {
      try { setChartType(state.ct); } catch (e) { console.warn("apply: chart type", e); }
    }
    // Interval (UI-only at this point)
    if (state.iv && state.iv !== currentInterval) {
      const opt = document.querySelector(`#interval-menu .opt[data-interval="${state.iv}"]`);
      if (opt) opt.click();
    }
    // Lookback
    if (state.lb !== undefined) {
      try { applyLookback(state.lb); } catch (e) { console.warn("apply: lookback", e); }
    }
    // Date
    if (state.d) {
      try { setCurrentDate(state.d); } catch (e) { console.warn("apply: date", e); }
    }
    // Re-add indicators in order
    for (const i of state.ind || []) {
      const T = INDICATOR_TYPES.find(t => t.type === i.t);
      if (!T) { console.warn("apply: unknown indicator", i.t); continue; }
      const ind = new T(i.c || {});
      activeIndicators.set(ind.id, ind);
      try {
        await ind.load();
        if (i.h) ind.setVisible(false);
      } catch (e) {
        console.error("apply: ind.load failed", i.t, e);
        try { ind.remove(); } catch (e2) {}
        activeIndicators.delete(ind.id);
      }
    }
    _origRefreshPanel();
  } finally {
    _suppressHistory = false;
  }
  _lastRecordedState = snapshotState();
  refreshUndoRedoButtons();
  saveStateToURL();
}

async function undo() {
  if (historyPast.length === 0) return;
  if (_lastRecordedState) historyFuture.push(_lastRecordedState);
  const prev = historyPast.pop();
  await applyState(prev);
}

async function redo() {
  if (historyFuture.length === 0) return;
  if (_lastRecordedState) historyPast.push(_lastRecordedState);
  const next = historyFuture.pop();
  await applyState(next);
}

// Wire button click handlers
document.getElementById("btn-undo").addEventListener("click", () => undo());
document.getElementById("btn-redo").addEventListener("click", () => redo());

// Keyboard shortcuts: Ctrl+Z = undo, Ctrl+Y or Ctrl+Shift+Z = redo (Cmd on macOS)
document.addEventListener("keydown", (e) => {
  // Skip when typing in inputs
  const tag = (e.target && e.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  const mod = e.ctrlKey || e.metaKey;
  if (!mod) return;
  if (e.key === "z" || e.key === "Z") {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
  } else if (e.key === "y" || e.key === "Y") {
    e.preventDefault();
    redo();
  }
});

// Hook chart-type change into history
const _origSetChartType = setChartType;
setChartType = function(type) {
  _origSetChartType(type);
  recordHistory();
};

// Hook interval menu click into history
document.querySelectorAll("#interval-menu .opt").forEach(el => {
  el.addEventListener("click", () => {
    // Wait for the existing handler to apply, then record
    setTimeout(recordHistory, 0);
  });
});

// Hook lookback button click into history
document.querySelectorAll("#lb-group button").forEach(btn => {
  btn.addEventListener("click", () => {
    setTimeout(recordHistory, 0);
  });
});

// ───────────────────────────────────────────────────────────────────────────
// MP4 export — animates through a date range, captures each frame,
// encodes via WebCodecs + mp4-muxer.
// ───────────────────────────────────────────────────────────────────────────
let _mp4Cancel = false;

async function setCurrentDateAwait(dateStr) {
  currentDateStr = dateStr;
  document.getElementById("date-input").value = dateStr;
  // Wait for every indicator to settle (URPD/SOPD/Age-band fetches)
  await Promise.all([...activeIndicators.values()].map(ind => {
    try { return Promise.resolve(ind.onDateChange(dateStr)); }
    catch (e) { return null; }
  }));
}

function buildDateList(fromStr, toStr, stepDays) {
  if (!priceDateStrs) return [];
  const fromIdx = priceDateStrs.indexOf(fromStr);
  const toIdx = priceDateStrs.indexOf(toStr);
  if (fromIdx < 0 || toIdx < 0 || toIdx < fromIdx) return [];
  const out = [];
  for (let i = fromIdx; i <= toIdx; i += stepDays) out.push(priceDateStrs[i]);
  if (out[out.length - 1] !== priceDateStrs[toIdx]) out.push(priceDateStrs[toIdx]);
  return out;
}

function openMp4Modal() {
  const modal = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  const lastDate = priceDateStrs ? priceDateStrs[priceDateStrs.length - 1] : currentDateStr;
  // Default: from 2 years ago, to latest, step 7 days, 12 fps
  const defFrom = (() => {
    if (!priceDateStrs) return currentDateStr;
    const d = new Date(lastDate + "T00:00:00"); d.setFullYear(d.getFullYear() - 2);
    const s = d.toISOString().slice(0, 10);
    const idx = priceDateStrs.indexOf(s);
    return idx >= 0 ? s : priceDateStrs[Math.max(0, priceDateStrs.length - 730)];
  })();
  modal.innerHTML = `
    <h3>▶ MP4 Export</h3>
    <div class="section"><label>From date</label>
      <input type="date" id="mp4-from" value="${defFrom}" min="${priceDateStrs ? priceDateStrs[0] : ""}" max="${lastDate}"></div>
    <div class="section"><label>To date</label>
      <input type="date" id="mp4-to" value="${lastDate}" min="${priceDateStrs ? priceDateStrs[0] : ""}" max="${lastDate}"></div>
    <div class="section"><label>Step (days per frame)</label>
      <select id="mp4-step">
        <option value="1">1 day</option>
        <option value="3">3 days</option>
        <option value="7" selected>7 days (1 week)</option>
        <option value="14">14 days</option>
        <option value="30">30 days (1 month)</option>
      </select></div>
    <div class="section"><label>Frame rate (FPS)</label>
      <select id="mp4-fps">
        <option value="6">6 fps</option>
        <option value="12" selected>12 fps</option>
        <option value="24">24 fps</option>
        <option value="30">30 fps</option>
      </select></div>
    <div id="mp4-estimate" style="color:#888;margin-bottom:8px;font-size:11px"></div>
    <div id="mp4-progress" style="display:none;margin-bottom:8px">
      <div style="background:#1a1a1a;height:6px;position:relative;overflow:hidden">
        <div id="mp4-bar" style="background:#ff8c00;height:100%;width:0%;transition:width .12s linear"></div>
      </div>
      <div id="mp4-status" style="color:#d4d4d4;font-size:11px;margin-top:4px;">Preparing…</div>
    </div>
    <div class="actions">
      <button id="modal-cancel">Cancel</button>
      <button id="mp4-start" class="primary">Start</button>
    </div>`;
  bg.classList.add("show");

  function updateEstimate() {
    const f = modal.querySelector("#mp4-from").value;
    const t = modal.querySelector("#mp4-to").value;
    const step = parseInt(modal.querySelector("#mp4-step").value, 10);
    const fps = parseInt(modal.querySelector("#mp4-fps").value, 10);
    const dates = buildDateList(f, t, step);
    const sec = (dates.length / fps).toFixed(1);
    modal.querySelector("#mp4-estimate").textContent =
      `${dates.length} frames @ ${fps} fps → ~${sec}s video. Capture may take ~${(dates.length * 0.5).toFixed(0)}s+ depending on indicators.`;
  }
  ["mp4-from","mp4-to","mp4-step","mp4-fps"].forEach(id =>
    modal.querySelector("#"+id).addEventListener("change", updateEstimate));
  updateEstimate();

  modal.querySelector("#modal-cancel").addEventListener("click", () => {
    _mp4Cancel = true;
    bg.classList.remove("show");
  });
  modal.querySelector("#mp4-start").addEventListener("click", async () => {
    const f = modal.querySelector("#mp4-from").value;
    const t = modal.querySelector("#mp4-to").value;
    const step = parseInt(modal.querySelector("#mp4-step").value, 10);
    const fps = parseInt(modal.querySelector("#mp4-fps").value, 10);
    const dates = buildDateList(f, t, step);
    if (dates.length === 0) { alert("No frames in this range."); return; }

    modal.querySelector("#mp4-start").disabled = true;
    modal.querySelector("#mp4-progress").style.display = "block";
    const bar = modal.querySelector("#mp4-bar");
    const stat = modal.querySelector("#mp4-status");
    _mp4Cancel = false;

    try {
      stat.textContent = "Loading encoder libraries…";
      const [h2c, mp4mod] = await Promise.all([
        window.__loadHtml2canvas(),
        window.__loadMp4Muxer(),
      ]);
      const Mp4Muxer = mp4mod.Muxer || mp4mod.Mp4Muxer || mp4mod;
      const ArrayBufferTarget = mp4mod.ArrayBufferTarget;
      if (!ArrayBufferTarget) throw new Error("mp4-muxer ArrayBufferTarget not available");
      if (typeof VideoEncoder === "undefined") throw new Error("WebCodecs VideoEncoder not supported in this browser");

      // Sample one frame to discover the canvas dimensions
      stat.textContent = "Capturing first frame to size the encoder…";
      await setCurrentDateAwait(dates[0]);
      const probe = await h2c(document.getElementById("chart-stack"), {
        backgroundColor: THEME.background, scale: 1, useCORS: true, logging: false,
      });
      // Round dimensions to even numbers (H.264 requires even W/H)
      const W = Math.floor(probe.width / 2) * 2;
      const H = Math.floor(probe.height / 2) * 2;

      const target = new ArrayBufferTarget();
      const muxer = new Mp4Muxer({
        target, fastStart: "in-memory",
        video: { codec: "avc", width: W, height: H, frameRate: fps },
      });
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: (e) => { console.error("encoder:", e); throw e; },
      });
      encoder.configure({
        codec: "avc1.640033", // H.264 high@5.1
        width: W, height: H,
        bitrate: 4_000_000, // 4 Mbps
        framerate: fps,
      });

      // Render & encode frame loop
      const microsPerFrame = 1_000_000 / fps;
      let frameIdx = 0;
      for (const dateStr of dates) {
        if (_mp4Cancel) throw new Error("cancelled");
        await setCurrentDateAwait(dateStr);
        // One animation frame so the DOM repaints with the new state
        await new Promise(r => requestAnimationFrame(r));
        const canvas = await h2c(document.getElementById("chart-stack"), {
          backgroundColor: THEME.background, scale: 1, useCORS: true, logging: false,
          width: W, height: H,
        });
        const frame = new VideoFrame(canvas, {
          timestamp: Math.round(frameIdx * microsPerFrame),
        });
        // Backpressure: don't enqueue too many frames at once
        while (encoder.encodeQueueSize > 5) {
          await new Promise(r => setTimeout(r, 10));
        }
        encoder.encode(frame, { keyFrame: frameIdx % fps === 0 });
        frame.close();
        frameIdx++;
        const pct = ((frameIdx / dates.length) * 100).toFixed(1);
        bar.style.width = pct + "%";
        stat.textContent = `Frame ${frameIdx}/${dates.length} (${pct}%) — ${dateStr}`;
      }

      stat.textContent = "Flushing encoder…";
      await encoder.flush();
      muxer.finalize();

      stat.textContent = "Saving file…";
      const blob = new Blob([target.buffer], { type: "video/mp4" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `bitcointerminal_${dates[0]}_to_${dates[dates.length-1]}.mp4`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);

      stat.textContent = `Saved: ${a.download} (${(blob.size/1e6).toFixed(1)} MB)`;
      modal.querySelector("#modal-cancel").textContent = "Close";
    } catch (e) {
      console.error("MP4 export failed:", e);
      stat.textContent = "Failed: " + e.message;
      stat.style.color = "#ff5c5c";
      modal.querySelector("#modal-cancel").textContent = "Close";
    }
  });
}

document.getElementById("btn-mp4").addEventListener("click", openMp4Modal);

// PNG snapshot button — uses html2canvas to rasterize chart-stack
document.getElementById("btn-png").addEventListener("click", async () => {
  const status = document.getElementById("status");
  status.textContent = "Loading PNG export library…";
  status.style.color = "#888";
  let h2c;
  try { h2c = await window.__loadHtml2canvas(); }
  catch (e) {
    status.textContent = "PNG export library failed to load: " + e.message;
    status.style.color = "#ff5c5c";
    return;
  }
  status.textContent = "Rendering snapshot…";
  try {
    const target = document.getElementById("chart-stack");
    const canvas = await h2c(target, {
      backgroundColor: THEME.background,
      // Higher pixel ratio = crisper text and chart lines
      scale: window.devicePixelRatio > 1 ? 2 : 1.5,
      useCORS: true,
      logging: false,
    });
    canvas.toBlob((blob) => {
      if (!blob) { status.textContent = "PNG blob conversion failed"; status.style.color = "#ff5c5c"; return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const indSummary = [...activeIndicators.values()]
        .filter(ind => ind.constructor.type !== "btc_price")
        .map(ind => ind.constructor.type).join("_") || "default";
      a.href = url;
      a.download = `bitcointerminal_${currentDateStr}_${indSummary}.png`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      status.textContent = `PNG saved: ${a.download}`;
      status.style.color = "#2ecc71";
      setTimeout(() => { status.style.color = "#666"; }, 2000);
    }, "image/png");
  } catch (e) {
    console.error("PNG export failed:", e);
    status.textContent = "PNG export failed: " + e.message;
    status.style.color = "#ff5c5c";
  }
});

// Copy-link button
document.getElementById("btn-copy-link").addEventListener("click", async () => {
  const url = window.location.href;
  const status = document.getElementById("status");
  try {
    await navigator.clipboard.writeText(url);
    const prev = status.textContent;
    status.textContent = "Link copied to clipboard";
    status.style.color = "#2ecc71";
    setTimeout(() => { status.textContent = prev; status.style.color = "#666"; }, 1800);
  } catch (e) {
    // Fallback: select+prompt
    window.prompt("Copy this link:", url);
  }
});

// ───────────────────────────────────────────────────────────────────────────
// Boot
// ───────────────────────────────────────────────────────────────────────────
(async function boot() {
  // Suppress history recording during boot — initial state is not user-driven
  _suppressHistory = true;
  try {
    document.getElementById("status").textContent = "Loading BTC price…";
    const resp = await fetchJSON(BASE + "/api/series/price_close/day1");
    priceArray = resp.data || resp;
    priceDateStrs = new Array(priceArray.length);
    for (let i = 0; i < priceArray.length; i++) priceDateStrs[i] = indexToDateStr(i);

    // BTC price is always present
    const btc = new BTCPriceIndicator();
    activeIndicators.set(btc.id, btc);
    await btc.load();

    // Try to restore from URL hash; fall back to default indicator set if none
    const savedState = loadStateFromURL();
    if (savedState) {
      const ok = await restoreState(savedState);
      document.getElementById("status").textContent = ok
        ? `Restored ${savedState.ind?.length || 0} indicators from URL`
        : "URL state empty/invalid — booted with defaults";
      if (!ok) await loadDefaults();
    } else {
      await loadDefaults();
    }
    refreshIndicatorPanel();
  } catch (e) {
    console.error("Boot failed:", e);
    document.getElementById("status").textContent = "Boot failed: " + e.message;
    document.getElementById("status").style.color = "#ff5c5c";
  } finally {
    // Seed history baseline — initial post-boot state, with empty undo/redo stacks
    _suppressHistory = false;
    _lastRecordedState = snapshotState();
    historyPast = [];
    historyFuture = [];
    refreshUndoRedoButtons();
  }

  async function loadDefaults() {
    const spot = new SpotPriceLineIndicator();
    activeIndicators.set(spot.id, spot);
    await spot.load();
    const urpd = new URPDProfileIndicator();
    activeIndicators.set(urpd.id, urpd);
    await urpd.load();
  }
})();
