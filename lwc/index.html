<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BITCOINTERMINAL.NET (Indicator Framework)</title>
<link rel="preconnect" href="https://bitview.space" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&family=Roboto+Condensed:wght@700&display=swap">
<script src="https://unpkg.com/lightweight-charts@5.0.0/dist/lightweight-charts.standalone.production.js"></script>
<!-- html2canvas for PNG export. Loaded on first click via dynamic import to avoid up-front cost. -->
<script>
window.__loadHtml2canvas = function() {
  if (window.html2canvas) return Promise.resolve(window.html2canvas);
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload = () => resolve(window.html2canvas);
    s.onerror = () => reject(new Error("html2canvas failed to load"));
    document.head.appendChild(s);
  });
};
// mp4-muxer for WebCodecs MP4 encoding (lazy-loaded on first MP4 click)
window.__loadMp4Muxer = function() {
  if (window.Mp4Muxer) return Promise.resolve(window.Mp4Muxer);
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/mp4-muxer@5.2.1/build/mp4-muxer.min.js";
    s.onload = () => resolve(window.Mp4Muxer);
    s.onerror = () => reject(new Error("mp4-muxer failed to load"));
    document.head.appendChild(s);
  });
};
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; color: #d4d4d4;
    font-family: 'Source Code Pro', Consolas, monospace; font-size: 13px; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 12px;
    background: #000; flex-wrap: wrap; }
  /* Bottom toolbar — TradingView-style minimal status row */
  #bottom-toolbar { display: flex; align-items: center; gap: 4px; padding: 4px 10px;
    background: #000; border-top: 1px solid #1a1a1a; flex-wrap: wrap; flex-shrink: 0;
    font-size: 12px; color: #888; }
  #bottom-toolbar .spacer { flex: 1; }
  #bottom-toolbar .bb-sep { width: 1px; align-self: stretch; background: #1a1a1a; margin: 4px 4px; }
  /* Generic TV-style minimal button — transparent until hover */
  #bottom-toolbar .bb-btn { background: transparent; color: #d4d4d4; border: none;
    padding: 5px 9px; cursor: pointer; font-family: inherit; font-size: 12px;
    border-radius: 3px; transition: background-color 0.08s ease, color 0.08s ease; }
  #bottom-toolbar .bb-btn:hover { background: #1a1a1a; color: #fff; }
  /* Active state intentionally has no persistent fill — buttons only light
     up on hover. State is still tracked in JS so toggles work; we just
     don't render a "selected" badge for them. */
  #bottom-toolbar .bb-btn.active { background: transparent; color: #d4d4d4; }
  #bottom-toolbar .bb-btn.active:hover { background: #1a1a1a; color: #fff; }
  /* Lookback buttons share .bb-btn styling — keep them as a tight group */
  #bottom-toolbar #lb-group { display: inline-flex; gap: 0; }
  #bottom-toolbar #lb-group button { padding: 5px 9px; min-width: 32px; font-weight: 400; }
  /* Icon-only button (calendar / kebab) */
  #bottom-toolbar .bb-icon-btn { background: transparent; color: #d4d4d4; border: none;
    padding: 5px 7px; cursor: pointer; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background-color 0.08s ease, color 0.08s ease; }
  #bottom-toolbar .bb-icon-btn:hover { background: #1a1a1a; color: #fff; }
  #bottom-toolbar .bb-icon-btn svg { display: block; }
  /* UTC clock — monospace, dim, click to open timezone menu */
  #bottom-toolbar #tz-wrap { position: relative; }
  #bottom-toolbar #utc-clock { color: #888; font-variant-numeric: tabular-nums;
    padding: 5px 8px; cursor: pointer; background: transparent; border: none;
    font-family: inherit; font-size: 12px; border-radius: 3px;
    transition: background-color 0.08s ease, color 0.08s ease; }
  #bottom-toolbar #utc-clock:hover { background: #1a1a1a; color: #fff; }
  /* Timezone menu — pops above the clock, scrolls if it overflows */
  #bottom-toolbar #tz-menu { position: absolute; bottom: 100%; right: 0;
    margin-bottom: 4px; background: #111; border: 1px solid #2a2a2a;
    padding: 4px 0; min-width: 220px; max-height: 60vh; overflow-y: auto;
    z-index: 50; display: none; border-radius: 2px; }
  #bottom-toolbar #tz-menu.show { display: block; }
  #bottom-toolbar #tz-menu .opt { padding: 6px 12px 6px 28px; cursor: pointer;
    color: #d4d4d4; font-size: 12px; position: relative; white-space: nowrap; }
  #bottom-toolbar #tz-menu .opt:hover { background: #1a1a1a; }
  #bottom-toolbar #tz-menu .opt.active::before { content: "✓";
    position: absolute; left: 10px; color: #d4d4d4; }
  #bottom-toolbar #tz-menu .divider { border-top: 1px solid #1f1f1f; margin: 4px 0; }
  /* Cycle dropdown — minimal styled select to match the bar */
  #bottom-toolbar #cycle-select { background: transparent; color: #d4d4d4;
    border: none; padding: 5px 9px; font-family: inherit; font-size: 12px;
    cursor: pointer; border-radius: 3px;
    -webkit-appearance: none; -moz-appearance: none; appearance: none;
    transition: background-color 0.08s ease; }
  #bottom-toolbar #cycle-select:hover { background: #1a1a1a; color: #fff; }
  /* Hidden native date input — popped open by the calendar icon button */
  #bottom-toolbar #date-input { position: absolute; opacity: 0; pointer-events: none;
    width: 0; height: 0; }
  /* Scrub checkbox — compact label */
  #bottom-toolbar .bb-check { display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 8px; cursor: pointer; color: #888; user-select: none;
    border-radius: 3px; transition: background-color 0.08s ease, color 0.08s ease; }
  #bottom-toolbar .bb-check:hover { background: #1a1a1a; color: #fff; }
  #bottom-toolbar .bb-check input { vertical-align: middle; }
  /* Kebab "more" menu pop-up */
  #bottom-toolbar #export-wrap { position: relative; }
  #bottom-toolbar #export-menu { position: absolute; bottom: 100%; right: 0;
    margin-bottom: 4px; background: #111; border: 1px solid #2a2a2a;
    padding: 4px 0; min-width: 130px; z-index: 50; display: none; border-radius: 2px; }
  #bottom-toolbar #export-menu.show { display: block; }
  #bottom-toolbar #export-menu button { display: block; width: 100%; text-align: left;
    background: transparent; color: #d4d4d4; border: none; padding: 6px 12px;
    cursor: pointer; font-family: inherit; font-size: 12px; }
  #bottom-toolbar #export-menu button:hover { background: #1a1a1a; color: #fff; }
  /* Interval dropdown (top toolbar) — same Bloomberg minimal pattern as siblings */
  #interval-wrap { position: relative; display: inline-block; }
  #btn-interval { display: inline-flex; align-items: center; gap: 6px;
    background: transparent; color: #d4d4d4; border: none;
    padding: 7px 12px; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 400;
    border-radius: 3px; transition: background-color 0.08s ease; }
  #btn-interval:hover { background: #1a1a1a; color: #fff; }
  #btn-interval .arrow { color: #666; font-size: 9px; font-weight: 400; }
  /* Indicators button — text + icon, no fill until hover */
  #btn-add { display: inline-flex; align-items: center; gap: 6px; }
  #btn-add .ind-icon { display: inline-block; vertical-align: middle; color: inherit; }
  #interval-menu { position: absolute; top: 100%; left: 0; margin-top: 4px;
    background: #111; border: 1px solid #2a2a2a; padding: 4px 0; min-width: 110px;
    z-index: 50; display: none; }
  #interval-menu.show { display: block; }
  #interval-menu .opt { padding: 6px 12px; cursor: pointer; color: #d4d4d4; font-size: 12px; }
  #interval-menu .opt:hover { background: #1a1a1a; }
  #interval-menu .opt.active { background: #ff8c00; color: #0a0a0a; font-weight: 700; }

  /* Chart type dropdown — same pattern as interval, wider menu, icon button */
  #chart-type-wrap { position: relative; display: inline-block; }
  #btn-chart-type { display: inline-flex; align-items: center; justify-content: center;
    background: transparent; color: #d4d4d4; border: none;
    padding: 7px 10px; cursor: pointer; border-radius: 3px; transition: background-color 0.08s ease; }
  #btn-chart-type svg { width: 22px; height: 22px; }
  #btn-chart-type:hover { background: #1a1a1a; color: #fff; }
  #btn-chart-type svg { display: block; }
  #chart-type-menu { position: absolute; top: 100%; left: 0; margin-top: 4px;
    background: #111; border: 1px solid #2a2a2a; padding: 4px 0; min-width: 200px;
    z-index: 50; display: none; max-height: 70vh; overflow-y: auto; }
  #chart-type-menu.show { display: block; }
  #chart-type-menu .opt { display: flex; align-items: center; gap: 10px;
    padding: 6px 12px; cursor: pointer; color: #d4d4d4; font-size: 12px; }
  #chart-type-menu .opt:hover { background: #1a1a1a; }
  #chart-type-menu .opt.active { background: #fff; color: #000; }
  #chart-type-menu .opt svg { flex-shrink: 0; }
  #chart-type-menu .divider { border-top: 1px solid #1f1f1f; margin: 4px 0; }
  #toolbar .brand { color: #ff8c00; font-weight: 700; font-size: 17px;
    letter-spacing: 2px; margin-right: 14px; text-transform: uppercase;
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif; }
  #toolbar .spacer { flex: 1; }
  #toolbar input[type="date"] { background: #1a1a1a; color: #d4d4d4;
    border: 1px solid #2a2a2a; padding: 4px 8px; font-family: inherit; font-size: 12px; }
  #toolbar label { color: #888; font-size: 11px; }
  #toolbar input[type="checkbox"] { vertical-align: middle; }
  /* Top toolbar buttons — Bloomberg-style: transparent until hover */
  #toolbar button { background: transparent; color: #d4d4d4; border: none;
    padding: 7px 12px; cursor: pointer; font-family: inherit; font-size: 15px; border-radius: 3px;
    transition: background-color 0.08s ease; }
  #toolbar button:hover { background: #1a1a1a; color: #fff; }
  /* No "primary" treatment in this minimal toolbar */
  #toolbar button.primary { background: transparent; color: #d4d4d4; border: none; font-weight: 400; }
  #toolbar button.primary:hover { background: #1a1a1a; color: #fff; }
  /* Undo / Redo icon buttons */
  #toolbar button.icon-btn { padding: 7px 8px; display: inline-flex; align-items: center; justify-content: center; }
  #toolbar button.icon-btn svg { display: block; }
  #toolbar button.icon-btn:disabled { color: #444; cursor: default; background: transparent; }
  #toolbar button.icon-btn:disabled:hover { background: transparent; color: #444; }
  /* Lookback button group */
  /* (lookback button base styles now scoped under #bottom-toolbar above) */

  #chart-stack { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #chart-top-wrap { flex: 0 0 60%; position: relative; min-height: 80px; overflow: hidden; }
  #chart-bottom-wrap { flex: 1 1 0; position: relative; min-height: 80px; min-width: 0; overflow: hidden; }
  #chart-top, #chart-bottom { width: 100%; height: 100%; }
  /* Translucent BITCOINTERMINAL.NET watermark, centred behind every chart.
     Matches the previous Plotly site: Roboto Condensed (with Arial Narrow
     fallback), 4px letter-spacing, 15% white. pointer-events:none lets
     mouse interactions pass through to the canvas. z-index:1 keeps it
     above the chart background but below all overlays. */
  .chart-watermark { position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center; pointer-events: none;
    z-index: 1; font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255, 255, 255, 0.15); white-space: nowrap;
    user-select: none; overflow: hidden; }
  #chart-top-wrap     .chart-watermark { font-size: clamp(28px, 4.5vw, 56px); }
  #chart-bottom-wrap  .chart-watermark { font-size: clamp(22px, 3.6vw, 44px); }
  /* Shared global time axis — sits below the chart stack, above bottom toolbar.
     A single thin border separates it from the histogram pane above so the
     two X-axes don't run into each other visually. The URPD/SOPD's own
     price axis remains inside the indicator pane. */
  #chart-time-axis { flex: 0 0 28px; background: #000; flex-shrink: 0;
    border-top: 1px solid #222; }
  /* Draggable splitter — seamless 1px line at rest, lights up on hover/drag.
     5px hit area; the visible line sits in the middle via a ::before
     pseudo-element so the actual divider element can stay transparent and
     just paint blue when active. */
  #chart-divider { flex: 0 0 5px; position: relative; cursor: row-resize;
    background: transparent; z-index: 10; touch-action: none;
    transition: background 0.08s ease; }
  #chart-divider::before { content: ""; position: absolute; left: 0; right: 0;
    top: 50%; transform: translateY(-50%); height: 1px; background: #222;
    pointer-events: none; transition: background 0.08s ease; }
  #chart-divider:hover { background: #ff8c00; }
  #chart-divider:hover::before { background: #ff8c00; }
  #chart-divider.is-dragging { background: #ff8c00; }
  #chart-divider.is-dragging::before { background: #ff8c00; }
  /* While dragging, prevent text selection and force the resize cursor everywhere. */
  body.is-resizing-pane { user-select: none; cursor: row-resize !important; }
  body.is-resizing-pane * { cursor: row-resize !important; pointer-events: none; }
  body.is-resizing-pane #chart-divider { pointer-events: auto; }
  /* Suppress the TradingView attribution logo even if the layout option leaves
     it in the DOM. Targets all selector variants LWC has used across versions. */
  #chart-top a[href*="tradingview"],
  #chart-bottom a[href*="tradingview"],
  #chart-top [id*="tv-attr"],
  #chart-bottom [id*="tv-attr"] { display: none !important; }

  /* Click-locked date tracer — a small dot that sits on the BTC price line
     at the locked date. Slides along the price line as you navigate. */
  #date-tracer { position: absolute; width: 12px; height: 12px;
    margin-left: -6px; margin-top: -6px; border-radius: 50%;
    background: #ff8c00; border: 2px solid #fff; box-sizing: border-box;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.55), 0 0 6px rgba(255,140,0,0.45);
    cursor: pointer; pointer-events: auto; z-index: 6;
    display: none; }
  #date-tracer.show { display: block; }
  #date-tracer .line { display: none; }
  /* Keyboard-nav instruction — sits inline inside the bottom-pane label,
     just below the URPD/SOPD indicator rows. Hidden by default; shown
     while the click-locked tracer is active. */
  #nav-instruction { display: none; color: #888; font-size: 12px;
    margin-top: 4px; padding-left: 14px; }
  #nav-instruction.show { display: block; }
  #nav-instruction kbd { background: #0a0a0a; border: 1px solid #444;
    border-radius: 2px; padding: 1px 5px; font-family: inherit;
    font-size: 10px; color: #d4d4d4; margin: 0 1px; }

  /* Pane label — floats INSIDE the chart at top-left, TradingView-style.
     Sits on top of the chart canvas via absolute positioning, not a header bar. */
  .pane-label { position: absolute; top: 8px; left: 12px; z-index: 4;
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    pointer-events: none;
    font-size: 15px; color: #888; max-width: calc(100% - 80px); }
  .pane-label .pane-title-row { display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pane-label .pane-title { color: #d4d4d4; font-weight: 400; letter-spacing: 0.3px;
    display: inline-flex; align-items: center; gap: 5px; }
  .pane-label .pane-title .sep { color: #555; font-weight: 400; }
  .pane-label .pane-title .source { color: #d4d4d4; }
  .pane-label .ind-badge { display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 6px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 2px; font-size: 10px; line-height: 1.3; }
  .pane-label .ind-badge .dot { width: 7px; height: 7px; border-radius: 1px; flex-shrink: 0; }
  .pane-label .ind-badge .ind-label { color: #d4d4d4; }
  /* Hover OHLC-style readout — price + change at the hovered date */
  .pane-label .hover-readout { display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; padding-left: 4px; }
  .pane-label .hover-readout .price { color: #d4d4d4; font-weight: 700; }
  .pane-label .hover-readout .change-up { color: #2ecc71; }
  .pane-label .hover-readout .change-down { color: #ff5c5c; }

  /* Per-indicator rows below the pane title — TradingView-style with hover actions. */
  .ind-rows { display: flex; flex-direction: column; gap: 2px; }
  .ind-row { display: inline-flex; align-items: center; gap: 6px; pointer-events: auto;
    font-size: 13px; line-height: 1.4; padding: 0; }
  .ind-row .swatch { width: 8px; height: 8px; border-radius: 1px; flex-shrink: 0; }
  .ind-row .name { color: #d4d4d4; }
  .ind-row.is-hidden .name, .ind-row.is-hidden .swatch { opacity: 0.4; }
  .ind-row .actions { display: none; gap: 2px; margin-left: 4px; align-items: center; }
  .ind-row:hover .actions { display: inline-flex; }
  .ind-row .act-btn { background: rgba(20,20,20,0.85); border: 1px solid rgba(255,255,255,0.08);
    color: #d4d4d4; cursor: pointer; padding: 2px 5px; border-radius: 2px;
    font-size: 11px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .ind-row .act-btn:hover { background: #2a2a2a; color: #fff; border-color: rgba(255,255,255,0.18); }
  .ind-row .act-btn svg { display: block; }

  #status { position: absolute; bottom: 6px; left: 14px; color: #666; font-size: 11px; pointer-events: none; }

  /* Stats stack — hidden by default. Stat boxes are shown only as a hover
     tooltip near the cursor when the user hovers over a histogram bar.
     Boxes are positioned absolutely inside the bottom-pane wrap and lifted
     into "tooltip mode" via the .as-tooltip class on the parent stack. */
  #stats-stack { position: absolute; display: none;
    flex-direction: column; gap: 6px; z-index: 12; pointer-events: none;
    max-width: 280px; }
  #stats-stack.show { display: flex; }
  .stat-box { background: rgba(0,0,0,0.92); border: 1px solid #2a2a2a;
    padding: 6px 8px; font-size: 11px; line-height: 1.5; min-width: 220px;
    border-radius: 2px; }
  .stat-box .label { color: #888; }
  .stat-box .value { color: #fff; }
  .stat-box .profit { color: #2ecc71; }
  .stat-box .loss { color: #ff5c5c; }
  .stat-box .title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .stat-box .title-row .swatch { width: 8px; height: 8px; border-radius: 1px; }
  .stat-box .title-row .name { color: #ff8c00; font-weight: 700; flex: 1; }
  .stat-box .title-row .date { color: #d4d4d4; font-size: 10px; }


  /* ─────────────────────────────────────────────────────────────────────
   * Mobile responsiveness — viewports ≤768px wide.
   * Goals: toolbar fits on multiple wrapped lines without overflow,
   * touch-friendly hit targets, stat boxes don't dominate the chart,
   * indicator panel relocates so it doesn't cover the histogram.
   * ───────────────────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    body { font-size: 12px; }
    #toolbar { padding: 6px 8px; gap: 6px; }
    #toolbar .brand { font-size: 12px; }
    #toolbar button, #toolbar select, #toolbar input[type="date"] { font-size: 11px; padding: 6px 8px; }
    #lb-group button { min-width: 30px; padding: 5px 4px; }
    /* Top chart shrinks slightly so the histogram has more room */
    #chart-top-wrap { flex: 0 0 50%; }
    /* Stat tooltip: smaller on mobile */
    #stats-stack { max-width: 240px; gap: 4px; }
    .stat-box { font-size: 10px; padding: 5px 6px; min-width: 0; max-width: 100%; }
    #status { font-size: 10px; }
    /* Modal: full-width on mobile */
    #modal { min-width: 0; width: calc(100vw - 24px); padding: 12px; }
  }
  @media (max-width: 480px) {
    /* Smallest phones: even tighter */
    #toolbar { padding: 4px 6px; gap: 4px; }
    #toolbar button, #toolbar select { font-size: 10px; padding: 5px 6px; }
  }

  /* Add-indicator modal */
  #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: none; align-items: center; justify-content: center; }
  #modal-bg.show { display: flex; }
  #modal { background: #111; border: 1px solid #2a2a2a; min-width: 460px; max-width: 90vw;
    max-height: 80vh; display: flex; flex-direction: column; }
  /* Modal header — title + X close button */
  #modal .modal-header { display: flex; align-items: center; padding: 14px 18px 10px;
    border-bottom: 1px solid #1f1f1f; flex-shrink: 0; }
  #modal h3 { color: #d4d4d4; font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
    margin: 0; flex: 1; }
  #modal .modal-x { background: none; border: none; color: #888; font-size: 20px;
    cursor: pointer; padding: 0 4px; line-height: 1; }
  #modal .modal-x:hover { color: #fff; }
  /* Modal search bar */
  #modal .modal-search { padding: 10px 18px; border-bottom: 1px solid #1f1f1f; flex-shrink: 0;
    position: relative; }
  #modal .modal-search input { width: 100%; background: #0a0a0a; color: #d4d4d4;
    border: 1px solid #2a2a2a; padding: 8px 10px; font-family: inherit; font-size: 13px;
    border-radius: 2px; }
  #modal .modal-search input::placeholder { color: #888; }
  /* Modal scrollable body */
  #modal .modal-body { padding: 8px 0; overflow-y: auto; flex: 1; min-height: 200px; }
  #modal .section-title { color: #888; font-size: 10px; padding: 8px 18px 4px;
    text-transform: uppercase; letter-spacing: 0.5px; }
  #modal .ind-option { display: flex; align-items: center; gap: 10px; padding: 7px 18px;
    cursor: pointer; }
  #modal .ind-option:hover { background: #1a1a1a; }
  #modal .ind-option .swatch { width: 8px; height: 8px; border-radius: 1px; flex-shrink: 0; }
  #modal .ind-option .name { color: #d4d4d4; flex: 1; font-size: 13px; }
  #modal .ind-option .pane-tag { color: #555; font-size: 10px; }
  /* Already-added rows: dim by default with a grey "Added" tag. Hovering
     re-brightens the row and the tag flips to a red "Remove" — clicking
     removes that indicator from the chart in place, without closing the
     picker so users can keep editing. */
  #modal .ind-option.is-added { cursor: pointer; opacity: 0.45; }
  #modal .ind-option.is-added:hover { background: #1a1a1a; opacity: 0.95; }
  #modal .ind-option .added-tag {

<script>
"use strict";

const BASE = "https://bitview.space";
const PRICE_EPOCH_DATE = new Date(2009, 0, 3);

const THEME = {
  background: "#000", text: "#d4d4d4", grid: "rgba(255,255,255,0.05)", border: "#222",
  crosshair: "rgba(255,140,0,0.9)", priceLine: "rgba(255,255,255,0.85)",
  spot: "#ff8c00", profit: "#2ecc71", loss: "#e74c3c",
  // `mean` = MEAN_COLOR from the previous Plotly site (rp.js: #00e676).
  // Used for: Realised Price (top-pane line), Realised Price in Profit,
  // and Realised Price in Loss — all three share this single colour, with
  // the in-Profit/in-Loss distinction conveyed by line style (solid vs
  // dashed), not hue.
  mean: "#00e676",
  // LTH / STH match the previous Plotly site (rp.js: LTH_COLOR / STH_COLOR).
  // Used for: LTH/STH Realised Price (top-pane lines) AND all 8 LTH/STH
  // Realised-Price-in-Profit/Loss filtered variants (BTC + USD weighted).
  cyan: "#00d4ff", lth: "#5599ff", sth: "#e6a817", magenta: "#d94fff", yellow: "#ffd34f",
};

// ───────────────────────────────────────────────────────────────────────────
// Charts
// ───────────────────────────────────────────────────────────────────────────
const topContainer = document.getElementById("chart-top");
const bottomContainer = document.getElementById("chart-bottom");

// Compact price formatter — 3 significant figures with K/M/B suffixes,
// so the right-axis labels stay narrow and the charts get more horizontal
// space for the data. Used by both the top and bottom chart's price scales.
function shortPriceFormat(p) {
  if (typeof p !== "number" || !isFinite(p)) return String(p);
  if (p === 0) return "0";
  const sign = p < 0 ? "-" : "";
  const abs = Math.abs(p);
  if (abs >= 1e9) {
    if (abs >= 1e11) return sign + Math.round(abs / 1e9) + "B";
    if (abs >= 1e10) return sign + (abs / 1e9).toFixed(1) + "B";
    return sign + (abs / 1e9).toFixed(2) + "B";
  }
  if (abs >= 1e6) {
    if (abs >= 1e8) return sign + Math.round(abs / 1e6) + "M";
    if (abs >= 1e7) return sign + (abs / 1e6).toFixed(1) + "M";
    return sign + (abs / 1e6).toFixed(2) + "M";
  }
  if (abs >= 1e3) {
    if (abs >= 1e5) return sign + Math.round(abs / 1e3) + "K";
    if (abs >= 1e4) return sign + (abs / 1e3).toFixed(1) + "K";
    return sign + (abs / 1e3).toFixed(2) + "K";
  }
  if (abs >= 100) return sign + Math.round(abs).toString();
  if (abs >= 10)  return sign + abs.toFixed(1);
  if (abs >= 1)   return sign + abs.toFixed(2);
  return sign + abs.toFixed(3);
}

function commonChartOpts() {
  return {
    layout: { background: { type: "solid", color: THEME.background }, textColor: THEME.text,
      fontFamily: "'Source Code Pro', Consolas, monospace", fontSize: 11,
      attributionLogo: false },
    grid: { vertLines: { color: THEME.grid }, horzLines: { color: THEME.grid } },
    rightPriceScale: { borderColor: THEME.border },
    // Explicitly hide the left price scale so all charts share the same
    // (zero-width) left gutter and their left edges align.
    leftPriceScale: { visible: false },
    timeScale: { borderColor: THEME.border, timeVisible: false, secondsVisible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: THEME.crosshair, width: 1, style: LightweightCharts.LineStyle.Dotted },
      horzLine: { color: THEME.crosshair, width: 1, style: LightweightCharts.LineStyle.Dotted } },
    localization: { priceFormatter: shortPriceFormat },
  };
}

const topChart = LightweightCharts.createChart(topContainer, Object.assign(commonChartOpts(), {
  rightPriceScale: { borderColor: THEME.border, mode: LightweightCharts.PriceScaleMode.Normal, autoScale: true },
  // Hide the top chart's time axis — it's rendered in the shared #chart-time-axis below.
  // rightOffset: 0 — the latest data point sits AT the right axis. With a
  // non-zero offset there's an empty strip between the line tip and the
  // right-side label, which the user wanted to eliminate (see "i want the
  // lines chain tip to be dotted to their labels"). Zero offset is simpler
  // than overlay leader lines and matches what the labels expect.
  timeScale: { borderColor: THEME.border, timeVisible: false, secondsVisible: false,
    rightOffset: 0, barSpacing: 2, visible: false },
}));

// Shared global time axis — minimal LWC chart that only renders date labels.
// It's a passive label strip: scroll/scale are DISABLED so the user can't
// accidentally collapse it to a tiny range and sync that back into the main
// chart. The sync is also one-way (top → axis) for the same reason.
const timeAxisContainer = document.getElementById("chart-time-axis");
const timeAxisChart = LightweightCharts.createChart(timeAxisContainer, {
  layout: { background: { type: "solid", color: THEME.background }, textColor: THEME.text,
    fontFamily: "'Source Code Pro', Consolas, monospace", fontSize: 11,
    attributionLogo: false },
  grid:  { vertLines: { visible: false }, horzLines: { visible: false } },
  // Right scale is "visible" but blank — we keep it on so the time-axis
  // chart reserves the same right-edge gutter width as top/bottom, so
  // their right edges align. ticksVisible:false hides the tick marks,
  // and the inline series has lastValueVisible:false so no number prints.
  rightPriceScale: { visible: true, borderVisible: false, ticksVisible: false,
    entireTextOnly: true, scaleMargins: { top: 0, bottom: 0 } },
  leftPriceScale:  { visible: false },
  // rightOffset: 0 to stay in sync with topChart (so the date labels
  // line up vertically with the data points above them).
  timeScale: { borderVisible: false, timeVisible: false, secondsVisible: false,
    rightOffset: 0, barSpacing: 2, visible: true, fixLeftEdge: false, fixRightEdge: false },
  crosshair: { mode: LightweightCharts.CrosshairMode.Hidden,
    vertLine: { visible: false }, horzLine: { visible: false } },
  handleScroll: false,
  handleScale:  false,
});

const bottomChart = LightweightCharts.createChart(bottomContainer, Object.assign(commonChartOpts(), {
  rightPriceScale: { borderColor: THEME.border, autoScale: true, scaleMargins: { top: 0.05, bottom: 0.05 } },
  timeScale: {
    borderColor: THEME.border, timeVisible: false, secondsVisible: false,
    rightOffset: 0, barSpacing: 4,
    tickMarkFormatter: (time) => {
      // X-axis (cost-basis) labels only show while nav mode is active.
      // Outside nav mode the histogram is empty and we don't want stray
      // "$0 / $125K" ticks below it.
      if (typeof _navMode !== "undefined" && !_navMode) return "";
      const v = typeof time === "number" ? time : 0;
      if (v <= 0)         return `$0`;
      if (v >= 1_000_000) return `$${(v/1_000_000).toFixed(1)}M`;
      if (v >= 1_000)     return `$${Math.round(v/1_000)}K`;
      if (v >= 1)         return `$${v.toFixed(0)}`;
      return `$${v.toFixed(2)}`;
    },
  },
  // Crosshair labels are enabled — the floating "cost basis $X" tag on
  // the X-axis and the weight tag on the Y-axis appear when the cursor
  // is over the chart, so the user can read off both axes by hovering.
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal,
    vertLine: { color: THEME.crosshair, width: 1,
      style: LightweightCharts.LineStyle.Dotted, labelVisible: true },
    horzLine: { color: THEME.crosshair, width: 1,
      style: LightweightCharts.LineStyle.Dotted, labelVisible: true } },
  localization: {
    priceFormatter: shortPriceFormat,
    timeFormatter: (time) => `cost basis $${Math.round(time).toLocaleString()}`,
  },
}));

function syncSizes() {
  topChart.applyOptions({ width: topContainer.clientWidth, height: topContainer.clientHeight });
  bottomChart.applyOptions({ width: bottomContainer.clientWidth, height: bottomContainer.clientHeight });
  if (timeAxisChart && typeof timeAxisChart.resize === "function") {
    timeAxisChart.resize(timeAxisContainer.clientWidth, timeAxisContainer.clientHeight);
  }
}

// Force the top + bottom + time-axis charts to share the same right-axis
// width so their right edges align cleanly. LWC sizes the price scale
// based on the widest tick label by default, which means a chart with
// big numbers (URPD bars in the millions) will indent more than the
// price chart. minimumWidth pads the narrower scale up to match.
const RIGHT_SCALE_MIN_WIDTH = 80;
function alignRightScales() {
  try { topChart.priceScale("right").applyOptions({ minimumWidth: RIGHT_SCALE_MIN_WIDTH }); } catch (e) {}
  try { bottomChart.priceScale("right").applyOptions({ minimumWidth: RIGHT_SCALE_MIN_WIDTH }); } catch (e) {}
  try { timeAxisChart.priceScale("right").applyOptions({ minimumWidth: RIGHT_SCALE_MIN_WIDTH }); } catch (e) {}
}
alignRightScales();
window.addEventListener("resize", syncSizes);

// ─── Time-axis sync ────────────────────────────────────────────────────────
// The time-axis chart needs an invisible series so its time scale renders
// labels. After BTC data loads, populate it. Then sync visible-range with
// the top chart bidirectionally so panning/zooming on either updates both.
let _timeAxisSeries = null;
let _syncing = false;
function ensureTimeAxisSeries() {
  if (_timeAxisSeries) return;
  try {
    _timeAxisSeries = timeAxisChart.addSeries(LightweightCharts.LineSeries, {
      color: "rgba(0,0,0,0)", lineWidth: 1, lastValueVisible: false,
      priceLineVisible: false, crosshairMarkerVisible: false,
    });
  } catch (e) { console.warn("timeAxis: addSeries", e); }
}
function setTimeAxisData(linePts) {
  ensureTimeAxisSeries();
  if (!_timeAxisSeries) return;
  try { _timeAxisSeries.setData(linePts); } catch (e) {}
  try {
    const r = topChart.timeScale().getVisibleRange();
    if (r) timeAxisChart.timeScale().setVisibleRange(r);
    else timeAxisChart.timeScale().fitContent();
  } catch (e) {}
}
// One-way sync only: top chart → time-axis label strip. The reverse direction
// is intentionally absent so the axis strip can never alter the main chart.
topChart.timeScale().subscribeVisibleTimeRangeChange((range) => {
  if (!range || _syncing) return;
  _syncing = true;
  try { timeAxisChart.timeScale().setVisibleRange(range); } catch (e) {}
  _syncing = false;
});
// Orientation change on mobile: fires after the visual viewport has settled
window.addEventListener("orientationchange", () => setTimeout(syncSizes, 200));
syncSizes();

// ───────────────────────────────────────────────────────────────────────────
// Data layer
// ───────────────────────────────────────────────────────────────────────────
let priceArray = null;
let priceDateStrs = null;
const urpdCache = new Map();
const inflight = new Map();

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error("fetch " + url + " → " + r.status);
  return r.json();
}
function indexToDateStr(i) {
  const d = new Date(PRICE_EPOCH_DATE);
  d.setDate(d.getDate() + i);
  return d.toISOString().slice(0, 10);
}
function getSpotForDate(dateStr) {
  if (!priceDateStrs) return null;
  const idx = priceDateStrs.indexOf(dateStr);
  if (idx < 0) return null;
  return priceArray[idx];
}
async function getURPDCohort(dateStr, cohort /* "all" | "lth" | "sth" */) {
  const key = cohort + ":" + dateStr;
  if (urpdCache.has(key)) return urpdCache.get(key);
  if (inflight.has(key)) return inflight.get(key);
  const p = (async () => {
    const resp = await fetchJSON(BASE + "/api/urpd/" + cohort + "/" + dateStr);
    urpdCache.set(key, resp);
    inflight.delete(key);
    return resp;
  })();
  inflight.set(key, p);
  return p;
}
const getURPD = (d) => getURPDCohort(d, "all"); // back-compat shorthand

// ───────────────────────────────────────────────────────────────────────────
// Realised-price filtered means — supply- and USD-weighted means of URPD
// bins, split by spot price (in-Profit: p ≤ spot, in-Loss: p > spot).
// Mirrors `computeMeanFromBuckets` in rp.js (line 995). Returns one object
// per call so all four BTC/USD × profit/loss variants share the same pass
// over the buckets.
// ───────────────────────────────────────────────────────────────────────────
function computeMeansFromBuckets(buckets, spot) {
  let nBTC = 0, dBTC = 0, nUSD = 0, dUSD = 0;
  let nBP = 0, dBP = 0, nUP = 0, dUP = 0;
  let nBL = 0, dBL = 0, nUL = 0, dUL = 0;
  const useSpot = (typeof spot === "number" && spot > 0);
  for (let i = 0; i < buckets.length; i++) {
    const b = buckets[i];
    const p = b.price_floor;
    const s = b.supply || 0;
    const r = b.realized_cap || 0;
    nBTC += p * s; dBTC += s;
    nUSD += p * r; dUSD += r;
    if (useSpot) {
      if (p <= spot) {
        nBP += p * s; dBP += s;
        nUP += p * r; dUP += r;
      } else {
        nBL += p * s; dBL += s;
        nUL += p * r; dUL += r;
      }
    }
  }
  return {
    btc: dBTC > 0 ? nBTC / dBTC : null,
    usd: dUSD > 0 ? nUSD / dUSD : null,
    btcProfit: dBP > 0 ? nBP / dBP : null,
    btcLoss:   dBL > 0 ? nBL / dBL : null,
    usdProfit: dUP > 0 ? nUP / dUP : null,
    usdLoss:   dUL > 0 ? nUL / dUL : null,
  };
}

// ───────────────────────────────────────────────────────────────────────────
// Sampling strategy for realised-price filtered time series — last 30 days
// at 1-day step (matches the URPD histogram precisely), older history at
// 14-day step (smoother visual, dramatically less API load — running a 1-day
// step on full history hammers bitview.space and triggers QUIC errors that
// corrupt the recent endpoint values, mirroring rp.js's experience).
// Re-uses priceDateStrs as the date universe.
// ───────────────────────────────────────────────────────────────────────────
// 5-bin moving average — verbatim port of the SMOOTH_WINDOW=5 smoother
// in rp.js (line 818). Without this, the URPD histograms render with
// visible "spikes" in sparse-data regions where a few non-zero bins are
// surrounded by empty ones; the moving average bleeds each bin's value
// into its neighbours so the histogram reads as a continuous distribution
// the way the previous Plotly version did.
const URPD_SMOOTH_WINDOW = 5;
function _smoothBins(values) {
  const half = Math.floor(URPD_SMOOTH_WINDOW / 2);
  const result = new Array(values.length);
  for (let i = 0; i < values.length; i++) {
    const lo = Math.max(0, i - half);
    const hi = Math.min(values.length, i + half + 1);
    let sum = 0;
    for (let j = lo; j < hi; j++) sum += values[j];
    result[i] = sum / (hi - lo);
  }
  return result;
}

function _rpFilteredSampleDates() {
  if (!priceDateStrs || priceDateStrs.length === 0) return [];
  const RECENT_STEP = 1;
  const HISTORY_STEP = 14;
  const RECENT_DAYS = 30;
  const N = priceDateStrs.length;
  const recentStart = Math.max(0, N - RECENT_DAYS);
  const samples = [];
  for (let i = 0; i < recentStart; i += HISTORY_STEP) samples.push(priceDateStrs[i]);
  for (let i = recentStart; i < N; i += RECENT_STEP)  samples.push(priceDateStrs[i]);
  if (samples[samples.length - 1] !== priceDateStrs[N - 1]) samples.push(priceDateStrs[N - 1]);
  return samples;
}

// One Promise per cohort — all four BTC/USD × profit/loss indicator variants
// of a cohort share the same fetch+compute pass. The first variant added
// kicks off the heavy work (~400 URPDs, batched 8 at a time); siblings
// `await` the same Promise and use the cached result instantly.
const _rpFilteredTSPromise = new Map();
async function buildRPFilteredTS(cohort) {
  if (_rpFilteredTSPromise.has(cohort)) return _rpFilteredTSPromise.get(cohort);
  const p = (async () => {
    const sampleDates = _rpFilteredSampleDates();
    // Track the unfiltered btc/usd means too — used by the USD-weighted
    // realised-price line indicators (BRK only exposes BTC-supply-weighted
    // realised price as a precomputed series, so the USD version has to
    // be computed from URPD bins per sample date, same path as the filtered
    // means). Sharing one fetch pass means asking for "Realised Price (USD)"
    // doesn't duplicate any work the filtered indicators already did.
    const out = {
      dates: [],
      btc: [], usd: [],
      btcProfit: [], btcLoss: [], usdProfit: [], usdLoss: [],
    };
    const BATCH = 8;
    const status = document.getElementById("status");
    let done = 0;
    for (let bi = 0; bi < sampleDates.length; bi += BATCH) {
      const batch = sampleDates.slice(bi, bi + BATCH);
      const resps = await Promise.all(
        batch.map(d => getURPDCohort(d, cohort).catch(() => null))
      );
      for (let i = 0; i < resps.length; i++) {
        const resp = resps[i];
        const date = batch[i];
        const spot = getSpotForDate(date);
        if (!resp || !resp.buckets || resp.buckets.length === 0 || !spot) {
          out.dates.push(date);
          out.btc.push(null); out.usd.push(null);
          out.btcProfit.push(null); out.btcLoss.push(null);
          out.usdProfit.push(null); out.usdLoss.push(null);
          continue;
        }
        const m = computeMeansFromBuckets(resp.buckets, spot);
        out.dates.push(date);
        out.btc.push(m.btc); out.usd.push(m.usd);
        out.btcProfit.push(m.btcProfit); out.btcLoss.push(m.btcLoss);
        out.usdProfit.push(m.usdProfit); out.usdLoss.push(m.usdLoss);
      }
      done += batch.length;
      if (status) status.textContent =
        `Building ${cohort.toUpperCase()} realised-price filtered TS… ${done}/${sampleDates.length}`;
    }
    if (status) status.textContent = `${cohort.toUpperCase()} realised-price filtered TS ready (${sampleDates.length} pts)`;
    return out;
  })();
  _rpFilteredTSPromise.set(cohort, p);
  return p;
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator base class — every indicator owns LWC series and a config
// ───────────────────────────────────────────────────────────────────────────
class Indicator {
  static type = "base";
  static displayName = "Base";
  static pane = "top"; // "top" or "bottom"
  static configSchema = []; // [{key, label, type, options?, default}, ...]

  constructor(config = {}) {
    this.id = "ind_" + Math.random().toString(36).slice(2, 9);
    this.config = Object.assign({}, this.defaultConfig(), config);
    this.series = [];
    this.priceLines = [];
    this.disposed = false;
    this.visible = true;
  }
  defaultConfig() {
    const out = {};
    for (const f of this.constructor.configSchema) out[f.key] = f.default;
    return out;
  }
  pane() { return this.constructor.pane; }
  chart() { return this.pane() === "top" ? topChart : bottomChart; }
  displayName() { return this.constructor.displayName; }
  swatchColor() { return this.config.color || THEME.cyan; }
  // Subclasses override
  async load() { throw new Error("not implemented"); }
  // Some indicators need to update when the date changes (URPD profile etc.)
  onDateChange(dateStr) {}
  // Toggle the rendered visibility of all owned series. Doesn't remove the
  // indicator — it can be re-shown via setVisible(true). Subclasses that draw
  // via price lines or other non-series mechanisms should override this.
  setVisible(v) {
    this.visible = !!v;
    for (const s of this.series) {
      try { s.applyOptions({ visible: this.visible }); } catch (e) {}
    }
  }
  toggleVisible() { this.setVisible(!this.visible); }
  remove() {
    if (this.disposed) return;
    for (const s of this.series) {
      try { this.chart().removeSeries(s); } catch (e) {}
    }
    // Price lines on a series die with the series
    this.series = [];
    this.priceLines = [];
    this.disposed = true;
  }
}

// Indicator: BTC Price — always present, always first
// ───────────────────────────────────────────────────────────────────────────
class BTCPriceIndicator extends Indicator {
  static type = "btc_price";
  static displayName = "BTC/USD";
  static pane = "top";
  static configSchema = [];

  async load() {
    const chartType = currentChartType || "line";
    const series = createBTCPriceSeries(chartType);
    this.series.push(series);
    this._priceSeries = series;
    topChart.timeScale().fitContent();
    // Mirror the BTC dates into the shared time-axis chart so the bottom
    // strip below the URPD pane shows years/months synced with the price chart.
    try {
      const linePts = priceArray.map((c, i) => ({ time: priceDateStrs[i], value: c }));
      setTimeAxisData(linePts);
    } catch (e) { console.warn("timeAxis seed:", e); }
  }
  swatchColor() { return THEME.priceLine; }
  getPriceSeries() { return this._priceSeries; }
}

// Build a series for the given chart type using the loaded daily close array.
// BRK only exposes daily closes, so OHLC types get synthesized OHLC where each
// bar's open = previous close (a minimal but valid OHLC). Heikin Ashi runs the
// standard recursive formula over the same synthesized data.
function createBTCPriceSeries(chartType) {
  const closes = priceArray;
  const dates = priceDateStrs;
  const linePts = [];
  const ohlcPts = [];
  const hasData = (i) => typeof closes[i] === "number" && closes[i] > 0;

  for (let i = 0; i < closes.length; i++) {
    if (!hasData(i)) continue;
    linePts.push({ time: dates[i], value: closes[i] });
  }
  function pushOHLC() {
    let prev = null;
    for (let i = 0; i < closes.length; i++) {
      if (!hasData(i)) continue;
      const c = closes[i];
      const o = (prev !== null) ? prev : c;
      ohlcPts.push({ time: dates[i], open: o, high: Math.max(o, c), low: Math.min(o, c), close: c });
      prev = c;
    }
  }
  function pushHA() {
    let prev = null, haPrevOpen = null, haPrevClose = null;
    for (let i = 0; i < closes.length; i++) {
      if (!hasData(i)) continue;
      const c = closes[i];
      const o = (prev !== null) ? prev : c;
      const h = Math.max(o, c), l = Math.min(o, c);
      const haClose = (o + h + l + c) / 4;
      const haOpen = (haPrevOpen === null) ? (o + c) / 2 : (haPrevOpen + haPrevClose) / 2;
      const haHigh = Math.max(h, haOpen, haClose);
      const haLow  = Math.min(l, haOpen, haClose);
      ohlcPts.push({ time: dates[i], open: haOpen, high: haHigh, low: haLow, close: haClose });
      haPrevOpen = haOpen; haPrevClose = haClose; prev = c;
    }
  }

  const baseOpts = { priceLineVisible: false, lastValueVisible: true, title: "BTC/USD" };
  let series;
  switch (chartType) {
    case "line":
      series = topChart.addSeries(LightweightCharts.LineSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, lineWidth: 2 }));
      series.setData(linePts);
      break;
    case "step":
      series = topChart.addSeries(LightweightCharts.LineSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, lineWidth: 2,
          lineType: LightweightCharts.LineType.WithSteps }));
      series.setData(linePts);
      break;
    case "line_markers": {
      series = topChart.addSeries(LightweightCharts.LineSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, lineWidth: 2 }));
      series.setData(linePts);
      // Markers every ~Nth point so we don't overwhelm the chart at 6K points
      const stride = Math.max(1, Math.floor(linePts.length / 60));
      const markers = [];
      for (let i = 0; i < linePts.length; i += stride) {
        markers.push({ time: linePts[i].time, position: "inBar",
          color: THEME.priceLine, shape: "circle", size: 0.8 });
      }
      try { series.setMarkers(markers); } catch (e) { /* v5 markers API quirks */ }
      break;
    }
    case "area":
      series = topChart.addSeries(LightweightCharts.AreaSeries,
        Object.assign({}, baseOpts, {
          lineColor: THEME.priceLine, lineWidth: 2,
          topColor: "rgba(255,255,255,0.35)", bottomColor: "rgba(255,255,255,0.02)",
        }));
      series.setData(linePts);
      break;
    case "hlc_area":
      // No native LWC HLC area series. Render as area, label clarifies behaviour.
      series = topChart.addSeries(LightweightCharts.AreaSeries,
        Object.assign({}, baseOpts, {
          title: "BTC/USD (HLC≈Area, single-value approx)",
          lineColor: THEME.cyan, lineWidth: 2,
          topColor: "rgba(0,212,255,0.30)", bottomColor: "rgba(0,212,255,0.02)",
        }));
      series.setData(linePts);
      break;
    case "baseline": {
      // Baseline at the median close so positive/negative regions are balanced
      const sorted = linePts.map(p => p.value).sort((a, b) => a - b);
      const median = sorted.length ? sorted[Math.floor(sorted.length / 2)] : 0;
      series = topChart.addSeries(LightweightCharts.BaselineSeries,
        Object.assign({}, baseOpts, {
          baseValue: { type: "price", price: median }, lineWidth: 2,
          topLineColor: THEME.profit, bottomLineColor: THEME.loss,
          topFillColor1: "rgba(46,204,113,0.30)", topFillColor2: "rgba(46,204,113,0.02)",
          bottomFillColor1: "rgba(255,92,92,0.02)", bottomFillColor2: "rgba(255,92,92,0.30)",
        }));
      series.setData(linePts);
      break;
    }
    case "columns":
      series = topChart.addSeries(LightweightCharts.HistogramSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, base: 0 }));
      series.setData(linePts);
      break;
    case "bars":
      pushOHLC();
      series = topChart.addSeries(LightweightCharts.BarSeries,
        Object.assign({}, baseOpts, {
          upColor: THEME.profit, downColor: THEME.loss, openVisible: true, thinBars: false,
        }));
      series.setData(ohlcPts);
      break;
    case "candles":
      pushOHLC();
      series = topChart.addSeries(LightweightCharts.CandlestickSeries,
        Object.assign({}, baseOpts, {
          upColor: THEME.profit, downColor: THEME.loss,
          borderUpColor: THEME.profit, borderDownColor: THEME.loss,
          wickUpColor: THEME.profit, wickDownColor: THEME.loss,
        }));
      series.setData(ohlcPts);
      break;
    case "hollow_candles":
      pushOHLC();
      series = topChart.addSeries(LightweightCharts.CandlestickSeries,
        Object.assign({}, baseOpts, {
          // Hollow up bars: transparent body, colored border
          upColor: "rgba(0,0,0,0)", downColor: THEME.loss,
          borderUpColor: THEME.profit, borderDownColor: THEME.loss,
          wickUpColor: THEME.profit, wickDownColor: THEME.loss,
        }));
      series.setData(ohlcPts);
      break;
    case "high_low":
      pushOHLC();
      series = topChart.addSeries(LightweightCharts.BarSeries,
        Object.assign({}, baseOpts, {
          upColor: THEME.priceLine, downColor: THEME.priceLine, openVisible: false, thinBars: true,
        }));
      series.setData(ohlcPts);
      break;
    case "heikin_ashi":
      pushHA();
      series = topChart.addSeries(LightweightCharts.CandlestickSeries,
        Object.assign({}, baseOpts, {
          title: "BTC/USD (Heikin Ashi)",
          upColor: THEME.profit, downColor: THEME.loss,
          borderUpColor: THEME.profit, borderDownColor: THEME.loss,
          wickUpColor: THEME.profit, wickDownColor: THEME.loss,
        }));
      series.setData(ohlcPts);
      break;
    default:
      // Fallback: line
      series = topChart.addSeries(LightweightCharts.LineSeries,
        Object.assign({}, baseOpts, { color: THEME.priceLine, lineWidth: 2 }));
      series.setData(linePts);
  }
  return series;
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator: Spot Price Line — orange dashed line at current date's spot
// Tracks the global "current date" — moves with crosshair scrub.
// ───────────────────────────────────────────────────────────────────────────
class SpotPriceLineIndicator extends Indicator {
  static type = "spot_line";
  static displayName = "Spot Price Line";
  static pane = "top";
  static configSchema = [
    { key: "color", label: "Color", type: "color", default: THEME.spot },
  ];

  async load() {
    this._priceLine = null;
    this.onDateChange(currentDateStr);
  }
  swatchColor() { return this.config.color; }
  onDateChange(dateStr) {
    // The spot line tracks the currently-locked tracer date. Outside nav
    // mode the line is hidden — same gate as the URPD histogram.
    const btcInd = activeIndicators.values().next().value;
    const series = btcInd && btcInd.getPriceSeries ? btcInd.getPriceSeries() : null;
    if (typeof _navMode !== "undefined" && !_navMode) {
      if (this._priceLine && series) {
        try { series.removePriceLine(this._priceLine); } catch (e) {}
      }
      this._priceLine = null;
      return;
    }
    const spot = getSpotForDate(dateStr);
    if (!spot || !series) return;
    if (this._priceLine) {
      try { series.removePriceLine(this._priceLine); } catch (e) {}
    }
    this._priceLine = series.createPriceLine({
      price: spot, color: this.config.color, lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true, title: `Tracer BTC/USD ${dateStr}`,
      axisLabelTextColor: "#000",
    });
  }
  remove() {
    if (this._priceLine) {
      const btcInd = activeIndicators.values().next().value;
      if (btcInd && btcInd.getPriceSeries) {
        try { btcInd.getPriceSeries().removePriceLine(this._priceLine); } catch (e) {}
      }
    }
    super.remove();
  }
  // Spot uses a price line on the BTC series, not a series of its own.
  // Hide by zeroing line width + axis label; restore by re-creating on toggle.
  setVisible(v) {
    this.visible = !!v;
    if (!this._priceLine) return;
    try {
      if (this.visible) {
        this._priceLine.applyOptions({ lineWidth: 1, axisLabelVisible: true });
      } else {
        this._priceLine.applyOptions({ lineWidth: 0, axisLabelVisible: false });
      }
    } catch (e) {}
  }
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator: Realised Price Line (URPD mean over time)
// Uses BRK's precomputed daily series for speed.
// ───────────────────────────────────────────────────────────────────────────
// Base for any "BRK precomputed daily series" line indicator on the top chart
class TopPaneSeriesIndicator extends Indicator {
  static pane = "top";
  // Subclasses MUST override
  endpoint() { throw new Error("endpoint not implemented"); }
  seriesTitle() { return this.constructor.displayName; }

  async load() {
    let resp;
    try { resp = await fetchJSON(BASE + this.endpoint()); }
    catch (e) {
      throw new Error(`${this.constructor.displayName}: ${e.message}`);
    }
    const arr = resp.data || resp;
    const points = [];
    for (let i = 0; i < arr.length; i++) {
      const v = arr[i];
      if (typeof v === "number" && v > 0 && i < priceDateStrs.length) {
        points.push({ time: priceDateStrs[i], value: v });
      }
    }
    const series = topChart.addSeries(LightweightCharts.LineSeries, {
      color: this.config.color,
      lineWidth: this.config.lineWidth,
      // priceLineVisible draws across the WHOLE chart (a horizontal
      // line at the last value from left edge to right). Disabled
      // here — instead we draw a tip-to-right-edge leader as its
      // own 2-point dotted series below.
      priceLineVisible: false,
      lastValueVisible: true,
      title: this.seriesTitle(),
    });
    series.setData(points);
    this.series.push(series);

    // Tip-to-right-edge leader is still wired up, but with rightOffset:0
    // on the chart the line already reaches the right-axis label and
    // the helper short-circuits (lastPt.time === rightEdgeDate). Kept
    // as a safety net for indicators whose data lags BTC's last bar.
    const leader = _addRightLeader(points, this.config.color);
    if (leader) this.series.push(leader);
  }
  swatchColor() { return this.config.color; }
}

// Helper: draw a dotted leader from a line series' last data point
// horizontally to the latest BTC date (rightmost edge of the chart's
// real data). Returns the new series so the caller can track it on
// the parent indicator's `series` array for cleanup. Returns null if
// there's no gap to bridge.
function _addRightLeader(points, color) {
  if (!points || points.length === 0) return null;
  if (!priceDateStrs || priceDateStrs.length === 0) return null;
  const lastPt = points[points.length - 1];
  const rightEdgeDate = priceDateStrs[priceDateStrs.length - 1];
  // String compare is fine for ISO yyyy-mm-dd dates.
  if (!rightEdgeDate || rightEdgeDate <= lastPt.time) return null;
  const leader = topChart.addSeries(LightweightCharts.LineSeries, {
    color,
    lineWidth: 2,
    // LineStyle.Dotted at 1px width can be invisible at typical zoom
    // levels — the dots are too sparse. Dashed at 2px reads clearly
    // as a leader line without painting like a solid extension.
    lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false,
    lastValueVisible: false,
    crosshairMarkerVisible: false,
  });
  leader.setData([
    { time: lastPt.time, value: lastPt.value },
    { time: rightEdgeDate, value: lastPt.value },
  ]);
  return leader;
}

// ───────────────────────────────────────────────────────────────────────────
// USD-weighted realised price line indicators. BRK only ships the BTC-supply-
// weighted realised price as a precomputed daily series, so the USD
// versions have to be built from URPD bins per sample date — exactly the
// same pass that builds the in-Profit / in-Loss filtered means. They reuse
// the cached `buildRPFilteredTS(cohort)` payload, so adding any of these
// after the filtered indicators have already loaded is essentially free
// (just reads the `usd` array out of the existing cohort cache).
// ───────────────────────────────────────────────────────────────────────────
class RealisedPriceUSDBaseIndicator extends Indicator {
  static pane = "top";
  cohort() { throw new Error("cohort not implemented"); }
  swatchColor() { return this.config.color; }

  async load() {
    const ts = await buildRPFilteredTS(this.cohort());
    const points = [];
    for (let i = 0; i < ts.dates.length; i++) {
      const v = ts.usd[i];
      if (typeof v === "number" && isFinite(v) && v > 0) {
        points.push({ time: ts.dates[i], value: v });
      }
    }
    const series = topChart.addSeries(LightweightCharts.LineSeries, {
      color: this.config.color,
      lineWidth: this.config.lineWidth,
      // Disable LWC's full-chart price line — see the BTC base for
      // why. We add a tip-to-right-edge dotted leader as its own
      // 2-point series instead.
      priceLineVisible: false,
      lastValueVisible: true,
      title: this.constructor.displayName,
    });
    series.setData(points);
    this.series.push(series);
    const leader = _addRightLeader(points, this.config.color);
    if (leader) this.series.push(leader);
  }
}

// ───────────────────────────────────────────────────────────────────────────
// Realised-Price filtered TIME SERIES — one LineSeries per indicator, each
// point is the supply- or USD-weighted mean of URPD bins (filtered to bins
// at or below spot for "in Profit", above spot for "in Loss") at that date.
// Mirrors the BOTH-mode lines from the previous Plotly site (rp.js: lines
// 3276-3281) which fetched URPD per sample date and built `meanTSUrpdBTCProfit`,
// `meanTSLthBTCProfit`, etc.
//
// All four BTC/USD × profit/loss variants of a cohort share one heavy fetch
// pass via `buildRPFilteredTS(cohort)` — the first variant added pays the
// cost (~400 URPDs over batched 8-wide promises), siblings reuse the result.
class RealisedPriceFilteredIndicator extends Indicator {
  static pane = "top";
  cohort()      { return "all"; }     // "all" | "lth" | "sth"
  isProfit()    { return true; }      // overridden by Loss subclasses
  weightField() { return "supply"; }  // "supply" (BTC) | "realized_cap" (USD)

  async load() {
    const ts = await buildRPFilteredTS(this.cohort());
    const profit = this.isProfit();
    const usd = (this.weightField() === "realized_cap");
    const arr = profit
      ? (usd ? ts.usdProfit : ts.btcProfit)
      : (usd ? ts.usdLoss   : ts.btcLoss);
    const points = [];
    for (let i = 0; i < ts.dates.length; i++) {
      const v = arr[i];
      if (typeof v === "number" && isFinite(v) && v > 0) {
        points.push({ time: ts.dates[i], value: v });
      }
    }
    const series = topChart.addSeries(LightweightCharts.LineSeries, {
      color: this.config.color,
      lineWidth: this.config.lineWidth,
      // Solid for in-Profit, Dashed for in-Loss — same convention used to
      // visually distinguish profit/loss on the previous site without
      // changing the per-cohort hue.
      lineStyle: profit ? LightweightCharts.LineStyle.Solid
                        : LightweightCharts.LineStyle.Dashed,
      priceLineVisible: false,
      lastValueVisible: true,
      title: this.constructor.displayName,
    });
    series.setData(points);
    this.series.push(series);
  }
  swatchColor() { return this.config.color; }
  seriesTitle() { return this.constructor.displayName; }
}

// Helper to build configSchema with the right default color per cohort
function _rpFilteredSchema(defaultColor) {
  return [
    { key: "color", label: "Color", type: "color", default: defaultColor },
    { key: "lineWidth", label: "Width", type: "select",
      options: [{v:1,l:"Thin"},{v:2,l:"Medium"},{v:3,l:"Thick"}], default: 1 },
  ];
}

// Generate the 12 weight-aware variants (3 cohorts × 2 P/L × 2 weights).
// CD/VD weights are not yet wired up — would require fetching all 21 age
// cohort URPDs per date and aggregating by mid-age. Add them later if the
// performance hit is acceptable, or once BRK exposes a precomputed
// coindays/valuedays field on the URPD bin response.
const _RP_FILTERED_VARIANTS = [];
const _RP_COHORTS = [
  // Previous Plotly site used a single colour per cohort for the in-Profit /
  // in-Loss filtered means (the P/L distinction came from line style, not
  // hue). "all" cohort → MEAN_COLOR; LTH cohort → LTH_COLOR; STH → STH_COLOR.
  { key: "all", prefix: "",    color: "mean" },
  { key: "lth", prefix: "LTH ", color: "lth" },
  { key: "sth", prefix: "STH ", color: "sth" },
];
const _RP_PL = [
  { profit: true,  label: "in Profit", suffix: "_profit" },
  { profit: false, label: "in Loss",   suffix: "_loss"   },
];
const _RP_WEIGHTS = [
  { key: "supply",       short: "btc", label: "BTC" },
  { key: "realized_cap", short: "usd", label: "USD" },
];
for (const c of _RP_COHORTS) {
  for (const pl of _RP_PL) {
    for (const w of _RP_WEIGHTS) {
      // Single colour per cohort — matches the previous Plotly site, where
      // in-Profit and in-Loss share a hue and are differentiated by line
      // style (solid vs dashed) on the chart.
      const colorKey = c.color === "mean" ? THEME.mean
                     : c.color === "lth"  ? THEME.lth
                     : THEME.sth;
      const typeName = `${c.key === "all" ? "rp" : c.key + "_rp"}${pl.suffix}_${w.short}`;
      const display = `${c.prefix}Realised Price ${pl.label} (${w.label})`;
      const Cls = class extends RealisedPriceFilteredIndicator {
        static type = typeName;
        static displayName = display;
        static configSchema = _rpFilteredSchema(colorKey);
        cohort()      { return c.key; }
        isProfit()    { return pl.profit; }
        weightField() { return w.key; }
      };
      // Give each anonymous class a debugger-friendly name
      Object.defineProperty(Cls, "name", { value: typeName });
      _RP_FILTERED_VARIANTS.push(Cls);
    }
  }
}

// ───────────────────────────────────────────────────────────────────────────
// Indicator: URPD Profile (point-in-time histogram, bottom pane)
// ───────────────────────────────────────────────────────────────────────────
// ───────────────────────────────────────────────────────────────────────────
// Base class for any "point-in-time histogram" indicator on the bottom pane.
// Subclasses just override fetchBuckets(dateStr) to define the data source.
// All shared logic — aggregation, P/L color split, stats box, per-instance
// price scale, scale ownership handoff on removal — lives here.
// ───────────────────────────────────────────────────────────────────────────
class ProfileHistogramIndicator extends Indicator {
  static pane = "bottom";

  // Subclasses MUST override
  async fetchBuckets(dateStr) { throw new Error("fetchBuckets not implemented"); }

  // Transparent "Y-axis anchor" dataset so the right-side weight scale
  // (180K, 160K, ...) is labelled even before the histogram is populated.
  // Times are tiny (0, 0.0001) so the X-axis range is effectively
  // collapsed; combined with the tickMarkFormatter returning "" outside
  // nav mode, no X-axis tick labels appear at the bottom.
  _emptyAnchorData() {
    return [
      { time: 0,      value: 200000, color: "rgba(0,0,0,0)" },
      { time: 0.0001, value: 0,      color: "rgba(0,0,0,0)" },
    ];
  }

  async load() {
    // No permanent stats box — stats are shown via hover tooltip only.
    this._stats = null;
    // Create the histogram series upfront and seed it with the Y-axis
    // anchor so the right-side weight scale (180K, 160K, ..., 0) is
    // labelled even before the user activates the chart. The X-axis
    // tick labels stay hidden via the tickMarkFormatter's nav-mode gate.
    if (!this._series) {
      if (!_visibleScaleOwner) _visibleScaleOwner = this.id;
      const isVisibleScale = (_visibleScaleOwner === this.id);
      const scaleId = isVisibleScale ? "right" : this.id;
      this._series = bottomChart.addSeries(LightweightCharts.HistogramSeries, {
        priceScaleId: scaleId,
        priceFormat: { type: "volume" },
        priceLineVisible: false, lastValueVisible: false,
        title: "",
      });
      if (!isVisibleScale) {
        bottomChart.priceScale(scaleId).applyOptions({
          visible: false, scaleMargins: { top: 0.05, bottom: 0.05 },
        });
      }
      this.series.push(this._series);
      try { this._series.setData(this._emptyAnchorData()); } catch (e) {}
    }
    await this.onDateChange(currentDateStr);
  }

  async onDateChange(dateStr) {
    // Profile histograms only render while the click-locked tracer is
    // active. Outside nav mode we set the transparent Y-axis anchor —
    // the right-side weight scale stays labelled, and the X-axis ticks
    // are suppressed via the tickMarkFormatter's nav-mode gate.
    if (typeof _navMode !== "undefined" && !_navMode) {
      if (this._series) {
        try { this._series.setData(this._emptyAnchorData()); } catch (e) {}
      }
      this._stats = null;
      return;
    }
    let buckets;
    try { buckets = await this.fetchBuckets(dateStr); }
    catch (e) {
      console.error(this.constructor.type, "fetch:", e);
      this._stats = { error: e.message, dateStr };
      return;
    }
    if (!buckets || buckets.length === 0) {
      this._stats = { empty: true, dateStr };
      return;
    }

    const spot = getSpotForDate(dateStr) || 0;
    const weightField = this.config.weight === "usd" ? "realized_cap" : "supply";
    const TARGET_BINS = this.config.bins || 600;

    // Aggregate raw bins → fixed-width buckets
    let minPrice = Infinity, maxPrice = -Infinity;
    for (const b of buckets) {
      if (!b[weightField] || b[weightField] <= 0) continue;
      if (b.price_floor < minPrice) minPrice = b.price_floor;
      if (b.price_floor > maxPrice) maxPrice = b.price_floor;
    }
    if (!isFinite(minPrice) || !isFinite(maxPrice) || maxPrice <= minPrice) return;
    if (minPrice < 1) minPrice = 1;
    const binWidth = (maxPrice - minPrice) / TARGET_BINS;
    const agg = new Array(TARGET_BINS).fill(0).map((_, i) => ({
      price: minPrice + i * binWidth, weight: 0,
    }));
    for (const b of buckets) {
      const w = b[weightField];
      if (!w || w <= 0) continue;
      if (b.price_floor < minPrice) continue;
      let idx = Math.floor((b.price_floor - minPrice) / binWidth);
      if (idx >= TARGET_BINS) idx = TARGET_BINS - 1;
      if (idx < 0) continue;
      agg[idx].weight += w;
    }

    // 5-bin moving-average smoothing — same as the previous Plotly
    // version (rp.js: SMOOTH_WINDOW = 5). Eliminates the "spiky"
    // visual where a few non-zero bins sit beside many empty ones,
    // by bleeding each bin's mass into its 4 neighbours.
    {
      const smoothed = _smoothBins(agg.map(a => a.weight));
      for (let i = 0; i < agg.length; i++) agg[i].weight = smoothed[i];
    }

    // Include EVERY bin (even zero-weight ones) so LWC renders bars at all
    // 600 evenly-spaced time positions. Empty bins get a transparent
    // zero-height bar — invisible to the eye but they reserve their slot
    // on the time axis, which prevents the "spiky / isolated bars" look
    // we'd otherwise get when LWC's HistogramSeries places only the
    // non-empty bars and leaves visible gaps between them. This matches
    // how the previous Plotly histogram filled every categorical slot.
    const dataPoints = [];
    let total = 0, profit = 0, loss = 0;
    let lastTime = -Infinity;
    let nonEmptyCount = 0;
    for (const a of agg) {
      let t = a.price;
      if (t <= lastTime) t = lastTime + 0.0001;
      lastTime = t;
      if (a.weight > 0) {
        total += a.weight;
        const inProfit = a.price <= spot;
        if (inProfit) profit += a.weight; else loss += a.weight;
        dataPoints.push({ time: t, value: a.weight, color: inProfit ? THEME.profit : THEME.loss });
        nonEmptyCount++;
      } else {
        // Zero-weight placeholder: keeps the time slot but draws nothing.
        dataPoints.push({ time: t, value: 0, color: "rgba(0,0,0,0)" });
      }
    }

    // Replace series; per-instance price scale (first profile claims visible right axis)
    if (this._series) {
      try { bottomChart.removeSeries(this._series); } catch (e) {}
      const idx = this.series.indexOf(this._series);
      if (idx >= 0) this.series.splice(idx, 1);
    }
    if (!_visibleScaleOwner) _visibleScaleOwner = this.id;
    const isVisibleScale = (_visibleScaleOwner === this.id);
    const scaleId = isVisibleScale ? "right" : this.id;

    this._series = bottomChart.addSeries(LightweightCharts.HistogramSeries, {
      priceScaleId: scaleId,
      priceFormat: { type: "volume" },
      priceLineVisible: false, lastValueVisible: false,
      title: "",
    });
    if (!isVisibleScale) {
      bottomChart.priceScale(scaleId).applyOptions({
        visible: false, scaleMargins: { top: 0.05, bottom: 0.05 },
      });
    }
    // Cap the Y-axis at the 99th-percentile bar height so a few outlier
    // peaks don't flatten the rest of the histogram. LWC v5's price-scale
    // API has no setVisibleRange — the only reliable way to cap is to clip
    // the values themselves before sending to the series, then let
    // autoScale fit naturally to [0, p99]. The full-precision totals/stats
    // are read from this._stats below, so the hover tooltip is unaffected.
    const Y_CAP_PCT = 99;
    let renderPoints = dataPoints;
    let yCapValue = null;
    // Compute the cap over NON-ZERO bars only — zero-weight placeholders
    // were added to fill every time slot, so including them in the
    // percentile would drag p99 toward 0 and over-clip real bars.
    if (isVisibleScale && nonEmptyCount >= 5) {
      const sorted = dataPoints
        .filter(d => d.value > 0)
        .map(d => d.value)
        .sort((a, b) => a - b);
      const p99 = sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * (Y_CAP_PCT / 100)))];
      if (p99 > 0) {
        yCapValue = p99;
        renderPoints = dataPoints.map(d => d.value > p99 ? { ...d, value: p99 } : d);
      }
      try {
        bottomChart.priceScale("right").applyOptions({
          autoScale: true, scaleMargins: { top: 0.05, bottom: 0.05 },
        });
      } catch (e) {}
    }
    // Pin a synthetic zero-weight bar at $0 so the histogram's X-axis
    // always starts at zero (and the "$0" tick is visible) regardless of
    // the lowest real cost-basis bin.
    const renderWithZero = [{ time: 0, value: 0, color: "rgba(0,0,0,0)" }, ...renderPoints];
    this._series.setData(renderWithZero);
    this.series.push(this._series);
    // Force visible range to start at $0 so the zero tick is anchored on
    // the left edge no matter where real bars start.
    try {
      bottomChart.timeScale().setVisibleRange({ from: 0, to: maxPrice });
    } catch (e) {
      bottomChart.timeScale().fitContent();
    }

    // Stash per-indicator stats. The hover handler shows these in a small
    // tooltip near the cursor when the user mouses over a histogram bar
    // — replacing the previous always-visible stats panel.
    const fmtCount = (n) => weightField === "supply" ? `${(n/1e6).toFixed(2)}M BTC` : `$${(n/1e9).toFixed(2)}B`;
    const pctProfit = total > 0 ? (100 * profit / total) : 0;
    this._stats = {
      spot, total, profit, loss, pctProfit, weightField, dateStr,
      binCount: nonEmptyCount, fmtCount,
      yCapPct: Y_CAP_PCT, yCapValue,
    };
  }

  remove() {
    if (_visibleScaleOwner === this.id) {
      _visibleScaleOwner = null;
      for (const ind of activeIndicators.values()) {
        if (ind !== this && ind instanceof ProfileHistogramIndicator) {
          _visibleScaleOwner = ind.id;
          if (typeof ind.onDateChange === "function") ind.onDateChange(currentDateStr);
          break;
        }
      }
    }
    this._stats = null;
    super.remove();
  }
}

// Tracks which bottom-pane indicator owns the visible right Y-axis.
let _visibleScaleOwner = null;
